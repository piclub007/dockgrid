<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockGrid - Dashboard</title>
    <meta name="theme-color" content="#ff6b35">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23ff6b35'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='bold' font-family='system-ui'>D</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        :root {
            --orange-500:#ff6b35;--orange-600:#e85d2c;--orange-400:#ff8c5a;
            --black-100:#000;--black-90:#0a0a0a;--black-80:#1a1a1a;--black-70:#2a2a2a;
            --black-50:#555;--black-40:#777;--black-20:#ccc;--black-10:#e0e0e0;--black-5:#f5f5f5;
            --white:#fff;--white-a10:rgba(255,255,255,0.1);--white-a20:rgba(255,255,255,0.2);
            --white-a50:rgba(255,255,255,0.5);--white-a70:rgba(255,255,255,0.7);--white-a90:rgba(255,255,255,0.9);
            --red-500:#ef4444;--green-500:#22c55e;
            --font:'Inter',system-ui,sans-serif;
            --radius-xs:4px;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;
            --shadow-sm:0 1px 4px rgba(0,0,0,0.08);--shadow-md:0 4px 12px rgba(0,0,0,0.1);
            --shadow-lg:0 8px 24px rgba(0,0,0,0.12);
            --transition:150ms cubic-bezier(0.4,0,0.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);-webkit-font-smoothing:antialiased;font-size:14px}
        body{background:#1a1a1a;display:flex;flex-direction:column}
        
        .bg-layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background-size:cover;background-position:center;opacity:0.9;transition:background-image 0.6s ease}
        .bg-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;background:rgba(0,0,0,0.38);pointer-events:none}
        
        .app{position:relative;z-index:2;display:flex;flex-direction:column;height:100%}
        
        .loading-bar{position:fixed;top:0;left:0;height:3px;background:var(--orange-500);z-index:9999;width:0;transition:width 0.4s ease-out;border-radius:0 2px 2px 0}
        .loading-bar.active{width:70%;animation:loadingPulse 1.5s ease-in-out infinite}
        .loading-bar.done{width:100%;opacity:0;transition:width 0.3s ease-out,opacity 0.3s ease-out}
        @keyframes loadingPulse{0%{width:30%}50%{width:80%}100%{width:30%}}
        
        /* Header */
        .header{display:flex;flex-direction:column;padding:8px 18px 0;z-index:10;flex-shrink:0;gap:6px}
        .header-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
        .header-left{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .header-center{flex:1;display:flex;flex-direction:column;align-items:center;max-width:500px;margin:0 auto;gap:4px}
        .header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:auto}
        
        .page-title{font-size:18px;font-weight:800;color:var(--white-a90);letter-spacing:-0.5px;cursor:text;padding:2px 8px;border-radius:var(--radius-xs);border:1px solid transparent;outline:none;font-family:var(--font);background:transparent;text-align:center;transition:all var(--transition)}
        .page-title:hover{border-color:var(--white-a30)}
        .page-title:focus{border-color:var(--orange-500);background:rgba(0,0,0,0.3)}
        
        .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:11px;font-weight:600;font-family:var(--font);border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);letter-spacing:-0.2px;white-space:nowrap}
        .btn-dark{background:rgba(0,0,0,0.5);color:var(--white);backdrop-filter:blur(8px)}
        .btn-dark:hover{background:rgba(0,0,0,0.7)}
        .btn-primary{background:var(--orange-500);color:var(--white)}
        .btn-primary:hover{background:var(--orange-600)}
        
        .search-box{width:100%;max-width:400px;position:relative}
        .search-input{width:100%;padding:8px 14px 8px 38px;font-size:12px;font-family:var(--font);background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-xl);color:var(--white);outline:none;transition:all var(--transition);backdrop-filter:blur(8px)}
        .search-input::placeholder{color:var(--white-a50)}
        .search-input:focus{border-color:var(--orange-500);background:rgba(0,0,0,0.55)}
        .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--white-a50);pointer-events:none;font-size:15px}
        
        .avatar{width:32px;height:32px;border-radius:50%;background:var(--orange-500);display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:700;font-size:13px;cursor:pointer;border:2px solid rgba(255,255,255,0.2);transition:all var(--transition);overflow:hidden;flex-shrink:0}
        .avatar img{width:100%;height:100%;object-fit:cover}
        .avatar:hover{border-color:var(--orange-500)}
        
        .dropdown{position:relative}
        .dropdown-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:200px;background:rgba(18,18,18,0.98);backdrop-filter:blur(16px);border:1px solid var(--white-a10);border-radius:var(--radius-md);padding:4px;z-index:100;box-shadow:0 12px 32px rgba(0,0,0,0.4)}
        .dropdown-menu.show{display:block;animation:dropIn 120ms ease-out}
        .dropdown-menu.left{right:auto;left:0}
        @keyframes dropIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
        .dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:11px;color:var(--white-a70);cursor:pointer;border-radius:var(--radius-xs);transition:all var(--transition);border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
        .dropdown-item:hover{background:var(--white-a10);color:var(--white)}
        .dropdown-item.danger{color:#f87171}
        .dropdown-item.danger:hover{background:rgba(239,68,68,0.15);color:#fca5a5}
        .dropdown-divider{height:1px;background:var(--white-a10);margin:3px 0}
        
        /* Main */
        .main{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 18px 18px}
        .main::-webkit-scrollbar{width:5px}
        .main::-webkit-scrollbar-track{background:transparent}
        .main::-webkit-scrollbar-thumb{background:var(--white-a20);border-radius:3px}
        
        .widget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;padding-bottom:60px}
        .widget-grid.cols-2{grid-template-columns:repeat(2,1fr)}
        .widget-grid.cols-3{grid-template-columns:repeat(3,1fr)}
        .widget-grid.cols-4{grid-template-columns:repeat(4,1fr)}
        
        .widget{background:rgba(255,255,255,0.96);border-radius:var(--radius-sm);box-shadow:0 1px 6px rgba(0,0,0,0.1);overflow:hidden;display:flex;flex-direction:column;min-height:160px;transition:all var(--transition);position:relative}
        .widget:hover{box-shadow:0 2px 12px rgba(0,0,0,0.15)}
        .widget-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fafafa;border-bottom:1px solid #eee;min-height:40px;cursor:default}
        .widget-header:hover .widget-hover-actions{opacity:1}
        .widget-title{font-size:13px;font-weight:600;color:#1a1a1a;cursor:text;padding:2px 5px;border-radius:3px;border:1px solid transparent;outline:none;font-family:var(--font);background:transparent;min-width:30px;max-width:60%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .widget-title:hover{border-color:#ddd}
        .widget-title:focus{border-color:var(--orange-500);background:#fff;max-width:none}
        .widget-hover-actions{display:flex;gap:1px;opacity:0;transition:opacity 120ms ease-out}
        .widget-action-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:none;background:transparent;color:#888;transition:all var(--transition);font-size:16px}
        .widget-action-btn:hover{background:#e8e8e8;color:#333}
        .widget-menu-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:none;background:transparent;color:#888;transition:all var(--transition);font-size:18px;position:relative}
        .widget-menu-btn:hover{background:#e8e8e8;color:#333}
        .widget-body{padding:12px 14px;color:#333;font-size:12px;line-height:1.5;flex:1;overflow-y:auto;max-height:380px}
        .widget-body::-webkit-scrollbar{width:4px}
        .widget-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
        
        .widget-input{width:100%;padding:8px 10px;font-size:11px;font-family:var(--font);border:1px solid #e0e0e0;border-radius:var(--radius-xs);color:#333;outline:none;transition:all var(--transition);background:#fff;margin-bottom:6px}
        .widget-input:focus{border-color:var(--orange-500);box-shadow:0 0 0 2px rgba(255,107,53,0.1)}
        .widget-input::placeholder{color:#aaa}
        .widget-textarea{width:100%;min-height:80px;padding:8px 10px;font-size:11px;font-family:var(--font);border:1px solid #e0e0e0;border-radius:var(--radius-xs);color:#333;outline:none;resize:vertical;background:#fff;transition:all var(--transition)}
        .widget-textarea:focus{border-color:var(--orange-500);box-shadow:0 0 0 2px rgba(255,107,53,0.1)}
        
        .bookmark-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-xs);cursor:pointer;text-decoration:none;color:#333;transition:all var(--transition)}
        .bookmark-item:hover{background:#f5f5f5}
        .bookmark-favicon{width:16px;height:16px;border-radius:2px;flex-shrink:0}
        .bookmark-info{flex:1;min-width:0}
        .bookmark-btitle{font-size:12px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .bookmark-burl{font-size:10px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .bookmark-desc{font-size:10px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
        
        .task-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:var(--radius-xs);cursor:pointer;transition:all var(--transition);color:#333}
        .task-item:hover{background:#f5f5f5}
        .task-progress{height:3px;background:#eee;border-radius:2px;margin-bottom:8px;overflow:hidden}
        .task-progress-bar{height:100%;background:var(--orange-500);transition:width 0.3s ease-out;border-radius:2px}
        
        .note-toolbar{display:flex;gap:2px;margin-bottom:6px;flex-wrap:wrap}
        .note-toolbar button{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-xs);cursor:pointer;border:1px solid #e0e0e0;background:#fff;color:#555;font-size:13px;transition:all var(--transition)}
        .note-toolbar button:hover{background:#f0f0f0;border-color:#ccc}
        
        .embed-preview{border-radius:var(--radius-xs);overflow:hidden;background:#000;min-height:180px;display:flex;align-items:center;justify-content:center}
        .embed-preview iframe{width:100%;height:100%;min-height:180px;border:none}
        
        .calc-display{text-align:right;font-size:24px;font-weight:700;padding:8px 12px;background:#f9f9f9;border-radius:var(--radius-xs);margin-bottom:6px;color:#1a1a1a;min-height:42px;word-break:break-all}
        .calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
        .calc-btn{padding:10px;font-size:13px;font-weight:600;border:1px solid #e0e0e0;border-radius:var(--radius-xs);cursor:pointer;background:#fff;color:#333;transition:all var(--transition);font-family:var(--font)}
        .calc-btn:hover{background:#f5f5f5}
        .calc-btn.operator{background:#fff5f0;color:var(--orange-500);font-weight:700}
        .calc-btn.equals{background:var(--orange-500);color:#fff;border-color:var(--orange-500);font-weight:700}
        .calc-btn.equals:hover{background:var(--orange-600)}
        
        .clock-display{text-align:center;padding:12px}
        .clock-time{font-size:36px;font-weight:800;color:#1a1a1a;letter-spacing:-1px;font-variant-numeric:tabular-nums}
        .clock-date{font-size:11px;color:#888;margin-top:4px}
        
        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;color:var(--white-a50);text-align:center;gap:10px}
        .empty-state iconify-icon{font-size:48px;opacity:0.35}
        .empty-state h3{font-size:16px;font-weight:700;color:var(--white-a70)}
        
        /* Footer */
        .footer{text-align:center;padding:16px 20px 20px;flex-shrink:0;z-index:5}
        .footer a{color:var(--white-a70);font-size:11px;font-weight:500;text-decoration:none;transition:color var(--transition);letter-spacing:-0.2px}
        .footer a:hover{color:var(--orange-500)}
        
        /* Pages Sidebar */
        .pages-sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:rgba(16,16,16,0.98);backdrop-filter:blur(16px);z-index:150;transform:translateX(-100%);transition:transform 220ms ease-out;display:flex;flex-direction:column;border-right:1px solid var(--white-a10)}
        .pages-sidebar.open{transform:translateX(0)}
        .pages-sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--white-a10)}
        .pages-sidebar-title{font-size:14px;font-weight:700;color:var(--white)}
        .pages-sidebar-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:none;background:var(--white-a10);color:var(--white-a70);font-size:15px;transition:all var(--transition)}
        .pages-sidebar-close:hover{background:var(--white-a20);color:var(--white)}
        .pages-sidebar-body{flex:1;overflow-y:auto;padding:10px}
        .pages-sidebar-body::-webkit-scrollbar{width:4px}
        .pages-sidebar-body::-webkit-scrollbar-thumb{background:var(--white-a10);border-radius:2px}
        .page-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius-xs);cursor:pointer;transition:all var(--transition);color:var(--white-a70);font-size:12px;font-weight:500;margin-bottom:1px}
        .page-item:hover{background:var(--white-a10);color:var(--white)}
        .page-item.active{background:rgba(255,107,53,0.2);color:var(--orange-500);font-weight:600}
        .pages-sidebar-footer{padding:12px 18px;border-top:1px solid var(--white-a10)}
        .pages-sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:149}
        .pages-sidebar-overlay.show{display:block}
        
        /* Modal */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:200;align-items:center;justify-content:center}
        .modal-overlay.show{display:flex;animation:fadeIn 120ms ease-out}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .modal{background:#1e1e1e;border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-lg);max-width:580px;width:92%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 48px rgba(0,0,0,0.45);animation:modalIn 200ms ease-out}
        @keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
        .modal-title{font-size:15px;font-weight:700;color:var(--white);letter-spacing:-0.3px}
        .modal-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:none;background:rgba(255,255,255,0.06);color:var(--white-a70);font-size:15px;transition:all var(--transition)}
        .modal-close:hover{background:rgba(255,255,255,0.12);color:var(--white)}
        .modal-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
        .modal-tab{flex:1;padding:11px 14px;font-size:11px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;background:transparent;color:var(--white-a50);transition:all var(--transition);text-align:center;border-bottom:2px solid transparent}
        .modal-tab:hover{color:var(--white-a70);background:rgba(255,255,255,0.02)}
        .modal-tab.active{color:var(--orange-500);border-bottom-color:var(--orange-500)}
        .modal-body{flex:1;overflow-y:auto;padding:16px 18px}
        .modal-body::-webkit-scrollbar{width:4px}
        .modal-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
        .tab-content{display:none}
        .tab-content.active{display:block;animation:fadeIn 150ms ease-out}
        
        .form-group{margin-bottom:10px}
        .form-label{display:block;font-size:10px;font-weight:600;color:var(--white-a50);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}
        .form-input{width:100%;padding:9px 10px;font-size:12px;font-family:var(--font);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-xs);color:var(--white);outline:none;transition:all var(--transition)}
        .form-input:focus{border-color:var(--orange-500)}
        .form-input::placeholder{color:rgba(255,255,255,0.25)}
        .form-textarea{min-height:50px;resize:vertical}
        .form-select{width:100%;padding:9px 10px;font-size:12px;font-family:var(--font);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-xs);color:var(--white);outline:none;cursor:pointer}
        .form-select option{background:#1e1e1e;color:#fff}
        .form-range{width:100%;-webkit-appearance:none;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;outline:none;cursor:pointer}
        .form-range::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--orange-500);cursor:pointer}
        
        .image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
        .image-option{aspect-ratio:16/10;border-radius:var(--radius-xs);cursor:pointer;border:2px solid transparent;transition:all var(--transition);overflow:hidden;background-size:cover;background-position:center}
        .image-option:hover{border-color:var(--orange-500)}
        .image-option.selected{border-color:var(--orange-500)}
        
        .widget-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
        .widget-type-btn{padding:12px 8px;border-radius:var(--radius-xs);border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all var(--transition);display:flex;flex-direction:column;align-items:center;gap:5px;background:transparent;color:var(--white-a70);font-family:var(--font);text-align:center;font-size:10px;width:100%}
        .widget-type-btn:hover{background:rgba(255,255,255,0.04);border-color:var(--orange-500);color:var(--white)}
        .widget-type-btn iconify-icon{font-size:22px;color:var(--orange-500)}
        
        .toast-container{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:5px}
        .toast{padding:9px 14px;background:#1e1e1e;color:var(--white);border-left:3px solid var(--orange-500);border-radius:var(--radius-xs);font-size:11px;font-weight:600;box-shadow:0 6px 18px rgba(0,0,0,0.25);animation:slideIn 200ms ease-out;max-width:300px}
        .toast.error{border-left-color:var(--red-500)}
        .toast.success{border-left-color:var(--green-500)}
        @keyframes slideIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
        
        @media(max-width:768px){.widget-grid{grid-template-columns:1fr!important}.header-center{max-width:300px}.header{padding:6px 10px 0}.widget-type-grid{grid-template-columns:repeat(2,1fr)}.page-title{font-size:15px}}
    </style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>
<div class="bg-layer" id="bgLayer" style="background-image:url('https://cdn.pixabay.com/photo/2020/07/25/14/23/cliff-5436923_1280.jpg')"></div>
<div class="bg-overlay"></div>
<div class="toast-container" id="toastContainer"></div>

<!-- Pages Sidebar -->
<div class="pages-sidebar-overlay" id="pagesOverlay" onclick="closePagesSidebar()"></div>
<div class="pages-sidebar" id="pagesSidebar">
    <div class="pages-sidebar-header">
        <span class="pages-sidebar-title">Your Pages</span>
        <button class="pages-sidebar-close" onclick="closePagesSidebar()"><iconify-icon icon="mdi:close" width="15" height="15"></iconify-icon></button>
    </div>
    <div class="pages-sidebar-body" id="pagesList"></div>
    <div class="pages-sidebar-footer">
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="createNewPage()">
            <iconify-icon icon="mdi:plus" width="14" height="14"></iconify-icon> New Page
        </button>
    </div>
</div>

<div class="app">
    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <div class="header-left">
                <button class="btn btn-dark" onclick="openPagesSidebar()"><iconify-icon icon="mdi:file-document-multiple-outline" width="14" height="14"></iconify-icon> Pages</button>
                <span style="color:var(--white-a70);font-size:11px;font-weight:500" id="usernameDisplay">@user</span>
            </div>
            <div class="header-center">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp, collection, onSnapshot, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBbrRHlakmOdKwuDGwYAx5qf-e6DOHW7s0",
    authDomain: "joefootball-15e7a.firebaseapp.com",
    projectId: "joefootball-15e7a",
    storageBucket: "joefootball-15e7a.firebasestorage.app",
    messagingSenderId: "976347287101",
    appId: "1:976347287101:web:6cbbb96d496d8221986454"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const COL = {USERS:'DockGrid_Users',PAGES:'DockGrid_Pages',WIDGETS:'DockGrid_Widgets',SETTINGS:'DockGrid_Settings'};
const IMGBB_KEY = 'ba8023ca74166460c442e8e703d2a1b0';
const DEFAULT_BGS = [
    'https://cdn.pixabay.com/photo/2020/07/25/14/23/cliff-5436923_1280.jpg',
    'https://cdn.pixabay.com/photo/2021/03/23/06/27/cliff-6116449_1280.jpg',
    'https://cdn.pixabay.com/photo/2022/09/16/00/39/city-7457513_1280.jpg',
    'https://cdn.pixabay.com/photo/2017/12/26/02/54/ho-chi-minh-3039579_1280.jpg',
    'https://cdn.pixabay.com/photo/2018/08/19/00/33/camara-de-lobos-city-3615829_1280.jpg',
    'https://cdn.pixabay.com/photo/2024/11/03/12/57/lion-tamarin-9171365_1280.jpg',
    'https://cdn.pixabay.com/photo/2020/06/20/11/09/cat-5320572_1280.jpg'
];

window.COL=COL;window.db=db;window.auth=auth;
window.docFn=doc;window.setDocFn=setDoc;window.getDocFn=getDoc;
window.serverTimestampFn=serverTimestamp;window.collectionFn=collection;
window.deleteDocFn=deleteDoc;window.queryFn=query;window.whereFn=where;
window.IMGBB_KEY=IMGBB_KEY;window.DEFAULT_BGS=DEFAULT_BGS;

window.currentBg=DEFAULT_BGS[0];window.colCount=3;window.widgetOpacity=96;
window.widgetsData=[];window.currentUser=null;window.currentPageId='default';
window.currentPageTitle='DockGrid Page';

// Auth check
onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'sign.html'; return; }
    window.currentUser = user;
    initApp(user);
});

async function initApp(user) {
    const name = user.displayName || user.email?.split('@')[0] || 'user';
    document.getElementById('avatarInitial').textContent = name[0].toUpperCase();
    document.getElementById('profileInitial').textContent = name[0].toUpperCase();
    document.getElementById('usernameDisplay').textContent = '@' + name.toLowerCase().replace(/\s/g,'_');
    setupBgGrid();
    setupWidgetTypeGrid();
    await loadSettings(user.uid);
    loadWidgets(user.uid);
    loadPages(user.uid);
}

function setupBgGrid() {
    document.getElementById('bgImageGrid').innerHTML = window.DEFAULT_BGS.map(url => `<div class="image-option" style="background-image:url('${url}')" onclick="setBg('${url}')" data-bg="${url}"></div>`).join('');
}

function setupWidgetTypeGrid() {
    const types = [
        {id:'bookmarks',icon:'mdi:bookmark-multiple-outline',name:'Bookmarks'},
        {id:'rss',icon:'mdi:rss',name:'RSS News'},
        {id:'notes',icon:'mdi:note-text-outline',name:'Notes'},
        {id:'tasks',icon:'mdi:checkbox-marked-outline',name:'Tasks'},
        {id:'embed',icon:'mdi:code-tags',name:'Embed'},
        {id:'project',icon:'mdi:folder-outline',name:'Project'},
        {id:'clock',icon:'mdi:clock-outline',name:'Clock'},
        {id:'gallery',icon:'mdi:image-multiple-outline',name:'Gallery'},
        {id:'calculator',icon:'mdi:calculator',name:'Calculator'}
    ];
    document.getElementById('widgetTypeGrid').innerHTML = types.map(t => `<button class="widget-type-btn" onclick="addWidget('${t.id}')"><iconify-icon icon="${t.icon}"></iconify-icon>${t.name}</button>`).join('');
}

async function loadSettings(uid) {
    try {
        const snap = await getDoc(doc(db,COL.SETTINGS,uid));
        if (snap.exists()) {
            const d = snap.data();
            if (d.bg) { window.currentBg = d.bg; updateBgDisplay(d.bg); }
            if (d.cols) { window.colCount = d.cols; updateColDisplay(d.cols); }
            if (d.opacity != null) { window.widgetOpacity = d.opacity; updateOpacityUI(d.opacity); }
            if (d.pageTitle) { window.currentPageTitle = d.pageTitle; document.getElementById('pageTitleDisplay').textContent = d.pageTitle; document.getElementById('pageTitle').value = d.pageTitle; }
            if (d.profileImg) updateProfileImages(d.profileImg);
        }
    } catch(e) {}
}

function loadWidgets(uid) {
    const q = collection(db,COL.WIDGETS);
    onSnapshot(q,(snap)=>{
        window.widgetsData=[];
        snap.forEach(doc=>{if(doc.data().userId===uid)window.widgetsData.push({id:doc.id,...doc.data()})});
        renderWidgets();
    });
}

async function loadPages(uid) {
    const q = query(collection(db,COL.PAGES),where('userId','==',uid));
    onSnapshot(q,(snap)=>{
        const pages=[];
        snap.forEach(doc=>pages.push({id:doc.id,...doc.data()}));
        renderPagesList(pages);
    });
}

function renderPagesList(pages) {
    const list = document.getElementById('pagesList');
    if (pages.length === 0) { list.innerHTML = '<div style="color:var(--white-a50);text-align:center;padding:16px;font-size:11px">No pages yet</div>'; return; }
    list.innerHTML = pages.map(p => `<div class="page-item${p.id===window.currentPageId?' active':''}" onclick="switchPage('${p.id}')"><iconify-icon icon="mdi:file-document-outline" width="15" height="15"></iconify-icon>${p.title||'Untitled'}</div>`).join('');
}
</script>

<script>
// ===== GLOBAL HELPERS (No $ conflicts) =====
var D = function(id){ return document.getElementById(id); };

function toggleDropdown(id){ D(id).classList.toggle('show'); }
function openModal(id){ D(id).classList.add('show'); D('avatarMenu').classList.remove('show'); }
function closeModal(id){ D(id).classList.remove('show'); }
function openAddWidgetModal(){ openModal('addWidgetModal'); }
function openProfileModal(){ openModal('profileModal'); }
function openBackgroundModal(){ openModal('pageSettingsModal'); setTimeout(function(){ switchSettingsTab('tab-background', document.querySelector('[data-tab="tab-background"]')); }, 80); }
function openPageSettingsModal(){ openModal('pageSettingsModal'); }

function showToast(msg, type){
    type = type || 'info';
    var c = D('toastContainer');
    var t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(function(){ t.style.opacity = '0'; t.style.transform = 'translateX(60px)'; t.style.transition = 'all 200ms'; setTimeout(function(){ t.remove(); }, 200); }, 2800);
}

function searchGoogle(q){ if(!q.trim()) return; window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank'); }
function showLoading(){ var bar = D('loadingBar'); bar.classList.add('active'); bar.classList.remove('done'); }
function hideLoading(){ var bar = D('loadingBar'); bar.classList.remove('active'); bar.classList.add('done'); setTimeout(function(){ bar.classList.remove('done'); }, 400); }

// ===== PAGE TITLE =====
function savePageTitle(title) {
    title = title.trim() || 'DockGrid Page';
    window.currentPageTitle = title;
    D('pageTitleDisplay').textContent = title;
    D('pageTitle').value = title;
    saveSetting('pageTitle', title);
}

// ===== PAGES SIDEBAR =====
function openPagesSidebar(){ D('pagesSidebar').classList.add('open'); D('pagesOverlay').classList.add('show'); D('avatarMenu').classList.remove('show'); }
function closePagesSidebar(){ D('pagesSidebar').classList.remove('open'); D('pagesOverlay').classList.remove('show'); }

async function createNewPage(){
    var db = window.db, COL = window.COL, docFn = window.docFn, setDocFn = window.setDocFn, sts = window.serverTimestampFn;
    var pageId = 'page_' + Date.now();
    await setDocFn(docFn(db, COL.PAGES, pageId), { id: pageId, userId: window.currentUser.uid, title: 'New Page', icon: '📄', order: 0, isPublic: false, createdAt: sts(), updatedAt: sts() });
    showToast('Page created!', 'success');
}

function switchPage(pageId){ window.currentPageId = pageId; closePagesSidebar(); showToast('Switched page', 'success'); }

// ===== SETTINGS TABS =====
function switchSettingsTab(tabId, btn){
    document.querySelectorAll('.modal-tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(t){ t.classList.remove('active'); });
    btn.classList.add('active');
    D(tabId).classList.add('active');
}

// ===== BACKGROUND =====
function setBg(url){ window.currentBg = url; updateBgDisplay(url); saveSetting('bg', url); }
function updateBgDisplay(url){ D('bgLayer').style.backgroundImage = 'url(' + url + ')'; document.querySelectorAll('.image-option').forEach(function(e){ e.classList.remove('selected'); if(e.dataset.bg === url) e.classList.add('selected'); }); }
function resetBg(){ setBg(window.DEFAULT_BGS[0]); showToast('Background reset', 'success'); }

async function uploadBg(event){
    var file = event.target.files[0]; if(!file) return;
    showLoading(); showToast('Uploading...');
    var fd = new FormData(); fd.append('image', file);
    try {
        var res = await fetch('https://api.imgbb.com/1/upload?key=' + window.IMGBB_KEY, { method: 'POST', body: fd });
        var d = await res.json();
        if(d.success){ setBg(d.data.url); showToast('Background updated!', 'success'); }
    } catch(e){ showToast('Upload failed', 'error'); }
    hideLoading();
}

async function uploadProfile(event){
    var file = event.target.files[0]; if(!file) return;
    showLoading(); showToast('Uploading...');
    var fd = new FormData(); fd.append('image', file);
    try {
        var res = await fetch('https://api.imgbb.com/1/upload?key=' + window.IMGBB_KEY, { method: 'POST', body: fd });
        var d = await res.json();
        if(d.success){ updateProfileImages(d.data.url); saveSetting('profileImg', d.data.url); closeModal('profileModal'); showToast('Profile updated!', 'success'); }
    } catch(e){ showToast('Upload failed', 'error'); }
    hideLoading();
}

function updateProfileImages(url){
    D('avatarBtn').innerHTML = '<img src="' + url + '" alt="P">';
    D('profileAvatar').innerHTML = '<img src="' + url + '" alt="P" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
}

// ===== SETTINGS =====
async function saveSetting(key, value){
    if(!window.currentUser) return;
    var db = window.db, COL = window.COL, docFn = window.docFn, setDocFn = window.setDocFn;
    await setDocFn(docFn(db, COL.SETTINGS, window.currentUser.uid), { [key]: value }, { merge: true });
}

function updateOpacity(val){
    window.widgetOpacity = parseInt(val);
    D('opLabel').textContent = val + '%';
    updateOpacityUI(val);
    saveSetting('opacity', parseInt(val));
}

function updateOpacityUI(val){
    var o = val / 100;
    document.querySelectorAll('.widget').forEach(function(w){
        w.style.background = 'rgba(255,255,255,' + o + ')';
        var h = w.querySelector('.widget-header');
        if(h) h.style.background = 'rgba(250,250,250,' + o + ')';
    });
}

function updateCols(val){
    window.colCount = parseInt(val);
    updateColDisplay(val);
    saveSetting('cols', parseInt(val));
}

function updateColDisplay(val){
    var grid = D('widgetGrid');
    if(!grid) return;
    grid.className = 'widget-grid';
    if(val >= 1 && val <= 4) grid.classList.add('cols-' + val);
    var select = D('columnCountSelect');
    if(select) select.value = val;
}

// ===== WIDGET OPERATIONS =====
async function addWidget(type){
    var names = {bookmarks:'Bookmarks',rss:'RSS News',notes:'Notes',tasks:'Tasks',embed:'Embed',project:'Project',clock:'Clock',gallery:'Gallery',calculator:'Calculator'};
    var db = window.db, COL = window.COL, docFn = window.docFn, setDocFn = window.setDocFn, sts = window.serverTimestampFn;
    var id = type + '_' + Date.now();
    showLoading();
    await setDocFn(docFn(db, COL.WIDGETS, id), { id: id, type: type, title: names[type] || 'Widget', userId: window.currentUser.uid, pageId: window.currentPageId || 'default', data: { bookmarks: [], tasks: [], content: '', items: [] }, createdAt: sts(), updatedAt: sts() });
    closeModal('addWidgetModal');
    showToast('Added ' + (names[type] || 'Widget'), 'success');
    hideLoading();
}

async function removeWidget(id){
    if(!confirm('Remove this widget?')) return;
    var db = window.db, COL = window.COL, docFn = window.docFn, deleteDocFn = window.deleteDocFn;
    await deleteDocFn(docFn(db, COL.WIDGETS, id));

}

async function renameWidget(id, newTitle){
    if(!newTitle.trim()) return;
    var db = window.db, COL = window.COL, docFn = window.docFn, setDocFn = window.setDocFn;
    await setDocFn(docFn(db, COL.WIDGETS, id), { title: newTitle.trim() }, { merge: true });

function toggleWidgetMenu(widgetId, event){

function getWidgetMenuItems(widget){
    var id = widget.id;
    var common = [
        {label:'Rename widget',icon:'mdi:pencil-outline',action:'editWidgetTitle(\''+id+'\')'},

        rss: [{label:'Refresh feed',icon:'mdi:refresh',action:'refreshRSS(\''+id+'\')'},{label:'Add feed',icon:'mdi:rss-plus',action:'focusRSSInput(\''+id+'\')'},{label:'Edit feeds',icon:'mdi:rss-box',action:'showToast(\'Edit feeds coming soon\')'},{label:'divider'}].concat(common),

        tasks: [{label:'Add new list',icon:'mdi:playlist-plus',action:'addTaskList(\''+id+'\')'},{label:'divider'}].concat(common),
        embed: [{label:'Edit embed code',icon:'mdi:code-tags',action:'focusEmbedInput(\''+id+'\')'},{label:'divider'}].concat(common),
        project: [{label:'Edit project',icon:'mdi:folder-edit-outline',action:'showToast(\'Edit project coming soon\')'},{label:'divider'}].concat(common),
        clock: [{label:'Add/edit locations',icon:'mdi:map-marker-plus',action:'showToast(\'World clock coming soon\')'},{label:'divider'}].concat(common),
        gallery: [{label:'Add images',icon:'mdi:image-plus',action:'showToast(\'Add images coming soon\')'},{label:'divider'}].concat(common),
        calculator: [{label:'Switch mode',icon:'mdi:swap-horizontal',action:'showToast(\'Calculator modes coming soon\')'},{label:'divider'}].concat(common)

function editWidgetTitle(id){
    var titleEl = document.querySelector('.widget-title[data-id="' + id + '"]');
    if(titleEl){ titleEl.focus(); document.execCommand('selectAll', false, null); }
}
function focusBookmarkInput(id){ var inp = document.getElementById('bmInput_' + id); if(inp) inp.focus(); }
function focusRSSInput(id){ var inp = document.getElementById('rssInput_' + id); if(inp) inp.focus(); }
function focusEmbedInput(id){ var inp = document.getElementById('embedInput_' + id); if(inp) inp.focus(); }
function openAllBookmarks(id){
    var widget = window.widgetsData.find(function(w){ return w.id === id; });
    if(widget && widget.data && widget.data.bookmarks){ widget.data.bookmarks.forEach(function(b){ window.open(b.url, '_blank'); }); showToast('Opened ' + widget.data.bookmarks.length + ' links', 'success'); }
}
function refreshRSS(id){ showToast('Refreshing RSS feed...', 'success'); }
function addNote(id){ showToast('Note added', 'success'); }
function addTaskList(id){ showToast('Task list added', 'success'); }

// ===== BOOKMARK FUNCTIONS =====
async function addBookmark(widgetId, input){
    var url = input.value.trim(); if(!url) return; if(!url.startsWith('http')){ showToast('Enter a valid URL', 'error'); return; }
    input.value = ''; input.placeholder = 'Fetching...'; input.disabled = true; showLoading();
    try {
        var hostname = new URL(url).hostname;
        var favicon = 'https://www.google.com/s2/favicons?domain=' + hostname + '&sz=64';
        var title = hostname; var description = '';
        try { var res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(url)); var d = await res.json(); if(d.status === 'success'){ if(d.data.title) title = d.data.title; if(d.data.description) description = d.data.description; } } catch(e){}
        var db = window.db, COL = window.COL, docFn = window.docFn, getDocFn = window.getDocFn, setDocFn = window.setDocFn, sts = window.serverTimestampFn;
        var ref = docFn(db, COL.WIDGETS, widgetId); var snap = await getDocFn(ref);
        if(snap.exists()){ var w = snap.data(); var bm = w.data && w.data.bookmarks ? w.data.bookmarks : []; bm.push({url:url,title:title,description:description,favicon:favicon,hostname:hostname}); await setDocFn(ref, {data: Object.assign({}, w.data, {bookmarks:bm}), updatedAt:sts()}, {merge:true}); showToast('Bookmark added!', 'success'); }
    } catch(e){ showToast('Failed to add bookmark', 'error'); }
    input.disabled = false; input.placeholder = 'Paste URL and press Enter'; hideLoading();
}

// ===== TASK FUNCTIONS =====
async function addTask(widgetId, input){
    var text = input.value.trim(); if(!text) return; input.value = '';
    var db = window.db, COL = window.COL, docFn = window.docFn, getDocFn = window.getDocFn, setDocFn = window.setDocFn, sts = window.serverTimestampFn;
    var ref = docFn(db, COL.WIDGETS, widgetId); var snap = await getDocFn(ref);
    if(snap.exists()){ var w = snap.data(); var tasks = w.data && w.data.tasks ? w.data.tasks : []; tasks.push({text:text,done:false}); await setDocFn(ref, {data: Object.assign({}, w.data, {tasks:tasks}), updatedAt:sts()}, {merge:true}); }
}

async function toggleTask(widgetId, index){
    var db = window.db, COL = window.COL, docFn = window.docFn, getDocFn = window.getDocFn, setDocFn = window.setDocFn, sts = window.serverTimestampFn;
    var ref = docFn(db, COL.WIDGETS, widgetId); var snap = await getDocFn(ref);
    if(snap.exists()){ var w = snap.data(); var tasks = w.data && w.data.tasks ? w.data.tasks : []; if(tasks[index]){ tasks[index].done = !tasks[index].done; await setDocFn(ref, {data: Object.assign({}, w.data, {tasks:tasks}), updatedAt:sts()}, {merge:true}); } }
}

async function saveNotes(widgetId, content){
    var db = window.db, COL = window.COL, docFn = window.docFn, setDocFn = window.setDocFn, sts = window.serverTimestampFn;
    await setDocFn(docFn(db, COL.WIDGETS, widgetId), {data: {content: content}, updatedAt:sts()}, {merge:true});
}

// ===== EMBED =====
function detectEmbedType(url){
    try { var h = new URL(url).hostname; if(h.includes('youtube.com')||h.includes('youtu.be')) return 'youtube'; if(h.includes('vimeo.com')) return 'vimeo'; if(h.includes('figma.com')) return 'figma'; if(h.includes('docs.google.com')) return 'gdocs'; return 'website'; } catch(e){ return 'invalid'; }
}

async function embedContent(widgetId, url){
    if(!url) return;
    var container = document.getElementById('embedContainer_' + widgetId);
    var type = detectEmbedType(url);
    if(type === 'youtube'){ var vid = url.match(/(?:v=|\/)([\w-]{11})/); vid = vid ? vid[1] : null; if(vid) container.innerHTML = '<div class="embed-preview"><iframe src="https://www.youtube.com/embed/' + vid + '" allowfullscreen></iframe></div>'; }
    else if(type === 'vimeo'){ var vid = url.match(/vimeo\.com\/(\d+)/); vid = vid ? vid[1] : null; if(vid) container.innerHTML = '<div class="embed-preview"><iframe src="https://player.vimeo.com/video/' + vid + '" allowfullscreen></iframe></div>'; }
    else if(type === 'gdocs'){ container.innerHTML = '<div class="embed-preview"><iframe src="' + url + '" allowfullscreen></iframe></div>'; }
    else if(type === 'figma'){ container.innerHTML = '<div class="embed-preview"><iframe src="https://www.figma.com/embed?embed_host=astra&url=' + encodeURIComponent(url) + '" allowfullscreen></iframe></div>'; }
    else { container.innerHTML = '<div style="text-align:center;padding:16px"><p style="color:#999;font-size:11px;margin-bottom:6px">Preview not available</p><a href="' + url + '" target="_blank" style="color:var(--orange-500);font-size:11px;font-weight:600">Open in new tab →</a></div>'; }
}

// ===== CLOCK =====
function startClock(widgetId){
    var update = function(){
        var el = document.getElementById('clock_' + widgetId);
        if(!el) return;
        var now = new Date();
        el.textContent = now.toLocaleTimeString();
        var dateEl = document.getElementById('clockDate_' + widgetId);
        if(dateEl) dateEl.textContent = now.toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric'});
    };
    update();
    setInterval(update, 1000);
}

// ===== CALCULATOR =====
function calcInput(widgetId, key){ var input = document.getElementById('calcInput_' + widgetId); if(input) input.value += key; }
function calcResult(widgetId){ var input = document.getElementById('calcInput_' + widgetId); if(!input) return; try { input.value = Function('"use strict";return (' + input.value + ')')(); } catch(e){ input.value = 'Error'; } }
function calcClear(widgetId){ var input = document.getElementById('calcInput_' + widgetId); if(input) input.value = ''; }

// ===== RENDER WIDGETS =====
function renderWidgets(){
    var grid = D('widgetGrid');
    var empty = D('emptyState');
    var wData = window.widgetsData || [];
    
    if(wData.length === 0){ grid.innerHTML = ''; empty.style.display = 'flex'; return; }
    empty.style.display = 'none';
    
    grid.innerHTML = wData.map(function(w){
        var menuItems = getWidgetMenuItems(w);
        var body = '';
        
        switch(w.type){
            case 'bookmarks':
                var bm = w.data && w.data.bookmarks ? w.data.bookmarks : [];
                body = '<input type="url" class="widget-input" id="bmInput_' + w.id + '" placeholder="Paste URL and press Enter" onkeydown="if(event.key===\'Enter\')addBookmark(\'' + w.id + '\',this)">';
                body += bm.map(function(b){
                    return '<a href="' + b.url + '" target="_blank" class="bookmark-item" rel="noopener"><img src="' + b.favicon + '" class="bookmark-favicon" onerror="this.style.display=\'none\'"><div class="bookmark-info"><div class="bookmark-btitle">' + (b.title || '') + '</div>' + (b.description ? '<div class="bookmark-desc">' + b.description + '</div>' : '') + '<div class="bookmark-burl">' + (b.hostname || '') + '</div></div></a>';
                }).join('');
                break;
            case 'notes':
                body = '<div class="note-toolbar"><button title="Bold" onclick="document.execCommand(\'bold\')"><b>B</b></button><button title="Italic" onclick="document.execCommand(\'italic\')"><i>I</i></button><button title="Underline" onclick="document.execCommand(\'underline\')"><u>U</u></button><button title="List" onclick="document.execCommand(\'insertUnorderedList\')">≡</button><button title="Link" onclick="var u=prompt(\'URL:\');if(u)document.execCommand(\'createLink\',false,u)">🔗</button></div><textarea class="widget-textarea" placeholder="Write your notes here..." oninput="saveNotes(\'' + w.id + '\',this.value)">' + (w.data && w.data.content ? w.data.content : '') + '</textarea>';
                break;
            case 'tasks':
                var tasks = w.data && w.data.tasks ? w.data.tasks : [];
                var done = tasks.filter(function(t){ return t.done; }).length;
                var pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;
                body = (tasks.length > 0 ? '<div class="task-progress"><div class="task-progress-bar" style="width:' + pct + '%"></div></div><div style="font-size:10px;color:#999;margin-bottom:6px">' + done + '/' + tasks.length + ' done (' + pct + '%)</div>' : '');
                body += '<input type="text" class="widget-input" placeholder="New task + Enter" onkeydown="if(event.key===\'Enter\')addTask(\'' + w.id + '\',this)">';
                body += tasks.map(function(t, i){
                    return '<div class="task-item" onclick="toggleTask(\'' + w.id + '\',' + i + ')"><iconify-icon icon="' + (t.done ? 'mdi:checkbox-marked' : 'mdi:checkbox-blank-outline') + '" width="15" height="15" style="color:' + (t.done ? 'var(--green-500)' : '#ccc') + ';flex-shrink:0"></iconify-icon><span style="text-decoration:' + (t.done ? 'line-through' : 'none') + ';opacity:' + (t.done ? '0.5' : '1') + ';font-size:12px">' + t.text + '</span></div>';
                }).join('');
                break;
            case 'embed':
                body = '<input type="url" class="widget-input" id="embedInput_' + w.id + '" placeholder="Paste URL (YouTube, Figma, Docs...)" onkeydown="if(event.key===\'Enter\')embedContent(\'' + w.id + '\',this.value)"><div id="embedContainer_' + w.id + '"><div style="text-align:center;padding:24px;color:#bbb"><iconify-icon icon="mdi:code-tags" width="28" height="28"></iconify-icon><p style="margin-top:6px;font-size:11px">Paste a URL to embed</p></div></div>';
                break;
            case 'project':
                body = '<input type="text" class="widget-input" placeholder="Project name"><input type="url" class="widget-input" placeholder="GitHub repo URL (optional)"><div style="text-align:center;padding:16px;color:#bbb;font-size:11px">Add a project to get started</div>';
                break;
            case 'clock':
                body = '<div class="clock-display"><div class="clock-time" id="clock_' + w.id + '">--:--:--</div><div class="clock-date" id="clockDate_' + w.id + '"></div></div>';
                setTimeout(function(){ startClock(w.id); }, 100);
                break;
            case 'calculator':
                var keys = ['C','÷','×','−','7','8','9','+','4','5','6','=','1','2','3','.','0','00',''];
                body = '<div class="calc-display" id="calcDisplay_' + w.id + '">0</div><div class="calc-grid">';
                body += keys.map(function(k){
                    var acts = {'C':'C','÷':'/','×':'*','−':'-'};
                    var v = acts[k] || k;
                    if(k === 'C') return '<button class="calc-btn" onclick="calcClear(\'' + w.id + '\')" style="color:var(--red-500)">C</button>';
                    if(k === '=') return '<button class="calc-btn equals" onclick="calcResult(\'' + w.id + '\')">=</button>';
                    if('÷×−+'.indexOf(k) >= 0) return '<button class="calc-btn operator" onclick="calcInput(\'' + w.id + '\',\'' + v + '\')">' + k + '</button>';
                    if(!k) return '<div></div>';
                    return '<button class="calc-btn" onclick="calcInput(\'' + w.id + '\',\'' + v + '\')">' + k + '</button>';
                }).join('');
                body += '</div><input type="hidden" id="calcInput_' + w.id + '" value="">';
                break;
            case 'gallery':
                body = '<div class="gallery-grid" id="galleryGrid_' + w.id + '"><div style="text-align:center;padding:20px;color:#bbb;grid-column:1/-1"><iconify-icon icon="mdi:image-multiple-outline" width="28" height="28"></iconify-icon><p style="margin-top:6px;font-size:11px">Upload images</p></div></div><input type="file" class="widget-input" accept="image/*" multiple style="margin-top:6px">';
                break;
            case 'rss':
                body = '<input type="url" class="widget-input" id="rssInput_' + w.id + '" placeholder="Enter RSS feed URL"><div id="rssContent_' + w.id + '"><div style="text-align:center;padding:20px;color:#bbb"><iconify-icon icon="mdi:rss" width="28" height="28"></iconify-icon><p style="margin-top:6px;font-size:11px">Enter an RSS feed URL</p></div></div>';
                break;
            default:
                body = '<p style="color:#999;text-align:center;padding:16px">Widget ready</p>';
        }
        
        var menuHTML = menuItems.map(function(m){
            if(m.label === 'divider') return '<div class="dropdown-divider"></div>';
            return '<button class="dropdown-item' + (m.danger ? ' danger' : '') + '" onclick="' + m.action + ';document.getElementById(\'widgetMenu_' + w.id + '\').classList.remove(\'show\')"><iconify-icon icon="' + m.icon + '" width="14" height="14"></iconify-icon>' + m.label + '</button>';
        }).join('');
        
        return '<div class="widget" data-id="' + w.id + '"><div class="widget-header"><span class="widget-title" contenteditable="true" data-id="' + w.id + '" spellcheck="false" onblur="renameWidget(\'' + w.id + '\',this.textContent)" onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur()}">' + (w.title || 'Untitled') + '</span><div class="widget-hover-actions"><button class="widget-action-btn" title="Edit title" onclick="editWidgetTitle(\'' + w.id + '\')"><iconify-icon icon="mdi:pencil-outline" width="14" height="14"></iconify-icon></button><div style="position:relative"><button class="widget-menu-btn" title="Menu" onclick="toggleWidgetMenu(\'' + w.id + '\',event)"><iconify-icon icon="mdi:dots-horizontal" width="16" height="16"></iconify-icon></button><div class="dropdown-menu left" id="widgetMenu_' + w.id + '" style="min-width:180px">' + menuHTML + '</div></div></div></div><div class="widget-body">' + body + '</div></div>';
    }).join('');
}

// ===== CLICK OUTSIDE =====
document.addEventListener('click', function(e){
    if(!e.target.closest('.dropdown')){
        D('avatarMenu').classList.remove('show');
    }
    if(e.target.classList.contains('modal-overlay')){
        e.target.classList.remove('show');
    }
    if(!e.target.closest('.widget-menu-btn') && !e.target.closest('.dropdown-menu')){
        document.querySelectorAll('[id^="widgetMenu_"]').forEach(function(m){ m.classList.remove('show'); });
    }
});

document.addEventListener('keydown', function(e){
    if(e.key === 'Escape'){
        document.querySelectorAll('.modal-overlay.show').forEach(function(m){ m.classList.remove('show'); });
        D('avatarMenu').classList.remove('show');
        closePagesSidebar();
        document.querySelectorAll('[id^="widgetMenu_"]').forEach(function(m){ m.classList.remove('show'); });
    }
});

// ===== SIGN OUT =====
async function handleSignOut(){
    var auth = window.auth;
    var mod = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js");
    await mod.signOut(auth);
    window.location.href = 'sign.html';
}
