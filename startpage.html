        // ============================================================
        // DRAG & DROP
        // ============================================================
        let dragWidgetId = null;

        function onDragStart(e) {
            if (!editMode) return;
            const widget = e.target.closest('.widget');
            if (!widget) return;
            dragWidgetId = widget.dataset.widgetId;
            widget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragWidgetId);
        }

        function onDragEnd(e) {
            const widget = e.target.closest('.widget');
            if (widget) widget.classList.remove('dragging');
            document.querySelectorAll('.widget.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function onDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('.widget');
            if (target) target.classList.add('drag-over');
        }

        function onDragEnter(e) {
            e.preventDefault();
            const target = e.target.closest('.widget');
            if (target) target.classList.add('drag-over');
        }

        function onDragLeave(e) {
            const target = e.target.closest('.widget');
            if (target) target.classList.remove('drag-over');
        }

        async function onDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.widget');
            if (!target) return;
            target.classList.remove('drag-over');

            const fromId = e.dataTransfer.getData('text/plain');
            const toId = target.dataset.widgetId;
            if (!fromId || !toId || fromId === toId) return;

            const fromIndex = widgets.findIndex(w => w.id === fromId);
            const toIndex = widgets.findIndex(w => w.id === toId);
            if (fromIndex === -1 || toIndex === -1) return;

            // Reorder in state
            const [moved] = widgets.splice(fromIndex, 1);
            widgets.splice(toIndex, 0, moved);

            // Update order in Firebase
            try {
                const batch = writeBatch(db);
                widgets.forEach((w, i) => {
                    const ref = doc(db, COLLECTIONS.WIDGETS, w.id);
                    batch.update(ref, { order: i, updatedAt: serverTimestamp() });
                });
                await batch.commit();
            } catch (error) {
                console.error('Error reordering widgets:', error);
                showToast('Error reordering widgets', 'error');
            }
        }

        // ============================================================
        // RESIZE
        // ============================================================
        let resizeData = null;

        function onResizeStart(e) {
            e.preventDefault();
            const widget = e.target.closest('.widget');
            if (!widget) return;
            const rect = widget.getBoundingClientRect();
            resizeData = {
                widget: widget,
                startX: e.clientX,
                startY: e.clientY,
                startWidth: rect.width,
                startHeight: rect.height,
                widgetId: widget.dataset.widgetId,
            };
            document.addEventListener('mousemove', onResizeMove);
            document.addEventListener('mouseup', onResizeEnd);
            widget.classList.add('resizing');
        }

        function onResizeMove(e) {
            if (!resizeData) return;
            const dx = e.clientX - resizeData.startX;
            const dy = e.clientY - resizeData.startY;
            const newWidth = Math.max(200, resizeData.startWidth + dx);
            const newHeight = Math.max(140, resizeData.startHeight + dy);
            resizeData.widget.style.width = newWidth + 'px';
            resizeData.widget.style.height = newHeight + 'px';
            resizeData.widget.style.gridColumn = 'span ' + Math.ceil(newWidth / 240);
        }

        async function onResizeEnd(e) {
            if (!resizeData) return;
            const widget = resizeData.widget;
            widget.classList.remove('resizing');

            const width = widget.style.width;
            const height = widget.style.height;

            if (width && height) {
                const cols = Math.ceil(parseInt(width) / 240);
                const size = cols <= 1 ? 'small' : cols <= 2 ? 'medium' : cols <= 3 ? 'large' : 'full';
                const h = parseInt(height);
                const heightClass = h < 180 ? 'sm' : h < 260 ? 'md' : h < 360 ? 'lg' : 'xl';

                const widgetId = resizeData.widgetId;
                try {
                    await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                        size: size,
                        height: heightClass,
                        updatedAt: serverTimestamp()
                    });
                } catch (error) {
                    console.error('Error saving resize:', error);
                }
            }

            resizeData = null;
            document.removeEventListener('mousemove', onResizeMove);
            document.removeEventListener('mouseup', onResizeEnd);
        }

        // ============================================================
        // SEARCH
        // ============================================================
        function doSearch() {
            const input = document.getElementById('searchInput');
            const engine = document.getElementById('searchEngine');
            const query = input.value.trim();
            if (!query) return;
            window.open(engine.value + encodeURIComponent(query), '_blank');
        }

        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch();
        });

        function openSearchModal() {
            document.getElementById('searchModal').classList.add('open');
            document.getElementById('dashboardSearch').value = '';
            document.getElementById('searchResults').innerHTML = '';
            setTimeout(() => document.getElementById('dashboardSearch').focus(), 100);
        }

        document.getElementById('dashboardSearch').addEventListener('input', () => {
            const query = document.getElementById('dashboardSearch').value.trim().toLowerCase();
            const results = document.getElementById('searchResults');

            if (!query) { results.innerHTML = ''; return; }

            const matches = [];

            widgets.forEach(w => {
                if (w.type === 'bookmarks' && w.data?.items) {
                    w.data.items.forEach(b => {
                        if (b.name.toLowerCase().includes(query) || (b.url && b.url.toLowerCase()
                                .includes(query))) {
                            matches.push({ type: 'Bookmark', name: b.name, url: b.url, widget: w
                                    .title });
                        }
                    });
                }
                if (w.type === 'projects' && w.data?.items) {
                    w.data.items.forEach(p => {
                        if (p.name.toLowerCase().includes(query)) {
                            matches.push({ type: 'Project', name: p.name, status: p.status,
                                widget: w.title });
                        }
                    });
                }
                if (w.type === 'notes' && w.data?.content) {
                    if (w.data.content.toLowerCase().includes(query)) {
                        matches.push({ type: 'Note', name: w.title, widget: w.title });
                    }
                }
                if (w.type === 'tasks' && w.data?.items) {
                    w.data.items.forEach(t => {
                        if (t.text.toLowerCase().includes(query)) {
                            matches.push({ type: 'Task', name: t.text, done: t.done, widget: w
                                    .title });
                        }
                    });
                }
            });

            if (matches.length === 0) {
                results.innerHTML =
                    '<div style="text-align:center;color:var(--black-30);padding:20px;">No results found</div>';
            } else {
                results.innerHTML = matches.map(m => `
                            <div style="display:flex;gap:10px;padding:8px 12px;border-bottom:1px solid var(--black-5);font-size:13px;align-items:center;">
                                <span style="font-weight:600;color:var(--orange-500);font-size:11px;">${m.type}</span>
                                <span style="flex:1;">${m.name}</span>
                                <span style="color:var(--black-40);font-size:11px;">${m.widget}</span>
                            </div>
                        `).join('');
            }
        });

        // ============================================================
        // MODALS
        // ============================================================
        function openAddWidget() {
            document.getElementById('addWidgetModal').classList.add('open');
            renderWidgetPicker();
        }

        function renderWidgetPicker() {
            const container = document.getElementById('widgetPicker');
            container.innerHTML = WIDGET_TYPES.map(w => `
                        <div class="widget-picker__item" onclick="addWidget('${w.id}')">
                            <span class="icon">${w.icon}</span>
                            <span class="name">${w.name}</span>
                        </div>
                    `).join('');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        document.querySelectorAll('.modal-overlay').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target === el) el.classList.remove('open');
            });
        });

        // ============================================================
        // PROFILE / LOGOUT
        // ============================================================
        function toggleProfileMenu() {
            if (confirm('Logout from DockGrid?')) {
                logout();
            }
        }

        async function logout() {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
                showToast('Error logging out', 'error');
            }
        }

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastOut 400ms ease-out forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        // ============================================================
        // CLOCK
        // ============================================================
        function startClock() {
            updateClock();
            setInterval(updateClock, 1000);
        }

        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            const date = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            const timeEl = document.getElementById('clockTime');
            const dateEl = document.getElementById('clockDate');

            if (timeEl) timeEl.textContent = time;
            if (dateEl) dateEl.textContent = date;
        }

        // Start clock
        setInterval(updateClock, 1000);
        updateClock();

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                toggleEditMode();
            }
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.open').forEach(el => el.classList.remove('open'));
                if (document.getElementById('sidebar').classList.contains('open')) {
                    closeSidebar();
                }
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') {
                e.preventDefault();
                toggleSidebar();
            }
            if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                if (!document.activeElement || document.activeElement.tagName !== 'INPUT') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            }
        });

        // ============================================================
        // MAKE FUNCTIONS GLOBAL
        // ============================================================
        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;
        window.switchPage = switchPage;
        window.addPage = addPage;
        window.addWidget = addWidget;
        window.deleteWidget = deleteWidget;
        window.duplicateWidget = duplicateWidget;
        window.refreshWidget = refreshWidget;
        window.openWidgetSettings = openWidgetSettings;
        window.openAddWidget = openAddWidget;
        window.openBackgroundModal = openBackgroundModal;
        window.applyBackground = applyBackground;
        window.resetBackground = resetBackground;
        window.openSearchModal = openSearchModal;
        window.toggleEditMode = toggleEditMode;
        window.doSearch = doSearch;
        window.closeModal = closeModal;
        window.showToast = showToast;
        window.logout = logout;
        window.toggleProfileMenu = toggleProfileMenu;
        window.addTask = addTask;
        window.toggleTask = toggleTask;
        window.askAI = askAI;
        window.saveNoteContent = saveNoteContent;

        // ============================================================
        // EXPOSE TO CONSOLE FOR DEBUGGING
        // ============================================================
        console.log('%c🚀 DockGrid Dashboard %cv1.0 (Firebase)',
            'font-size:20px;font-weight:900;color:#ff6b35;font-family:monospace;',
            'font-size:14px;color:#000;');
        console.log('%c📊 ' + pages.length + ' pages · ' + widgets.length + ' widgets',
            'color:#555;');
        console.log('%c🔧 Press Ctrl+Shift+E to toggle edit mode', 'color:#777;font-size:11px;');
        console.log('%c🔍 Press / to focus search', 'color:#777;font-size:11px;');
        console.log('%c☁️ All data stored in Firebase Firestore', 'color:#777;font-size:11px;');
        console.log('%c👤 User:', currentUser?.email || 'Not logged in', 'color:#777;font-size:11px;');

        console.log('🔧 Available functions:', {
            addWidget: window.addWidget,
            deleteWidget: window.deleteWidget,
            duplicateWidget: window.duplicateWidget,
            addPage: window.addPage,
            switchPage: window.switchPage,
            toggleEditMode: window.toggleEditMode,
            logout: window.logout
        });
    </script>
