                        </div>
                        <div class="task-add">
                            <input class="task-add__input" id="taskInput_${widgetId}" placeholder="Add a task..." />
                            <button class="task-add__btn" data-widget-id="${widgetId}">Add</button>
                        </div>
                    `;
        }

        function renderNotes(data, widgetId) {
            return `<textarea class="note-editor" data-widget-id="${widgetId}" placeholder="Write your note...">${data?.content || ''}</textarea>`;
        }

        function renderWeather(data) {
            const d = data || { city: 'San Francisco', temp: 72, condition: 'Sunny', humidity: 45, wind: 12 };
            return `
                        <div class="weather-display">
                            <div>
                                <div class="weather-display__temp">${d.temp || '--'}°<span>F</span></div>
                                <div style="font-size:14px;font-weight:600;color:var(--white-alpha-60);">${d.condition || '--'}</div>
                            </div>
                            <div class="weather-display__details">
                                <div><span class="label">📍</span> ${d.city || 'Unknown'}</div>
                                <div><span class="label">💧</span> ${d.humidity || '--'}%</div>
                                <div><span class="label">💨</span> ${d.wind || '--'} mph</div>
                            </div>
                        </div>
                    `;
        }

        function renderRSS(data) {
            const items = data?.items || [];
            if (items.length === 0) return `<div class="widget__body--empty">Add an RSS feed URL</div>`;
            return `
                        <div class="rss-list">
                            ${items.map(item => `
                                <a class="rss-item" href="#">
                                    <div class="rss-item__icon">📰</div>
                                    <div class="rss-item__content">
                                        <div class="rss-item__title">${item.title}</div>
                                        <div class="rss-item__meta">${item.source || ''} · ${item.time || ''}</div>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    `;
        }

        function renderClock(data) {
            return `
                        <div class="clock-display">
                            <div class="clock-display__time" id="clockTime">--:--:--</div>
                            <div class="clock-display__date" id="clockDate">Loading...</div>
                        </div>
                    `;
        }

        function renderCalendar(data) {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = now.getDate();
            const events = data?.events || [];
            const eventDates = events.map(e => e.date);

            let days = '';
            for (let i = 0; i < firstDay; i++) {
                days += `<div class="calendar-grid__day other-month"></div>`;
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = d === today ? 'today' : '';
                const hasEvent = eventDates.includes(dateStr) ? 'has-event' : '';
                days += `<div class="calendar-grid__day ${isToday} ${hasEvent}">${d}</div>`;
            }

            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September',
                'October', 'November', 'December'
            ];

            return `
                        <div style="text-align:center;font-weight:700;color:var(--white);margin-bottom:8px;">${monthNames[month]} ${year}</div>
                        <div class="calendar-grid">
                            ${['S','M','T','W','T','F','S'].map(d => `<div class="calendar-grid__header">${d}</div>`).join('')}
                            ${days}
                        </div>
                    `;
        }

        function renderEmbed(data) {
            const url = data?.url || '';
            return `
                        <div class="embed-container">
                            ${url ? `<iframe src="${url}" allowfullscreen loading="lazy"></iframe>` :
                                `<div class="widget__body--empty">Enter a URL in settings</div>`}
                        </div>
                    `;
        }

        // ============================================================
        // WIDGET CRUD (Firebase)
        // ============================================================
        async function addWidget(type) {
            if (!currentUser || !currentPageId) return;

            // Get metadata for bookmark
            let widgetData = getDefaultWidgetData(type);

            // For bookmarks, prompt for URL
            if (type === 'bookmarks') {
                const url = prompt('Enter website URL:');
                if (!url) return;
                try {
                    // Fetch metadata via Microlink API
                    const response = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    if (data.data) {
                        const meta = data.data;
                        widgetData.items = [{
                            url: url,
                            title: meta.title || url,
                            description: meta.description || '',
                            icon: meta.logo?.url || ''
                        }];
                        showToast('Bookmark added with metadata!', 'success');
                    } else {
                        widgetData.items = [{ url: url, title: url }];
                    }
                } catch {
                    widgetData.items = [{ url: url, title: url }];
                }
            }

            // For RSS, prompt for feed URL
            if (type === 'rss') {
                const feed = prompt('Enter RSS feed URL:');
                if (!feed) return;
                widgetData.feed = feed;
                try {
                    // Try to fetch feed metadata (simplified)
                    widgetData.items = [
                        { title: 'Loading feed...', source: 'Fetching...', time: 'Just now' }
                    ];
                    // In production, use rss-parser
                } catch {
                    widgetData.items = [{ title: 'Sample article', source: 'Example', time: '1h ago' }];
                }
            }

            // For projects
            if (type === 'projects') {
                const name = prompt('Project name:');
                if (!name) return;
                const repo = prompt('GitHub repo URL (optional):');
                widgetData.items = [{
                    name: name,
                    progress: 0,
                    status: 'planning',
                    deadline: '',
                    repo: repo || ''
                }];
                // Try to fetch GitHub data
                if (repo) {
                    try {
                        const repoPath = repo.replace('https://github.com/', '');
                        const ghResponse = await fetch(`https://api.github.com/repos/${repoPath}`);
                        if (ghResponse.ok) {
                            const ghData = await ghResponse.json();
                            widgetData.items[0].progress = 50;
                            widgetData.items[0].status = 'progress';
                            widgetData.items[0].stars = ghData.stargazers_count;
                            widgetData.items[0].language = ghData.language;
                            showToast('GitHub data fetched!', 'success');
                        }
                    } catch {}
                }
            }

            // For embed
            if (type === 'embed') {
                const url = prompt('Enter embed URL:');
                if (!url) return;
                widgetData.url = url;
            }

            // For notes
            if (type === 'notes') {
                const content = prompt('Enter your note:');
                if (content !== null) widgetData.content = content;
                else return;
            }

            // For tasks
            if (type === 'tasks') {
                const task = prompt('Enter task:');
                if (!task) return;
                widgetData.items = [{ text: task, done: false, priority: 'medium', due: '' }];
            }

            try {
                const newWidget = {
                    userId: currentUser.uid,
                    pageId: currentPageId,
                    type: type,
                    title: getWidgetTypeName(type),
                    size: 'small',
                    height: 'md',
                    color: null,
                    data: widgetData,
                    order: widgets.length,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                };
                const docRef = doc(collection(db, COLLECTIONS.WIDGETS));
                await setDoc(docRef, newWidget);
                closeModal('addWidgetModal');
                showToast(`Added ${getWidgetTypeName(type)} widget!`, 'success');
            } catch (error) {
                console.error('Error adding widget:', error);
                showToast('Error adding widget', 'error');
            }
        }

        async function deleteWidget(widgetId) {
            if (!confirm('Delete this widget?')) return;
            try {
                await deleteDoc(doc(db, COLLECTIONS.WIDGETS, widgetId));
                showToast('Widget deleted', 'success');
            } catch (error) {
                console.error('Error deleting widget:', error);
                showToast('Error deleting widget', 'error');
            }
        }

        async function duplicateWidget(widgetId) {
            if (!currentUser || !currentPageId) return;
            try {
                const original = widgets.find(w => w.id === widgetId);
                if (!original) return;
                const copy = {
                    userId: currentUser.uid,
                    pageId: currentPageId,
                    type: original.type,
                    title: original.title + ' (copy)',
                    size: original.size || 'small',
                    height: original.height || 'md',
                    color: original.color || null,
                    data: JSON.parse(JSON.stringify(original.data || {})),
                    order: widgets.length,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                };
                const docRef = doc(collection(db, COLLECTIONS.WIDGETS));
                await setDoc(docRef, copy);
                showToast('Widget duplicated!', 'success');
            } catch (error) {
                console.error('Error duplicating widget:', error);
                showToast('Error duplicating widget', 'error');
            }
        }

        async function renameWidget(widgetId, newTitle) {
            try {
                await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                    title: newTitle,
                    updatedAt: serverTimestamp()
                });
                showToast('Widget renamed!', 'success');
            } catch (error) {
                console.error('Error renaming widget:', error);
                showToast('Error renaming widget', 'error');
            }
        }

        async function openWidgetSettings(widgetId) {
            const widget = widgets.find(w => w.id === widgetId);
            if (!widget) return;

            const title = prompt('Widget title:', widget.title);
            if (title !== null) widget.title = title || 'Widget';

            const size = prompt('Size (small, medium, large, full):', widget.size || 'small');
            if (size !== null && ['small', 'medium', 'large', 'full'].includes(size)) widget.size = size;

            const height = prompt('Height (sm, md, lg, xl):', widget.height || 'md');
            if (height !== null && ['sm', 'md', 'lg', 'xl'].includes(height)) widget.height = height;

            if (widget.type === 'embed') {
                const url = prompt('Embed URL:', widget.data?.url || '');
                if (url !== null) widget.data.url = url;
            }
            if (widget.type === 'weather') {
                const city = prompt('City:', widget.data?.city || '');
                if (city !== null) widget.data.city = city;
            }
            if (widget.type === 'rss') {
                const feed = prompt('RSS Feed URL:', widget.data?.feed || '');
                if (feed !== null) {
                    widget.data.feed = feed;
                    // Try to fetch feed
                    try {
                        widget.data.items = [
                            { title: 'Loading feed...', source: 'Fetching...', time: 'Just now' }
                        ];
                        showToast('Feed updated!', 'success');
                    } catch {}
                }
            }
            if (widget.type === 'bookmarks' && widget.data?.items) {
                const url = prompt('Add bookmark URL:', 'https://');
                if (url) {
                    try {
                        const response = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                        const data = await response.json();
                        if (data.data) {
                            widget.data.items.push({
                                url: url,
                                title: data.data.title || url,
                                icon: data.data.logo?.url || ''
                            });
                        } else {
                            widget.data.items.push({ url: url, title: url });
                        }
                    } catch {
                        widget.data.items.push({ url: url, title: url });
                    }
                }
            }

            try {
                await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                    title: widget.title,
                    size: widget.size,
                    height: widget.height,
                    data: widget.data,
                    updatedAt: serverTimestamp()
                });
                showToast('Widget updated!', 'success');
            } catch (error) {
                console.error('Error updating widget:', error);
                showToast('Error updating widget', 'error');
            }
        }

        // ============================================================
        // TASKS (Firebase)
        // ============================================================
        async function addTask(widgetId, text) {
            if (!text || !text.trim()) return;
            const widget = widgets.find(w => w.id === widgetId);
            if (!widget) return;
            if (!widget.data.items) widget.data.items = [];
            widget.data.items.push({ text: text.trim(), done: false, priority: 'medium', due: '' });
            try {
                await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                    data: widget.data,
                    updatedAt: serverTimestamp()
                });
                const input = document.getElementById('taskInput_' + widgetId);
                if (input) input.value = '';
            } catch (error) {
                console.error('Error adding task:', error);
                showToast('Error adding task', 'error');
            }
        }

        async function toggleTask(widgetId, index) {
            const widget = widgets.find(w => w.id === widgetId);
            if (!widget || !widget.data.items || index >= widget.data.items.length) return;
            widget.data.items[index].done = !widget.data.items[index].done;
            try {
                await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                    data: widget.data,
                    updatedAt: serverTimestamp()
                });
            } catch (error) {
                console.error('Error toggling task:', error);
            }
        }

        // ============================================================
        // NOTES (Firebase)
        // ============================================================
        let noteTimeout = {};

        async function saveNoteContent(widgetId, content) {
            clearTimeout(noteTimeout[widgetId]);
            noteTimeout[widgetId] = setTimeout(async () => {
                const widget = widgets.find(w => w.id === widgetId);
                if (!widget) return;
                widget.data.content = content;
                try {
                    await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                        data: widget.data,
                        updatedAt: serverTimestamp()
                    });
                } catch (error) {
                    console.error('Error saving note:', error);
                }
            }, 500);
        }

        // ============================================================
        // BACKGROUND
        // ============================================================
        function applyBackground(url) {
            if (!url) return;
            appBg.style.backgroundImage = `url(${url})`;
            appBg.style.backgroundSize = 'cover';
            appBg.style.backgroundPosition = 'center';
        }

        async function setBackground(url) {
            if (!currentUser) return;
            try {
                await updateDoc(doc(db, COLLECTIONS.SETTINGS, currentUser.uid), {
                    background: url,
                    updatedAt: serverTimestamp()
                });
                settings.background = url;
                applyBackground(url);
                closeModal('bgModal');
                showToast('Background updated!', 'success');
            } catch (error) {
                console.error('Error setting background:', error);
                showToast('Error setting background', 'error');
            }
        }

        function resetBackground() {
            setBackground(DEFAULT_BG);
        }

        // ============================================================
        // IMGBB UPLOAD
        // ============================================================
        async function uploadImage(file) {
            const formData = new FormData();
            formData.append('image', file);
            formData.append('key', IMGBB_API_KEY);

            try {
                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    return data.data.url;
                } else {
                    throw new Error(data.error?.message || 'Upload failed');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showToast('Upload failed: ' + error.message, 'error');
                return null;
            }
        }

        // ============================================================
        // PROFILE IMAGE
        // ============================================================
        async function changeProfileImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const url = await uploadImage(file);
                if (!url) return;

                try {
                    await updateProfile(currentUser, { photoURL: url });
                    await updateDoc(doc(db, COLLECTIONS.SETTINGS, currentUser.uid), {
                        profileImage: url,
                        updatedAt: serverTimestamp()
                    });
                    updateAvatar();
                    showToast('Profile image updated!', 'success');
                } catch (error) {
                    console.error('Error updating profile:', error);
                    showToast('Error updating profile image', 'error');
                }
            };
            input.click();
        }

        // ============================================================
        // BACKGROUND MODAL
        // ============================================================
        function openBackgroundModal() {
            document.getElementById('bgModal').classList.add('open');
            renderBgGrid();
        }

        function renderBgGrid() {
            const grid = document.getElementById('bgGrid');
            const currentBg = settings.background || DEFAULT_BG;

            grid.innerHTML = BG_IMAGES.map(url => `
                        <div class="bg-grid__item ${url === currentBg ? 'active' : ''}"
                             style="background-image:url(${url})"
                             onclick="setBackground('${url}')">
                            <div class="check">✓</div>
                        </div>
                    `).join('');
        }

        // ============================================================
        // PAGE SETTINGS
        // ============================================================
        function openPageSettings() {
            const page = pages.find(p => p.id === currentPageId);
            if (page && page.settings) {
                pageSettings = { ...pageSettings, ...page.settings };
            }

            document.getElementById('settingsPageTitle').value = pageSettings.title || page?.name || 'Home';
            document.getElementById('settingsPageDesc').value = pageSettings.description || '';
            document.getElementById('settingsPageGroup').value = pageSettings.group || 'personal';
            document.getElementById('settingsWidgetOpacity').value = pageSettings.widgetOpacity || 8;
            document.getElementById('settingsOpacityValue').textContent = (pageSettings.widgetOpacity || 8) + '%';
            document.getElementById('settingsSearchBar').value = pageSettings.searchBar || 'default';
            document.getElementById('settingsLinkTarget').value = pageSettings.linkTarget || 'new';

            document.getElementById('settingsTitleCount').textContent =
                (document.getElementById('settingsPageTitle').value.length || 0) + '/50';

            renderColumns();
            document.getElementById('pageSettingsModal').classList.add('open');
        }

        function renderColumns() {
            const container = document.getElementById('settingsColumnsContainer');
            const cols = pageSettings.columns || [];

            if (cols.length === 0) {
                container.innerHTML =
                    '<div style="color:var(--white-alpha-40);text-align:center;padding:20px;">No columns yet. Add one below.</div>';
                return;
            }

            container.innerHTML = `
                        <div class="settings-columns">
                            ${cols.map((col, idx) => `
                                <div class="settings-column">
                                    <div class="settings-column__header">
                                        <span class="settings-column__name">Column ${idx + 1}</span>
                                        <span class="settings-column__count">${col.widgets?.length || 0} widgets</span>
                                        ${cols.length > 1 ? `<button class="settings-column__remove" onclick="removeColumn(${idx})">✕</button>` : ''}
                                    </div>
                                    <div class="settings-size-btns">
                                        ${['small','medium','large','xl'].map(s => `
                                            <button class="settings-size-btn ${col.size === s ? 'active' : ''}" onclick="setColumnSize(${idx}, '${s}')">${s}</button>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
        }

        function addColumn() {
            pageSettings.columns.push({
                id: 'col' + (pageSettings.columns.length + 1),
                widgets: [],
                size: 'small'
            });
            renderColumns();
        }

        function removeColumn(index) {
            if (pageSettings.columns.length <= 1) {
                showToast('Need at least one column', 'error');
                return;
            }
            pageSettings.columns.splice(index, 1);
            renderColumns();
        }

        function setColumnSize(index, size) {
            pageSettings.columns[index].size = size;
            renderColumns();
        }

        async function savePageSettings() {
            const title = document.getElementById('settingsPageTitle').value.trim() || 'Home';
            const description = document.getElementById('settingsPageDesc').value.trim();
            const group = document.getElementById('settingsPageGroup').value;
            const widgetOpacity = parseInt(document.getElementById('settingsWidgetOpacity').value);
            const searchBar = document.getElementById('settingsSearchBar').value;
            const linkTarget = document.getElementById('settingsLinkTarget').value;

            pageSettings.title = title;
            pageSettings.description = description;
            pageSettings.group = group;
            pageSettings.widgetOpacity = widgetOpacity;
            pageSettings.searchBar = searchBar;
            pageSettings.linkTarget = linkTarget;

            // Apply widget opacity
            document.querySelectorAll('.widget').forEach(el => {
                const opacity = widgetOpacity / 100;
                el.style.background = `rgba(255,255,255,${opacity * 0.08})`;
                el.style.backdropFilter = `blur(${Math.max(8, opacity * 30)}px)`;
            });

            try {
                const pageRef = doc(db, COLLECTIONS.PAGES, currentPageId);
                await updateDoc(pageRef, {
                    name: title,
                    settings: pageSettings,
                    updatedAt: serverTimestamp()
                });

                // Update local pages
                const page = pages.find(p => p.id === currentPageId);
                if (page) {
                    page.name = title;
                    page.settings = pageSettings;
                }

                closeModal('pageSettingsModal');
                showToast('Page settings saved!', 'success');
            } catch (error) {
                console.error('Error saving page settings:', error);
                showToast('Error saving settings', 'error');
            }
        }

        document.getElementById('settingsPageTitle').addEventListener('input', () => {
            const count = document.getElementById('settingsPageTitle').value.length;
            document.getElementById('settingsTitleCount').textContent = count + '/50';
        });

        document.getElementById('settingsWidgetOpacity').addEventListener('input', () => {
            const val = document.getElementById('settingsWidgetOpacity').value;
            document.getElementById('settingsOpacityValue').textContent = val + '%';
        });

        // ============================================================
        // MODALS
        // ============================================================
        function openAddWidget() {
            document.getElementById('addWidgetModal').classList.add('open');
        }

        function renderWidgetPicker() {
            const container = document.getElementById('widgetPicker');
            container.innerHTML = WIDGET_TYPES.map(w => `
                        <div class="widget-picker__item" onclick="addWidget('${w.id}')">
                            <span class="icon">${w.icon}</span>
                            <span class="name">${w.name}</span>
                        </div>
                    `).join('');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        document.querySelectorAll('.modal-overlay').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target === el) el.classList.remove('open');
            });
        });

        // ============================================================
        // DROPDOWN
        // ============================================================
        function toggleDropdown() {
            dropdown.classList.toggle('open');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.header__avatar') && !e.target.closest('.dropdown')) {
                dropdown.classList.remove('open');
            }
        });

        // ============================================================
        // CLOCK
        // ============================================================
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            const date = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeEl = document.getElementById('clockTime');
            const dateEl = document.getElementById('clockDate');
            if (timeEl) timeEl.textContent = time;
            if (dateEl) dateEl.textContent = date;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastOut 400ms ease-out forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        // ============================================================
        // LOGOUT
        // ============================================================
        async function logout() {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
                showToast('Error logging out', 'error');
            }
        }

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.open').forEach(el => el.classList.remove('open'));
                dropdown.classList.remove('open');
            }
        });

        // ============================================================
        // BACKGROUND UPLOAD HANDLER
        // ============================================================
        document.getElementById('bgUploadInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = await uploadImage(file);
            if (url) {
                setBackground(url);
            }
            e.target.value = '';
        });

        // ============================================================
        // EXPOSE GLOBALS
        // ============================================================
        window.addWidget = addWidget;
        window.deleteWidget = deleteWidget;
        window.duplicateWidget = duplicateWidget;
        window.renameWidget = renameWidget;
        window.openWidgetSettings = openWidgetSettings;
        window.openAddWidget = openAddWidget;
        window.openBackgroundModal = openBackgroundModal;
        window.openPageSettings = openPageSettings;
        window.setBackground = setBackground;
        window.resetBackground = resetBackground;
        window.closeModal = closeModal;
        window.showToast = showToast;
        window.logout = logout;
        window.toggleDropdown = toggleDropdown;
        window.changeProfileImage = changeProfileImage;
        window.addTask = addTask;
        window.toggleTask = toggleTask;
        window.saveNoteContent = saveNoteContent;
        window.addColumn = addColumn;
        window.removeColumn = removeColumn;
        window.setColumnSize = setColumnSize;
        window.savePageSettings = savePageSettings;
        window.renderColumns = renderColumns;

        console.log('%c🚀 DockGrid %cv2.0 (Full Feature)',
            'font-size:20px;font-weight:900;color:#ff6b35;',
            'font-size:14px;color:#fff;');
        console.log('📊 ' + widgets.length + ' widgets');
        console.log('👤 ' + (currentUser?.email || 'Not logged in'));
        console.log('📐 ' + pageSettings.columns.length + ' columns');
        console.log('🔄 Click widget title to rename');
    </script>
</body>
</html>
