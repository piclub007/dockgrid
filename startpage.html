<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DockGrid - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js">
    </script>
    <style>
        /* ============================================================
           CSS VARIABLES & RESET
           ============================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --orange-500: #ff6b35;
            --orange-400: #ff8c5a;
            --orange-300: #ffb088;
            --orange-100: #fff0e8;
            --orange-50: #fff8f4;
            --black-100: #000000;
            --black-90: #0a0a0a;
            --black-80: #1a1a1a;
            --black-70: #2a2a2a;
            --black-60: #3a3a3a;
            --black-50: #555555;
            --black-40: #777777;
            --black-30: #999999;
            --black-20: #bbbbbb;
            --black-10: #dddddd;
            --black-5: #f0f0f0;
            --white: #ffffff;
            --white-alpha-5: rgba(255, 255, 255, 0.05);
            --white-alpha-10: rgba(255, 255, 255, 0.1);
            --white-alpha-15: rgba(255, 255, 255, 0.15);
            --white-alpha-20: rgba(255, 255, 255, 0.2);
            --white-alpha-30: rgba(255, 255, 255, 0.3);
            --white-alpha-40: rgba(255, 255, 255, 0.4);
            --white-alpha-50: rgba(255, 255, 255, 0.5);
            --white-alpha-60: rgba(255, 255, 255, 0.6);
            --white-alpha-70: rgba(255, 255, 255, 0.7);
            --white-alpha-80: rgba(255, 255, 255, 0.8);
            --white-alpha-90: rgba(255, 255, 255, 0.9);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.16);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --radius-full: 9999px;
            --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
            --header-height: 64px;
            --widget-gap: 16px;
            --widget-min-width: 200px;
            --widget-min-height: 140px;
            --corner-radius: 28px;
        }

        html,
        body {
            height: 100%;
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
            background: var(--black-90);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--white-alpha-20);
            border-radius: var(--radius-full);
        }

        /* ============================================================
           LOADING SCREEN
           ============================================================ */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--black-90);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            gap: 20px;
            transition: opacity 0.6s ease;
            border-radius: 0;
        }
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-screen__spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--white-alpha-10);
            border-top-color: var(--orange-500);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .loading-screen__logo {
            font-size: 28px;
            font-weight: 900;
            font-family: var(--font-sans);
            color: var(--white);
            letter-spacing: -1px;
        }
        .loading-screen__logo span {
            color: var(--orange-500);
        }

        /* ============================================================
           APP
           ============================================================ */
        .app {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.6s ease;
            position: relative;
            overflow: hidden;
        }
        .app.visible {
            opacity: 1;
        }

        /* ============================================================
           BACKGROUND
           ============================================================ */
        .app__bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--black-90);
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease;
            z-index: 0;
        }
        .app__bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        /* ============================================================
           HEADER (Glassmorphism)
           ============================================================ */
        .header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            height: var(--header-height);
            flex-shrink: 0;
            background: var(--white-alpha-5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--white-alpha-5);
            border-radius: 0 0 var(--corner-radius) var(--corner-radius);
        }

        .header__left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header__logo {
            font-size: 18px;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -0.5px;
            font-family: var(--font-sans);
        }
        .header__logo span {
            color: var(--orange-500);
        }

        .header__right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ============================================================
           HEADER BUTTONS
           ============================================================ */
        .header__btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all var(--transition-fast);
            background: var(--white-alpha-10);
            color: var(--white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--white-alpha-10);
        }
        .header__btn:hover {
            background: var(--white-alpha-20);
            transform: scale(1.03);
        }
        .header__btn iconify-icon {
            font-size: 18px;
        }

        .header__btn--primary {
            background: var(--orange-500);
            color: var(--white);
            border-color: var(--orange-500);
        }
        .header__btn--primary:hover {
            background: var(--orange-400);
            transform: scale(1.03);
        }

        /* ============================================================
           PROFILE AVATAR
           ============================================================ */
        .header__avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--orange-500);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid var(--white-alpha-20);
            transition: all var(--transition-fast);
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }
        .header__avatar:hover {
            border-color: var(--white);
            transform: scale(1.05);
        }
        .header__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ============================================================
           DROPDOWN
           ============================================================ */
        .dropdown {
            position: absolute;
            top: calc(var(--header-height) + 8px);
            right: 24px;
            background: var(--black-80);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--white-alpha-10);
            box-shadow: var(--shadow-xl);
            padding: 8px;
            min-width: 210px;
            z-index: 100;
            display: none;
            animation: fadeDown 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dropdown.open {
            display: block;
        }
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-12px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .dropdown__user {
            padding: 8px 12px 12px;
            border-bottom: 1px solid var(--white-alpha-10);
            margin-bottom: 6px;
        }
        .dropdown__user-name {
            font-weight: 700;
            color: var(--white);
            font-size: 14px;
        }
        .dropdown__user-email {
            font-size: 12px;
            color: var(--white-alpha-50);
        }

        .dropdown__item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 13px;
            font-weight: 500;
            color: var(--white-alpha-70);
            border: none;
            background: none;
            width: 100%;
            font-family: var(--font-sans);
        }
        .dropdown__item:hover {
            background: var(--white-alpha-10);
            color: var(--white);
        }
        .dropdown__item iconify-icon {
            font-size: 18px;
            color: var(--white-alpha-40);
        }
        .dropdown__divider {
            height: 1px;
            background: var(--white-alpha-10);
            margin: 4px 8px;
        }
        .dropdown__item--danger {
            color: #ef4444;
        }
        .dropdown__item--danger:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        /* ============================================================
           DASHBOARD
           ============================================================ */
        .dashboard {
            position: relative;
            z-index: 5;
            flex: 1;
            overflow-y: auto;
            padding: 16px 28px 32px;
        }

        .dashboard__grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--widget-min-width), 1fr));
            gap: var(--widget-gap);
            align-content: start;
        }

        .dashboard__empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--white-alpha-40);
        }
        .dashboard__empty .icon {
            font-size: 56px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .dashboard__empty h3 {
            font-weight: 700;
            color: var(--white-alpha-70);
            font-size: 18px;
        }
        .dashboard__empty p {
            margin-top: 6px;
            font-size: 14px;
            color: var(--white-alpha-30);
        }

        /* ============================================================
           WIDGETS
           ============================================================ */
        .widget {
            background: var(--white-alpha-8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--white-alpha-10);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-base);
            min-height: var(--widget-min-height);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .widget:hover {
            background: var(--white-alpha-12);
            border-color: var(--white-alpha-20);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .widget--small {
            grid-column: span 1;
        }
        .widget--medium {
            grid-column: span 2;
        }
        .widget--large {
            grid-column: span 3;
        }
        .widget--full {
            grid-column: span 4;
        }

        .widget--height-sm {
            min-height: 140px;
        }
        .widget--height-md {
            min-height: 220px;
        }
        .widget--height-lg {
            min-height: 320px;
        }
        .widget--height-xl {
            min-height: 420px;
        }

        .widget__header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px 10px;
            border-bottom: 1px solid var(--white-alpha-5);
            flex-shrink: 0;
            min-height: 44px;
        }
        .widget__header-icon {
            font-size: 16px;
            color: var(--white-alpha-60);
        }
        .widget__header-title {
            font-weight: 600;
            font-size: 13px;
            color: var(--white);
            flex: 1;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: var(--radius-xs);
            transition: all var(--transition-fast);
            outline: none;
            border: 1px solid transparent;
            background: transparent;
            font-family: var(--font-sans);
        }
        .widget__header-title:hover {
            background: var(--white-alpha-5);
        }
        .widget__header-title:focus {
            border-color: var(--orange-500);
            background: var(--white-alpha-5);
        }

        .widget__header-actions {
            display: flex;
            gap: 2px;
            opacity: 0.3;
            transition: opacity var(--transition-fast);
        }
        .widget:hover .widget__header-actions {
            opacity: 1;
        }
        .widget__header-btn {
            background: none;
            border: none;
            padding: 4px 6px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            color: var(--white-alpha-40);
            font-size: 14px;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
        }
        .widget__header-btn:hover {
            background: var(--white-alpha-10);
            color: var(--white);
        }
        .widget__header-btn.danger:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .widget__body {
            padding: 12px 16px 16px;
            flex: 1;
            overflow-y: auto;
            min-height: 60px;
            color: var(--white);
        }
        .widget__body--empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white-alpha-30);
            font-size: 13px;
            font-weight: 500;
            min-height: 80px;
        }

        .widget__footer {
            padding: 6px 16px 10px;
            border-top: 1px solid var(--white-alpha-5);
            font-size: 11px;
            color: var(--white-alpha-20);
            display: flex;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        /* ============================================================
           WIDGET TYPES
           ============================================================ */
        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
        }
        .bookmark-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 4px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            color: var(--white-alpha-70);
            text-align: center;
        }
        .bookmark-item:hover {
            background: var(--white-alpha-10);
            transform: translateY(-2px);
            color: var(--white);
        }
        .bookmark-item__icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: var(--white-alpha-5);
            flex-shrink: 0;
            overflow: hidden;
        }
        .bookmark-item__icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .bookmark-item__name {
            font-size: 10px;
            font-weight: 500;
            line-height: 1.2;
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .project-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: var(--white-alpha-5);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .project-item:hover {
            background: var(--white-alpha-10);
        }
        .project-item__info {
            flex: 1;
            min-width: 0;
        }
        .project-item__name {
            font-weight: 600;
            font-size: 13px;
            color: var(--white);
        }
        .project-item__meta {
            font-size: 11px;
            color: var(--white-alpha-50);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .project-item__progress {
            width: 60px;
            height: 4px;
            background: var(--white-alpha-20);
            border-radius: var(--radius-full);
            overflow: hidden;
            flex-shrink: 0;
        }
        .project-item__progress-bar {
            height: 100%;
            background: var(--orange-500);
            border-radius: var(--radius-full);
            transition: width 0.6s ease;
        }
        .project-item__status {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
        }
        .project-item__status--planning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        .project-item__status--progress {
            background: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }
        .project-item__status--completed {
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
        }
        .project-item__status--archived {
            background: var(--white-alpha-10);
            color: var(--white-alpha-40);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            cursor: default;
        }
        .task-item:hover {
            background: var(--white-alpha-5);
        }
        .task-item__checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--white-alpha-30);
            border-radius: var(--radius-xs);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            flex-shrink: 0;
            background: transparent;
            color: var(--white);
            font-size: 11px;
        }
        .task-item__checkbox:hover {
            border-color: var(--orange-500);
        }
        .task-item__checkbox.checked {
            background: var(--orange-500);
            border-color: var(--orange-500);
        }
        .task-item__text {
            font-size: 13px;
            color: var(--white-alpha-80);
            flex: 1;
        }
        .task-item__text.done {
            text-decoration: line-through;
            color: var(--white-alpha-30);
        }
        .task-item__due {
            font-size: 10px;
            color: var(--white-alpha-40);
            flex-shrink: 0;
        }
        .task-item__priority {
            width: 4px;
            height: 4px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
        }
        .task-item__priority--high {
            background: #ef4444;
        }
        .task-item__priority--medium {
            background: #f59e0b;
        }
        .task-item__priority--low {
            background: #22c55e;
        }

        .task-add {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .task-add__input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--white-alpha-15);
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-family: var(--font-sans);
            outline: none;
            transition: all var(--transition-fast);
            background: var(--white-alpha-5);
            color: var(--white);
        }
        .task-add__input:focus {
            border-color: var(--orange-500);
        }
        .task-add__input::placeholder {
            color: var(--white-alpha-30);
        }
        .task-add__btn {
            padding: 6px 14px;
            border: none;
            background: var(--orange-500);
            color: var(--white);
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
        }
        .task-add__btn:hover {
            background: var(--orange-400);
        }

        .note-editor {
            width: 100%;
            min-height: 80px;
            border: none;
            outline: none;
            font-family: var(--font-sans);
            font-size: 13px;
            color: var(--white);
            resize: vertical;
            background: transparent;
            line-height: 1.6;
        }
        .note-editor::placeholder {
            color: var(--white-alpha-30);
        }

        .weather-display {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .weather-display__temp {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -2px;
            color: var(--white);
        }
        .weather-display__temp span {
            font-size: 20px;
            font-weight: 400;
            color: var(--white-alpha-50);
        }
        .weather-display__details {
            font-size: 13px;
            color: var(--white-alpha-60);
        }
        .weather-display__details .label {
            color: var(--white-alpha-30);
            font-size: 11px;
        }

        .rss-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .rss-item {
            display: flex;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid var(--white-alpha-5);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            color: var(--white-alpha-70);
        }
        .rss-item:hover {
            color: var(--orange-400);
        }
        .rss-item:last-child {
            border-bottom: none;
        }
        .rss-item__icon {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            background: var(--white-alpha-10);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .rss-item__content {
            flex: 1;
            min-width: 0;
        }
        .rss-item__title {
            font-weight: 600;
            font-size: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .rss-item__meta {
            font-size: 10px;
            color: var(--white-alpha-40);
            margin-top: 2px;

            text-align: center;
            padding: 8px 0;

            letter-spacing: -2px;

        .clock-display__date {
            font-size: 14px;
            color: var(--white-alpha-50);
            margin-top: 4px;
            font-weight: 500;

            letter-spacing: 0.5px;

            color: var(--white-alpha-50);

            position: relative;

            content: '';

            bottom: 1px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--orange-500);

            height: 100%;

           MODALS

            top: 0;
            left: 0;
            width: 100%;

            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal {
            background: var(--black-80);
            backdrop-filter: blur(24px);

            box-shadow: var(--shadow-xl);
            border: 1px solid var(--white-alpha-10);
        }
        .modal__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal__title {
            font-size: 20px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -0.5px;
        }
        .modal__close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--white-alpha-30);
            cursor: pointer;
            padding: 4px;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
        }
        .modal__close:hover {
            background: var(--white-alpha-10);
            color: var(--white);
        }
        .modal__body {
            margin-bottom: 20px;
        }
        .modal__footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            border-top: 1px solid var(--white-alpha-10);
            padding-top: 16px;
        }

        .widget-picker {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .widget-picker__item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 10px;
            border: 1px solid var(--white-alpha-10);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            background: var(--white-alpha-5);
            text-align: center;
            color: var(--white);
        }
        .widget-picker__item:hover {
            border-color: var(--orange-500);
            background: var(--white-alpha-10);
            transform: translateY(-2px);
        }
        .widget-picker__item .icon {
            font-size: 24px;
        }
        .widget-picker__item .name {
            font-size: 11px;
            font-weight: 600;
            color: var(--white-alpha-60);
        }

        .bg-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }
        .bg-grid__item {
            aspect-ratio: 16/10;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all var(--transition-fast);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }
        .bg-grid__item:hover {
            border-color: var(--orange-500);
            transform: scale(1.03);
        }
        .bg-grid__item.active {
            border-color: var(--orange-500);
            box-shadow: 0 0 0 3px var(--orange-500);
        }
        .bg-grid__item .check {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--orange-500);
            color: var(--white);
            border-radius: var(--radius-full);
            width: 20px;
            height: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .bg-grid__item.active .check {
            display: flex;
        }

        .bg-upload {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border: 2px dashed var(--white-alpha-15);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            color: var(--white-alpha-40);
            margin-top: 10px;
        }
        .bg-upload:hover {
            border-color: var(--orange-500);
            color: var(--orange-500);
            background: var(--white-alpha-5);
        }
        .bg-upload input {
            display: none;
        }

        /* ============================================================
           PAGE SETTINGS MODAL (Larger)
           ============================================================ */
        .modal--settings {
            max-width: 720px;
        }

        .settings-section {
            margin-bottom: 24px;
        }
        .settings-section__title {
            font-size: 13px;
            font-weight: 700;
            color: var(--white-alpha-50);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--white-alpha-5);
        }

        .settings-field {
            margin-bottom: 12px;
        }
        .settings-field__label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--white-alpha-60);
            margin-bottom: 4px;
        }
        .settings-field__input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--white-alpha-15);
            border-radius: var(--radius-sm);
            background: var(--white-alpha-5);
            color: var(--white);
            font-size: 13px;
            font-family: var(--font-sans);
            outline: none;
            transition: all var(--transition-fast);

            border-color: var(--orange-500);
        }

            color: var(--white-alpha-30);

            padding: 8px 12px;

            background: var(--black-70);
            color: var(--white);
            font-size: 13px;
            font-family: var(--font-sans);

            color: var(--white-alpha-40);

            transition: all var(--transition-fast);

        .settings-size-btn:hover {
            border-color: var(--white-alpha-30);
            color: var(--white);
        }
        .settings-size-btn.active {
            border-color: var(--orange-500);
            color: var(--orange-500);
            background: rgba(255, 107, 53, 0.1);
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 18px;
            background: var(--black-90);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: var(--white);
            border-left: 4px solid var(--orange-500);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: toastIn 400ms ease-out;
            max-width: 360px;
            border: 1px solid var(--white-alpha-10);
        }
        .toast.success {
            border-left-color: #22c55e;
        }
        .toast.error {
            border-left-color: #ef4444;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
                border-radius: 0 0 var(--radius-lg) var(--radius-lg);

            .header__btn {
                padding: 8px 10px;

            .dashboard {

            .widget--medium,
            .widget--large,
            .widget--full {
                grid-column: span 1;
            }
            .modal {
                padding: 20px;

            .widget-picker {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            }
            .bg-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
            .weather-display {
                flex-direction: column;
                text-align: center;
            }
            .dropdown {

                min-width: 180px;
            }
            .settings-columns {
                grid-template-columns: 1fr;
            }
            .modal--settings {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .header__logo {
                font-size: 15px;

            .header__btn {
                font-size: 12px;
                padding: 6px 8px;

                width: 34px;
                height: 34px;
                font-size: 13px;
            }
            .bookmark-grid {
                grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
            }
            .calendar-grid {
                font-size: 10px;
            }
            .clock-display__time {
                font-size: 30px;
            }
        }

</head>

            'https://cdn.pixabay.com/photo/2021/03/23/06/27/cliff-6116449_1280.jpg',
            'https://cdn.pixabay.com/photo/2022/09/16/00/39/city-7457513_1280.jpg',
            'https://cdn.pixabay.com/photo/2017/12/26/02/54/ho-chi-minh-3039579_1280.jpg',
            'https://cdn.pixabay.com/photo/2018/08/19/00/33/camara-de-lobos-city-3615829_1280.jpg',
            'https://cdn.pixabay.com/photo/2024/11/03/12/57/lion-tamarin-9171365_1280.jpg',
            'https://cdn.pixabay.com/photo/2020/06/20/11/09/cat-5320572_1280.jpg',
        ];

        // ============================================================

        let currentPageId = null;

            title: 'Home',
            description: '',
            group: 'personal',
            columns: [
                { id: 'col1', widgets: [], size: 'small' },

        // DOM REFS
        // ============================================================

        const widgetGrid = document.getElementById('widgetGrid');
        const profileAvatar = document.getElementById('profileAvatar');
        const avatarText = document.getElementById('avatarText');
        const avatarImage = document.getElementById('avatarImage');
        const dropdown = document.getElementById('dropdown');

        // ============================================================
        // AUTH - REDIRECT IF NOT LOGGED IN
        // ============================================================
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'sign.html?q=sign-in';

            }

            currentUser = user;

            updateDropdownUser();

            await loadUserData();

            setupRealtimeListeners();

        // ============================================================
        // AVATAR
        // ============================================================
        function updateAvatar() {
            if (!currentUser) return;
            const photoURL = currentUser.photoURL;
            if (photoURL) {
                avatarText.style.display = 'none';
                avatarImage.style.display = 'block';
                avatarImage.src = photoURL;
            } else {
                avatarText.style.display = 'flex';
                avatarImage.style.display = 'none';
                const name = currentUser.displayName || currentUser.email || 'U';
                avatarText.textContent = name.charAt(0).toUpperCase();
            }
        }

        function updateDropdownUser() {
            if (!currentUser) return;
            document.getElementById('dropdownUserName').textContent = currentUser.displayName || 'User';
            document.getElementById('dropdownUserEmail').textContent = currentUser.email || 'user@email.com';
        }

        // ============================================================
        // LOAD USER DATA
        // ============================================================
        async function loadUserData() {
            if (!currentUser) return;

            try {
                // Settings
                const settingsRef = doc(db, COLLECTIONS.SETTINGS, currentUser.uid);
                const settingsSnap = await getDoc(settingsRef);
                if (settingsSnap.exists()) {
                    settings = settingsSnap.data();
                } else {
                    settings = {
                        userId: currentUser.uid,
                        background: DEFAULT_BG,
                        profileImage: null,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp()
                    };
                    await setDoc(settingsRef, settings);
                }

                applyBackground(settings.background || DEFAULT_BG);

                // Pages
                const pagesRef = collection(db, COLLECTIONS.PAGES);
                const pagesQuery = query(pagesRef, where('userId', '==', currentUser.uid));
                const pagesSnap = await getDocs(pagesQuery);
                pages = [];
                pagesSnap.forEach(doc => {
                    pages.push({ id: doc.id, ...doc.data() });
                });

                if (pages.length === 0) {
                    const defaultPage = {
                        userId: currentUser.uid,
                        name: 'Home',
                        icon: '🏠',
                        order: 0,
                        settings: pageSettings,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp()
                    };
                    const newPageRef = doc(collection(db, COLLECTIONS.PAGES));
                    await setDoc(newPageRef, defaultPage);
                    pages.push({ id: newPageRef.id, ...defaultPage });
                }

                pages.sort((a, b) => (a.order || 0) - (b.order || 0));
                currentPageId = pages[0].id;

                // Load page settings
                if (pages[0].settings) {
                    pageSettings = { ...pageSettings, ...pages[0].settings };
                }

                // Widgets
                await loadWidgets();
                renderAll();

            } catch (error) {
                console.error('Error loading data:', error);
                showToast('Error loading data', 'error');
            }
        }

        async function loadWidgets() {
            if (!currentPageId) return;
            try {
                const widgetsRef = collection(db, COLLECTIONS.WIDGETS);
                const widgetsQuery = query(
                    widgetsRef,
                    where('userId', '==', currentUser.uid),
                    where('pageId', '==', currentPageId)
                );
                const widgetsSnap = await getDocs(widgetsQuery);
                widgets = [];
                widgetsSnap.forEach(doc => {
                    widgets.push({ id: doc.id, ...doc.data() });
                });
                widgets.sort((a, b) => (a.order || 0) - (b.order || 0));
            } catch (error) {
                console.error('Error loading widgets:', error);
                widgets = [];
            }
        }

        // ============================================================
        // REALTIME LISTENERS
        // ============================================================
        function setupRealtimeListeners() {
            if (!currentUser) return;

            const settingsRef = doc(db, COLLECTIONS.SETTINGS, currentUser.uid);
            onSnapshot(settingsRef, (doc) => {
                if (doc.exists()) {
                    settings = doc.data();
                    if (settings.background) applyBackground(settings.background);
                }
            });

            const pagesRef = collection(db, COLLECTIONS.PAGES);
            const pagesQuery = query(pagesRef, where('userId', '==', currentUser.uid));
            onSnapshot(pagesQuery, (snapshot) => {
                pages = [];
                snapshot.forEach(doc => {
                    pages.push({ id: doc.id, ...doc.data() });
                });
                pages.sort((a, b) => (a.order || 0) - (b.order || 0));
                if (currentPageId && !pages.find(p => p.id === currentPageId)) {
                    currentPageId = pages.length > 0 ? pages[0].id : null;
                }
                if (!currentPageId && pages.length > 0) {
                    currentPageId = pages[0].id;
                }
                if (currentPageId) {
                    loadWidgets().then(renderWidgets);
                }
            });

            setupWidgetsListener();
        }

        function setupWidgetsListener() {
            if (!currentUser || !currentPageId) return;
            const widgetsRef = collection(db, COLLECTIONS.WIDGETS);
            const widgetsQuery = query(
                widgetsRef,
                where('userId', '==', currentUser.uid),
                where('pageId', '==', currentPageId)
            );
            onSnapshot(widgetsQuery, (snapshot) => {
                if (!isInitialized) return;
                widgets = [];
                snapshot.forEach(doc => {
                    widgets.push({ id: doc.id, ...doc.data() });
                });
                widgets.sort((a, b) => (a.order || 0) - (b.order || 0));
                renderWidgets();
            });
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderAll() {
            renderWidgets();
            renderWidgetPicker();
            renderBgGrid();
            renderColumns();
        }

        function renderWidgets() {
            if (!widgets || widgets.length === 0) {
                widgetGrid.innerHTML = `
                            <div class="dashboard__empty">
                                <div class="icon">📭</div>
                                <h3>No widgets yet</h3>
                                <p>Click <strong>Add</strong> to start building your dashboard</p>
                            </div>
                        `;
                return;
            }

            widgetGrid.innerHTML = widgets.map(w => renderWidget(w)).join('');

            // Event listeners
            document.querySelectorAll('.task-add__btn').forEach(el => {
                el.addEventListener('click', () => {
                    const widgetId = el.dataset.widgetId;
                    const input = document.getElementById('taskInput_' + widgetId);
                    if (input) addTask(widgetId, input.value);
                });
            });
            document.querySelectorAll('.task-add__input').forEach(el => {
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const widgetId = el.id.replace('taskInput_', '');
                        addTask(widgetId, el.value);
                    }
                });
            });
            document.querySelectorAll('.note-editor').forEach(el => {
                el.addEventListener('input', () => {
                    saveNoteContent(el.dataset.widgetId, el.value);
                });
            });
            document.querySelectorAll('.task-item__checkbox').forEach(el => {
                el.addEventListener('click', () => {
                    const widgetId = el.dataset.widgetId;
                    const index = parseInt(el.dataset.index);
                    toggleTask(widgetId, index);
                });
            });
            document.querySelectorAll('.widget__header-btn.danger').forEach(el => {
                el.addEventListener('click', () => {
                    deleteWidget(el.dataset.widgetId);
                });
            });
            // Title click to edit
            document.querySelectorAll('.widget__header-title').forEach(el => {
                el.addEventListener('dblclick', () => {
                    const widgetId = el.dataset.widgetId;
                    const currentTitle = el.textContent;
                    const newTitle = prompt('Enter new title:', currentTitle);
                    if (newTitle !== null && newTitle.trim()) {
                        renameWidget(widgetId, newTitle.trim());
                    }
                });
            });
        }

        function renderWidget(w) {
            const sizeClass = `widget--${w.size || 'small'}`;
            const heightClass = `widget--height-${w.height || 'sm'}`;
            const bodyHtml = renderWidgetBody(w);
            const opacity = pageSettings.widgetOpacity / 100;

            return `
                        <div class="widget ${sizeClass} ${heightClass}" 
                             data-widget-id="${w.id}"
                             style="background:rgba(255,255,255,${opacity * 0.08});backdrop-filter:blur(${Math.max(8, opacity * 30)}px);">
                            <div class="widget__header">
                                <span class="widget__header-icon">${getWidgetIcon(w.type)}</span>
                                <span class="widget__header-title" data-widget-id="${w.id}">${w.title || 'Widget'}</span>
                                <div class="widget__header-actions">
                                    <button class="widget__header-btn" onclick="duplicateWidget('${w.id}')" title="Duplicate">⧉</button>
                                    <button class="widget__header-btn" onclick="openWidgetSettings('${w.id}')" title="Settings">⚙</button>
                                    <button class="widget__header-btn danger" data-widget-id="${w.id}" title="Delete">✕</button>
                                </div>
                            </div>
                            <div class="widget__body">
                                ${bodyHtml}
                            </div>
                        </div>
                    `;
        }

        function renderWidgetBody(w) {
            const data = w.data || {};

            switch (w.type) {
                case 'bookmarks':
                    return renderBookmarks(data);
                case 'projects':
                    return renderProjects(data);
                case 'tasks':
                    return renderTasks(data, w.id);
                case 'notes':
                    return renderNotes(data, w.id);
                case 'weather':
                    return renderWeather(data);
                case 'rss':
                    return renderRSS(data);
                case 'clock':
                    return renderClock(data);
                case 'calendar':
                    return renderCalendar(data);
                case 'embed':
                    return renderEmbed(data);
                default:
                    return `<div class="widget__body--empty">Unknown widget</div>`;
            }
        }

        function getWidgetIcon(type) {
            const found = WIDGET_TYPES.find(w => w.id === type);
            return found ? found.icon : '📦';
        }

        function getWidgetTypeName(type) {
            const found = WIDGET_TYPES.find(w => w.id === type);
            return found ? found.name : type;
        }

        function getDefaultWidgetData(type) {
            switch (type) {
                case 'bookmarks':
                    return { items: [] };
                case 'projects':
                    return { items: [] };
                case 'tasks':
                    return { items: [] };
                case 'notes':
                    return { content: '' };
                case 'weather':
                    return { city: 'New York', temp: 68, condition: 'Cloudy', humidity: 55, wind: 8 };
                case 'rss':
                    return { feed: '', items: [] };
                case 'clock':
                    return { timezone: 'local' };
                case 'calendar':
                    return { events: [] };
                case 'embed':
                    return { url: '' };
                default:
                    return {};
            }
        }

        // --- Widget Renderers ---
        function renderBookmarks(data) {
            const items = data?.items || [];
            if (items.length === 0) return `<div class="widget__body--empty">Add a URL to get started</div>`;

            // Fetch favicon from Google S2
            const getFavicon = (url) => {
                try {
                    const domain = new URL(url).hostname;
                    return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
                } catch {
                    return '';
                }
            };

            return `
                        <div class="bookmark-grid">
                            ${items.map(b => `
                                <a class="bookmark-item" href="${b.url}" target="_blank" rel="noopener">
                                    <div class="bookmark-item__icon">
                                        ${b.icon ? b.icon : `<img src="${getFavicon(b.url)}" alt="" />`}
                                    </div>
                                    <span class="bookmark-item__name">${b.title || b.name || 'Link'}</span>
                                </a>
                            `).join('')}
                        </div>
                    `;
        }

        function renderProjects(data) {
            const items = data?.items || [];
            if (items.length === 0) return `<div class="widget__body--empty">No projects yet</div>`;
            return `
                        <div class="project-list">
                            ${items.map(p => `
                                <div class="project-item">
                                    <div class="project-item__info">
                                        <div class="project-item__name">${p.name}</div>
                                        <div class="project-item__meta">
                                            <span>${p.deadline || 'No deadline'}</span>
                                            <span class="project-item__status project-item__status--${p.status || 'planning'}">${p.status || 'Planning'}</span>
                                        </div>
                                    </div>
                                    <div class="project-item__progress">
                                        <div class="project-item__progress-bar" style="width:${p.progress || 0}%"></div>
                                    </div>
                                    <span style="font-size:11px;font-weight:700;color:var(--white-alpha-50);">${p.progress || 0}%</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
        }

        function renderTasks(data, widgetId) {
            const items = data?.items || [];
            return `
                        <div class="task-list">
                            ${items.map((t, i) => `
                                <div class="task-item">
                                    <div class="task-item__checkbox ${t.done ? 'checked' : ''}" data-widget-id="${widgetId}" data-index="${i}">
                                        ${t.done ? '✓' : ''}
                                    </div>
                                    <span class="task-item__text ${t.done ? 'done' : ''}">${t.text}</span>
                                    ${t.priority ? `<span class="task-item__priority task-item__priority--${t.priority}"></span>` : ''}
