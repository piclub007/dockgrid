            updateClock();
            setInterval(updateClock, 1000);
        }

        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            const date = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeEl = document.getElementById('clockTime');
            const dateEl = document.getElementById('clockDate');
            if (timeEl) timeEl.textContent = time;
            if (dateEl) dateEl.textContent = date;
        }

        // ============================================================
        // SEARCH (Web)
        // ============================================================

        function setupSearchEnter() {
            document.getElementById('searchInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') doSearch();
            });
        }

        function doSearch() {
            const input = document.getElementById('searchInput');
            const engine = document.getElementById('searchEngine');
            const query = input.value.trim();
            if (!query) return;
            const url = engine.value + encodeURIComponent(query);
            window.open(url, '_blank');
        }

        // ============================================================
        // SEARCH (Dashboard)
        // ============================================================

        function setupSearchModal() {
            const input = document.getElementById('dashboardSearch');
            if (input) {
                input.addEventListener('input', () => {
                    const query = input.value.trim().toLowerCase();
                    const results = document.getElementById('searchResults');
                    if (!query) { results.innerHTML = ''; return; }

                    const page = getCurrentPage();
                    const matches = [];

                    page.widgets.forEach(w => {
                        // Search in bookmarks
                        if (w.type === 'bookmarks' && w.data?.items) {
                            w.data.items.forEach(b => {
                                if (b.name.toLowerCase().includes(query) || (b.url && b.url
                                        .toLowerCase().includes(query))) {
                                    matches.push({ type: 'Bookmark', name: b.name, url: b.url,
                                        widget: w.title });
                                }
                            });
                        }
                        // Search in projects
                        if (w.type === 'projects' && w.data?.items) {
                            w.data.items.forEach(p => {
                                if (p.name.toLowerCase().includes(query)) {
                                    matches.push({ type: 'Project', name: p.name, status: p.status,
                                        widget: w.title });
                                }
                            });
                        }
                        // Search in notes
                        if (w.type === 'notes' && w.data?.content) {
                            if (w.data.content.toLowerCase().includes(query)) {
                                matches.push({ type: 'Note', name: w.title, snippet: w.data.content.slice(
                                        0, 60) + '...', widget: w.title });
                            }
                        }
                        // Search in tasks
                        if (w.type === 'tasks' && w.data?.items) {
                            w.data.items.forEach(t => {
                                if (t.text.toLowerCase().includes(query)) {
                                    matches.push({ type: 'Task', name: t.text, done: t.done,
                                        widget: w.title });
                                }
                            });
                        }
                    });

                    if (matches.length === 0) {
                        results.innerHTML =
                            '<div style="text-align:center;color:var(--black-30);padding:20px;">No results found</div>';
                    } else {
                        results.innerHTML = matches.map(m => `
                                    <div style="display:flex;gap:10px;padding:8px 12px;border-bottom:1px solid var(--black-5);font-size:13px;align-items:center;">
                                        <span style="font-weight:600;color:var(--orange-500);font-size:11px;">${m.type}</span>
                                        <span style="flex:1;">${m.name}</span>
                                        <span style="color:var(--black-40);font-size:11px;">${m.widget}</span>
                                    </div>
                                `).join('');
                    }
                });
            }
        }

        function openSearchModal() {
            document.getElementById('searchModal').classList.add('open');
            document.getElementById('dashboardSearch').value = '';
            document.getElementById('searchResults').innerHTML = '';
            setTimeout(() => document.getElementById('dashboardSearch').focus(), 100);
        }

        // ============================================================
        // AI ASSISTANT
        // ============================================================

        function askAI(widgetId) {
            const input = document.getElementById('aiInput_' + widgetId);
            const response = document.getElementById('aiResponse_' + widgetId);
            if (!input || !response) return;
            const question = input.value.trim();
            if (!question) return;

            response.textContent = '🤔 Thinking...';

            // Simulate AI response (in production, call an API)
            setTimeout(() => {
                const answers = [
                    'That\'s a great question! Let me think about that... 🤔',
                    'I\'d suggest breaking it down into smaller steps. Start with the most important part first!',
                    'Based on what you\'ve told me, I think you should focus on the UI/UX first, then add the backend logic.',
                    'Have you considered using DockGrid to organize your thoughts? 😄',
                    'That sounds like a fun project! I\'d love to help you build it.',
                    'Interesting! Tell me more about what you\'re trying to achieve.',
                ];
                const random = answers[Math.floor(Math.random() * answers.length)];
                response.textContent = random;

                // Save to state
                const page = getCurrentPage();
                const widget = page.widgets.find(w => w.id === widgetId);
                if (widget) {
                    widget.data.response = random;
                    saveState();
                }
            }, 800 + Math.random() * 600);
        }

        // ============================================================
        // BACKGROUND
        // ============================================================

        function openBackgroundModal() {
            document.getElementById('bgModal').classList.add('open');
            // Load current settings
            const bg = document.getElementById('dashboard').style;
            const color = bg.backgroundColor || '#f0f0f0';
            document.getElementById('bgColor').value = color;
            document.getElementById('bgColorHex').value = color;
        }

        function applyBackground() {
            const color = document.getElementById('bgColor').value;
            const blur = document.getElementById('bgBlur').value;
            const brightness = document.getElementById('bgBrightness').value;
            const wallpaper = document.getElementById('bgWallpaper').value;

            const dashboard = document.getElementById('dashboard');

            if (wallpaper) {
                dashboard.style.backgroundImage = `url(${wallpaper})`;
                dashboard.style.backgroundSize = 'cover';
                dashboard.style.backgroundPosition = 'center';
            } else {
                dashboard.style.backgroundImage = 'none';
                dashboard.style.backgroundColor = color;
            }

            dashboard.style.backdropFilter = `blur(${blur}px) brightness(${brightness}%)`;
            dashboard.style.backgroundBlendMode = 'overlay';

            document.getElementById('bgBlurValue').textContent = blur + 'px';
            document.getElementById('bgBrightnessValue').textContent = brightness + '%';

            // Save to localStorage
            localStorage.setItem('dockgrid_bg', JSON.stringify({
                color,
                blur,
                brightness,
                wallpaper
            }));

            closeModal('bgModal');
        }

        function resetBackground() {
            const dashboard = document.getElementById('dashboard');
            dashboard.style.backgroundImage = 'none';
            dashboard.style.backgroundColor = 'var(--black-5)';
            dashboard.style.backdropFilter = 'none';
            localStorage.removeItem('dockgrid_bg');
            document.getElementById('bgColor').value = '#f0f0f0';
            document.getElementById('bgColorHex').value = '#f0f0f0';
            document.getElementById('bgBlur').value = '0';
            document.getElementById('bgBlurValue').textContent = '0px';
            document.getElementById('bgBrightness').value = '100';
            document.getElementById('bgBrightnessValue').textContent = '100%';
            document.getElementById('bgWallpaper').value = '';
            closeModal('bgModal');
        }

        // Load saved background on init
        function loadBackground() {
            const saved = localStorage.getItem('dockgrid_bg');
            if (saved) {
                try {
                    const bg = JSON.parse(saved);
                    if (bg.wallpaper) {
                        document.getElementById('dashboard').style.backgroundImage = `url(${bg.wallpaper})`;
                        document.getElementById('dashboard').style.backgroundSize = 'cover';
                        document.getElementById('dashboard').style.backgroundPosition = 'center';
                    } else {
                        document.getElementById('dashboard').style.backgroundColor = bg.color || 'var(--black-5)';
                    }
                    document.getElementById('dashboard').style.backdropFilter =
                        `blur(${bg.blur || 0}px) brightness(${bg.brightness || 100}%)`;
                } catch (e) {}
            }
        }

        // ============================================================
        // MODALS
        // ============================================================

        function openAddWidget() {
            document.getElementById('addWidgetModal').classList.add('open');
            renderWidgetPicker();
        }

        function renderWidgetPicker() {
            const container = document.getElementById('widgetPicker');
            container.innerHTML = WIDGET_TYPES.map(w => `
                        <div class="widget-picker__item" onclick="addWidget('${w.id}')">
                            <span class="icon">${w.icon}</span>
                            <span class="name">${w.name}</span>
                        </div>
                    `).join('');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        // Close modals on backdrop click
        document.querySelectorAll('.modal-overlay').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target === el) el.classList.remove('open');
            });
        });

        // ============================================================
        // DRAG & DROP (Edit Mode)
        // ============================================================

        let dragWidgetId = null;

        function onDragStart(e) {
            if (!state.editMode) return;
            const widget = e.target.closest('.widget');
            if (!widget) return;
            dragWidgetId = widget.dataset.widgetId;
            widget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragWidgetId);
        }

        function onDragEnd(e) {
            const widget = e.target.closest('.widget');
            if (widget) widget.classList.remove('dragging');
            document.querySelectorAll('.widget.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function onDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('.widget');
            if (target) target.classList.add('drag-over');
        }

        function onDragEnter(e) {
            e.preventDefault();
            const target = e.target.closest('.widget');
            if (target) target.classList.add('drag-over');
        }

        function onDragLeave(e) {
            const target = e.target.closest('.widget');
            if (target) target.classList.remove('drag-over');
        }

        function onDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.widget');
            if (!target) return;
            target.classList.remove('drag-over');

            const fromId = e.dataTransfer.getData('text/plain');
            const toId = target.dataset.widgetId;
            if (!fromId || !toId || fromId === toId) return;

            const page = getCurrentPage();
            const fromIndex = page.widgets.findIndex(w => w.id === fromId);
            const toIndex = page.widgets.findIndex(w => w.id === toId);
            if (fromIndex === -1 || toIndex === -1) return;

            // Reorder
            const [moved] = page.widgets.splice(fromIndex, 1);
            page.widgets.splice(toIndex, 0, moved);
            saveState();
            renderAll();
        }

        // ============================================================
        // RESIZE
        // ============================================================

        let resizeData = null;

        function onResizeStart(e) {
            e.preventDefault();
            const widget = e.target.closest('.widget');
            if (!widget) return;
            const rect = widget.getBoundingClientRect();
            resizeData = {
                widget: widget,
                startX: e.clientX,
                startY: e.clientY,
                startWidth: rect.width,
                startHeight: rect.height,
                widgetId: widget.dataset.widgetId,
            };
            document.addEventListener('mousemove', onResizeMove);
            document.addEventListener('mouseup', onResizeEnd);
            widget.classList.add('resizing');
        }

        function onResizeMove(e) {
            if (!resizeData) return;
            const dx = e.clientX - resizeData.startX;
            const dy = e.clientY - resizeData.startY;
            const newWidth = Math.max(200, resizeData.startWidth + dx);
            const newHeight = Math.max(140, resizeData.startHeight + dy);
            resizeData.widget.style.width = newWidth + 'px';
            resizeData.widget.style.height = newHeight + 'px';
            resizeData.widget.style.gridColumn = 'span ' + Math.ceil(newWidth / 240);
        }

        function onResizeEnd(e) {
            if (!resizeData) return;
            const widget = resizeData.widget;
            widget.classList.remove('resizing');
            // Save size preference
            const width = widget.style.width;
            const height = widget.style.height;
            if (width && height) {
                const page = getCurrentPage();
                const w = page.widgets.find(w => w.id === resizeData.widgetId);
                if (w) {
                    const cols = Math.ceil(parseInt(width) / 240);
                    w.size = cols <= 1 ? 'small' : cols <= 2 ? 'medium' : cols <= 3 ? 'large' : 'full';
                    w.height = parseInt(height) < 180 ? 'sm' : parseInt(height) < 260 ? 'md' : parseInt(height) <
                        360 ? 'lg' : 'xl';
                    saveState();
                }
            }
            resizeData = null;
            document.removeEventListener('mousemove', onResizeMove);
            document.removeEventListener('mouseup', onResizeEnd);
        }

        // ============================================================
        // PROFILE / LOGOUT
        // ============================================================

        function toggleProfileMenu() {
            if (confirm('Logout from DockGrid?')) {
                logout();
            }
        }

        function logout() {
            localStorage.removeItem('dockgrid_session');
            window.location.href = 'index.html';
        }

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================

        document.addEventListener('keydown', (e) => {
            // Ctrl+Shift+E = toggle edit mode
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                toggleEditMode();
            }
            // Escape = close modals
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.open').forEach(el => el.classList.remove('open'));
                if (document.getElementById('sidebar').classList.contains('open')) {
                    closeSidebar();
                }
            }
            // Ctrl+Shift+S = toggle sidebar
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') {
                e.preventDefault();
                toggleSidebar();
            }
            // / = focus search
            if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                if (!document.activeElement || document.activeElement.tagName !== 'INPUT') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            }
        });

        // ============================================================
        // INIT
        // ============================================================

        document.addEventListener('DOMContentLoaded', () => {
            init();
            loadBackground();

            console.log('%c🚀 DockGrid Dashboard %cv1.0',
                'font-size:24px;font-weight:900;color:#ff6b35;font-family:monospace;',
                'font-size:14px;color:#000;');
            console.log('%c📊 ' + state.pages.length + ' pages · ' +
                state.pages.reduce((acc, p) => acc + (p.widgets ? p.widgets.length : 0), 0) + ' widgets',
                'color:#555;');
            console.log('%c🔧 Press Ctrl+Shift+E to toggle edit mode', 'color:#777;font-size:11px;');
            console.log('%c🔍 Press / to focus search', 'color:#777;font-size:11px;');
            console.log('%c📂 Data stored in localStorage', 'color:#777;font-size:11px;');
        });
    </script>

</body>
</html>
