<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockGrid - My Dashboard</title>
    <meta name="description" content="DockGrid personal dashboard - Organize your bookmarks, notes, tasks, RSS feeds, and widgets">
    <meta name="theme-color" content="#ff6b35">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23ff6b35'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='bold' font-family='system-ui'>D</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        :root {
            --orange-500: #ff6b35; --orange-600: #e85d2c; --orange-400: #ff8c5a;
            --black-100: #000; --black-90: #0a0a0a; --black-80: #1a1a1a; --black-60: #3a3a3a;
            --black-40: #777; --black-20: #ccc; --black-10: #e0e0e0; --black-5: #f5f5f5;
            --white: #fff; --white-a10: rgba(255,255,255,0.1); --white-a20: rgba(255,255,255,0.2);
            --white-a50: rgba(255,255,255,0.5); --white-a70: rgba(255,255,255,0.7); --white-a90: rgba(255,255,255,0.9);
            --red-500: #ef4444; --green-500: #22c55e;
            --font: 'Inter', system-ui, sans-serif; --font-mono: 'JetBrains Mono', monospace;
            --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px; --radius-2xl: 28px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08); --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.15); --shadow-xl: 0 16px 48px rgba(0,0,0,0.2);
            --transition: 200ms cubic-bezier(0.4,0,0.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);-webkit-font-smoothing:antialiased;background:#1a1a1a}
        
        /* Background layer */
        .bg-layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0.9;transition:background-image 0.6s ease}
        .bg-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;background:rgba(0,0,0,0.35);pointer-events:none}
        
        /* App container */
        .app{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column}
        
        /* Header - transparent */
        .header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;z-index:10;flex-shrink:0}
        .header-left{display:flex;align-items:center;gap:8px}
        .header-right{display:flex;align-items:center;gap:12px}
        
        /* Buttons */
        .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;font-size:13px;font-weight:600;font-family:var(--font);border:none;border-radius:var(--radius-xl);cursor:pointer;transition:all var(--transition);letter-spacing:-0.2px;background:var(--white-a20);color:var(--white);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
        .btn:hover{background:var(--white-a50);transform:translateY(-1px)}
        .btn-primary{background:var(--orange-500);color:var(--white)}
        .btn-primary:hover{background:var(--orange-600);box-shadow:0 6px 20px rgba(255,107,53,0.4)}
        .btn-sm{padding:6px 12px;font-size:11px}
        .btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:50%}
        
        /* Avatar circle */
        .avatar{width:38px;height:38px;border-radius:50%;background:var(--orange-500);display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:700;font-size:15px;cursor:pointer;border:2px solid var(--white-a20);transition:all var(--transition);overflow:hidden;flex-shrink:0}
        .avatar img{width:100%;height:100%;object-fit:cover}
        .avatar:hover{border-color:var(--orange-500);box-shadow:0 0 0 4px rgba(255,107,53,0.3)}
        
        /* Dropdown */
        .dropdown{position:relative}
        .dropdown-menu{display:none;position:absolute;top:calc(100% + 8px);right:0;min-width:240px;background:rgba(20,20,20,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--white-a10);border-radius:var(--radius-lg);padding:8px;z-index:100;box-shadow:var(--shadow-xl);animation:dropIn 200ms ease-out}
        .dropdown-menu.show{display:block}
        .dropdown-menu.left{right:auto;left:0}
        @keyframes dropIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13px;color:var(--white-a70);cursor:pointer;border-radius:var(--radius-sm);transition:all var(--transition);border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
        .dropdown-item:hover{background:var(--white-a10);color:var(--white)}
        .dropdown-item iconify-icon{font-size:18px;flex-shrink:0;opacity:0.7}
        .dropdown-divider{height:1px;background:var(--white-a10);margin:6px 0}
        .dropdown-header{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--white-a50);padding:8px 14px 4px}
        
        /* Main content */
        .main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 24px 24px;scroll-behavior:smooth}
        .main::-webkit-scrollbar{width:6px}
        .main::-webkit-scrollbar-track{background:transparent}
        .main::-webkit-scrollbar-thumb{background:var(--white-a20);border-radius:3px}
        
        /* Widget grid */
        .widget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding-top:8px}
        .widget-grid.cols-2{grid-template-columns:repeat(2,1fr)}
        .widget-grid.cols-3{grid-template-columns:repeat(3,1fr)}
        .widget-grid.cols-4{grid-template-columns:repeat(4,1fr)}
        
        /* Widget card */
        .widget{background:rgba(20,20,20,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--white-a10);border-radius:var(--radius-xl);overflow:hidden;transition:all var(--transition);display:flex;flex-direction:column;min-height:200px}
        .widget:hover{border-color:var(--white-a20);box-shadow:var(--shadow-lg)}
        .widget-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--white-a10);cursor:default}
        .widget-title{font-size:14px;font-weight:700;color:var(--white-a90);letter-spacing:-0.2px;cursor:text;padding:2px 6px;border-radius:var(--radius-sm);transition:all var(--transition);border:1px solid transparent;background:transparent;outline:none;font-family:var(--font);min-width:60px}
        .widget-title:hover{border-color:var(--white-a20)}
        .widget-title:focus{border-color:var(--orange-500);background:var(--white-a10)}
        .widget-actions{display:flex;gap:4px}
        .widget-action{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);cursor:pointer;border:none;background:transparent;color:var(--white-a50);transition:all var(--transition);font-size:16px}
        .widget-action:hover{background:var(--white-a10);color:var(--white)}
        .widget-action.danger:hover{background:rgba(239,68,68,0.2);color:var(--red-500)}
        .widget-body{flex:1;padding:14px 18px;overflow-y:auto;color:var(--white-a70);font-size:13px;line-height:1.6}
        .widget-body::-webkit-scrollbar{width:4px}
        .widget-body::-webkit-scrollbar-thumb{background:var(--white-a10);border-radius:2px}
        
        /* Empty state */
        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:var(--white-a50);text-align:center;gap:16px}
        .empty-state iconify-icon{font-size:64px;opacity:0.4}
        .empty-state h3{font-size:20px;font-weight:700;color:var(--white-a70)}
        .empty-state p{font-size:14px;max-width:400px}
        
        /* Modal overlay */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;animation:fadeIn 200ms ease-out}
        .modal-overlay.show{display:flex}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .modal{background:rgba(25,25,25,0.98);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--white-a10);border-radius:var(--radius-2xl);padding:0;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:modalIn 300ms ease-out}
        @keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .modal::-webkit-scrollbar{width:4px}
        .modal::-webkit-scrollbar-thumb{background:var(--white-a10);border-radius:2px}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--white-a10);position:sticky;top:0;background:rgba(25,25,25,0.98);z-index:1;border-radius:var(--radius-2xl) var(--radius-2xl) 0 0}
        .modal-title{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-0.3px}
        .modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:none;background:var(--white-a10);color:var(--white-a70);font-size:18px;transition:all var(--transition)}
        .modal-close:hover{background:var(--white-a20);color:var(--white)}
        .modal-body{padding:20px 24px}
        .modal-section{margin-bottom:24px}
        .modal-section:last-child{margin-bottom:0}
        .modal-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--white-a50);margin-bottom:12px}
        
        /* Form elements */
        .form-group{margin-bottom:14px}
        .form-label{display:block;font-size:11px;font-weight:700;color:var(--white-a50);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
        .form-input{width:100%;padding:10px 14px;font-size:13px;font-family:var(--font);background:var(--white-a10);border:1px solid var(--white-a10);border-radius:var(--radius-sm);color:var(--white);outline:none;transition:all var(--transition)}
        .form-input:focus{border-color:var(--orange-500);background:var(--white-a20)}
        .form-input::placeholder{color:var(--white-a50)}
        .form-textarea{min-height:80px;resize:vertical}
        .form-select{width:100%;padding:10px 14px;font-size:13px;font-family:var(--font);background:var(--white-a10);border:1px solid var(--white-a10);border-radius:var(--radius-sm);color:var(--white);outline:none;cursor:pointer}
        
        /* Image grid for backgrounds */
        .image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
        .image-option{aspect-ratio:16/10;border-radius:var(--radius-sm);cursor:pointer;border:2px solid transparent;transition:all var(--transition);overflow:hidden;background-size:cover;background-position:center}
        .image-option:hover{border-color:var(--orange-500);transform:scale(1.02)}
        .image-option.selected{border-color:var(--orange-500);box-shadow:0 0 0 3px rgba(255,107,53,0.3)}
        .image-upload-area{aspect-ratio:16/10;border-radius:var(--radius-sm);border:2px dashed var(--white-a20);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);color:var(--white-a50);flex-direction:column;gap:8px;font-size:12px}
        .image-upload-area:hover{border-color:var(--orange-500);color:var(--orange-500);background:var(--white-a10)}
        
        /* Widget type grid */
        .widget-type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
        .widget-type-option{padding:16px;border-radius:var(--radius-md);border:1px solid var(--white-a10);cursor:pointer;transition:all var(--transition);display:flex;align-items:center;gap:12px;background:transparent;color:var(--white-a70);font-family:var(--font);text-align:left;font-size:13px}
        .widget-type-option:hover{background:var(--white-a10);border-color:var(--orange-500)}
        .widget-type-option iconify-icon{font-size:24px;flex-shrink:0;color:var(--orange-500)}
        
        /* Bookmark items */
        .bookmark-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);transition:all var(--transition);cursor:pointer;text-decoration:none;color:var(--white-a70)}
        .bookmark-item:hover{background:var(--white-a10);color:var(--white)}
        .bookmark-favicon{width:20px;height:20px;border-radius:4px;flex-shrink:0}
        .bookmark-info{flex:1;min-width:0}
        .bookmark-title{font-size:13px;font-weight:600;color:var(--white-a90);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .bookmark-url{font-size:11px;color:var(--white-a50);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        
        /* Toast */
        .toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
        .toast{padding:12px 18px;background:rgba(20,20,20,0.95);color:var(--white);border-left:3px solid var(--orange-500);border-radius:var(--radius-md);font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);animation:slideIn 300ms ease-out;display:flex;align-items:center;gap:10px;max-width:380px}
        .toast.error{border-left-color:var(--red-500)}
        .toast.success{border-left-color:var(--green-500)}
        @keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
        
        /* Responsive */
        @media(max-width:768px){.widget-grid{grid-template-columns:1fr!important}.header{padding:12px 16px}.btn{font-size:12px;padding:8px 14px}}
    </style>
</head>
<body>

<!-- Background -->
<div class="bg-layer" id="bgLayer" style="background-image:url('https://cdn.pixabay.com/photo/2020/07/25/14/23/cliff-5436923_1280.jpg')"></div>
<div class="bg-overlay"></div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<!-- App -->
<div class="app">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="btn btn-sm" onclick="toggleEditMode()" id="editBtn">
                <iconify-icon icon="mdi:pencil-outline" width="16" height="16"></iconify-icon>
                Edit
            </button>
            <button class="btn btn-primary btn-sm" onclick="openAddWidgetModal()">
                <iconify-icon icon="mdi:plus" width="16" height="16"></iconify-icon>
                Add
            </button>
        </div>
        <div class="header-right">
            <!-- Avatar dropdown -->
            <div class="dropdown" id="avatarDropdown">
                <div class="avatar" id="avatarBtn" onclick="toggleDropdown('avatarDropdown')">
                    <span id="avatarInitial">U</span>
                </div>
                <div class="dropdown-menu" id="avatarMenu">
                    <div class="dropdown-header" id="menuUsername">User</div>
                    <div class="dropdown-item" onclick="openProfileModal()">
                        <iconify-icon icon="mdi:camera-plus-outline"></iconify-icon> Change profile image
                    </div>
                    <div class="dropdown-item" onclick="openBackgroundModal()">
                        <iconify-icon icon="mdi:image-outline"></iconify-icon> Change desktop background
                    </div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="openPageSettingsModal()">
                        <iconify-icon icon="mdi:cog-outline"></iconify-icon> Page settings
                    </div>
                    <div class="dropdown-item" onclick="handleSignOut()">
                        <iconify-icon icon="mdi:logout"></iconify-icon> Sign out
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="main" id="mainContent">
        <div class="widget-grid cols-3" id="widgetGrid">
            <!-- Widgets rendered here -->
        </div>
        <div class="empty-state" id="emptyState">
            <iconify-icon icon="mdi:view-dashboard-outline"></iconify-icon>
            <h3>Your dashboard is empty</h3>
            <p>Click the <strong>Add</strong> button above to add your first widget</p>
            <button class="btn btn-primary" onclick="openAddWidgetModal()">
                <iconify-icon icon="mdi:plus" width="18" height="18"></iconify-icon>
                Add Widget
            </button>
        </div>
    </main>
</div>

<!-- Add Widget Modal -->
<div class="modal-overlay" id="addWidgetModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Add Widget</span>
            <button class="modal-close" onclick="closeModal('addWidgetModal')">
                <iconify-icon icon="mdi:close" width="20" height="20"></iconify-icon>
            </button>
        </div>
        <div class="modal-body">
            <div class="widget-type-grid">
                <button class="widget-type-option" onclick="addWidget('bookmarks')">
                    <iconify-icon icon="mdi:bookmark-multiple-outline"></iconify-icon>
                    <div><strong>Bookmarks</strong><br><small>Save and organize links</small></div>
                </button>
                <button class="widget-type-option" onclick="addWidget('rss')">
                    <iconify-icon icon="mdi:rss"></iconify-icon>
                    <div><strong>News (RSS)</strong><br><small>Follow your favorite feeds</small></div>
                </button>
                <button class="widget-type-option" onclick="addWidget('notes')">
                    <iconify-icon icon="mdi:note-text-outline"></iconify-icon>
                    <div><strong>Notes</strong><br><small>Quick notes and ideas</small></div>
                </button>
                <button class="widget-type-option" onclick="addWidget('tasks')">
                    <iconify-icon icon="mdi:checkbox-marked-outline"></iconify-icon>
                    <div><strong>Tasks</strong><br><small>To-do list & reminders</small></div>
                </button>
                <button class="widget-type-option" onclick="addWidget('embed')">
                    <iconify-icon icon="mdi:code-tags"></iconify-icon>
                    <div><strong>Embed</strong><br><small>YouTube, Figma, Docs</small></div>
                </button>
                <button class="widget-type-option" onclick="addWidget('project')">
                    <iconify-icon icon="mdi:folder-outline"></iconify-icon>
                    <div><strong>Project</strong><br><small>Track GitHub repos & sites</small></div>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Page Settings Modal -->
<div class="modal-overlay" id="pageSettingsModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Page Settings</span>
            <button class="modal-close" onclick="closeModal('pageSettingsModal')">
                <iconify-icon icon="mdi:close" width="20" height="20"></iconify-icon>
            </button>
        </div>
        <div class="modal-body">
            <!-- General -->
            <div class="modal-section">
                <div class="modal-section-title">General</div>
                <div class="form-group">
                    <label class="form-label">Page Title</label>
                    <input type="text" class="form-input" id="pageTitle" value="My Dashboard" maxlength="50">
                    <small style="color:var(--white-a50);font-size:10px" id="titleCharCount">3/50</small>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-input form-textarea" id="pageDescription" placeholder="Auto-generate"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Belongs to</label>
                    <select class="form-select"><option>Personal pages</option></select>
                </div>
            </div>
            <!-- Background -->
            <div class="modal-section">
                <div class="modal-section-title">Background</div>
                <div class="image-grid" id="bgImageGrid"></div>
                <div class="form-group" style="margin-top:12px">
                    <label class="form-label">Upload image (ImgBB)</label>
                    <input type="file" class="form-input" id="bgUpload" accept="image/*" onchange="uploadBackground(event)">
                </div>
                <div class="form-group">
                    <label class="form-label">Widget transparency</label>
                    <input type="range" class="form-input" min="60" max="100" value="85" id="widgetOpacity" oninput="updateWidgetOpacity(this.value)" style="padding:0;height:6px;cursor:pointer">
                    <small style="color:var(--white-a50);font-size:10px" id="opacityValue">85%</small>
                </div>
            </div>
            <!-- Columns -->
            <div class="modal-section">
                <div class="modal-section-title">Columns</div>
                <div class="form-group">
                    <label class="form-label">Layout</label>
                    <select class="form-select" id="columnCount" onchange="updateColumns(this.value)">
                        <option value="1">1 Column</option>
                        <option value="2">2 Columns</option>
                        <option value="3" selected>3 Columns</option>
                        <option value="4">4 Columns</option>
                    </select>
                </div>
            </div>
            <!-- Preferences -->
            <div class="modal-section">
                <div class="modal-section-title">Preferences</div>
                <div class="form-group">
                    <label class="form-label">Open links in</label>
                    <select class="form-select" id="linkTarget">
                        <option value="_blank" selected>New window</option>
                        <option value="_self">Same window</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="savePageSettings()">Save Settings</button>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal">
    <div class="modal" style="max-width:400px">
        <div class="modal-header">
            <span class="modal-title">Profile Image</span>
            <button class="modal-close" onclick="closeModal('profileModal')">
                <iconify-icon icon="mdi:close" width="20" height="20"></iconify-icon>
            </button>
        </div>
        <div class="modal-body" style="text-align:center">
            <div class="avatar" style="width:80px;height:80px;margin:0 auto 16px;font-size:28px" id="profileAvatar">
                <span id="profileInitial">U</span>
            </div>
            <input type="file" class="form-input" id="profileUpload" accept="image/*" onchange="uploadProfileImage(event)">
            <small style="color:var(--white-a50);display:block;margin-top:8px">Upload a profile picture via ImgBB</small>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp, collection, query, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {

const C = {

    NOTES: 'DockGrid_Notes',
    WIDGETS: 'DockGrid_Widgets',

<script>
// ===== GLOBAL STATE =====
let currentUser = null;
let isEditMode = false;
let widgets = [];
let currentBackground = 'https://cdn.pixabay.com/photo/2020/07/25/14/23/cliff-5436923_1280.jpg';
let columnCount = 3;
let widgetOpacity = 85;

const DEFAULT_BACKGROUNDS = [
    'https://cdn.pixabay.com/photo/2020/07/25/14/23/cliff-5436923_1280.jpg',
    'https://cdn.pixabay.com/photo/2021/03/23/06/27/cliff-6116449_1280.jpg',
    'https://cdn.pixabay.com/photo/2022/09/16/00/39/city-7457513_1280.jpg',
    'https://cdn.pixabay.com/photo/2017/12/26/02/54/ho-chi-minh-3039579_1280.jpg',
    'https://cdn.pixabay.com/photo/2018/08/19/00/33/camara-de-lobos-city-3615829_1280.jpg',
    'https://cdn.pixabay.com/photo/2024/11/03/12/57/lion-tamarin-9171365_1280.jpg',
    'https://cdn.pixabay.com/photo/2020/06/20/11/09/cat-5320572_1280.jpg'
];

// ===== INITIALIZATION =====
function initDashboard(user) {
    currentUser = user;
    document.getElementById('avatarInitial').textContent = (user.displayName || user.email || 'U')[0].toUpperCase();
    document.getElementById('profileInitial').textContent = (user.displayName || user.email || 'U')[0].toUpperCase();
    document.getElementById('menuUsername').textContent = user.displayName || user.email || 'User';
    
    // Load user settings
    loadUserSettings(user.uid);
    // Load widgets
    loadWidgets(user.uid);
    // Setup background grid
    setupBackgroundGrid();
    // Update column display
    updateColumnDisplay();
    // Update opacity
    updateWidgetOpacity(widgetOpacity);
}

// ===== LOAD SETTINGS =====
async function loadUserSettings(uid) {
    const C = window.C; const db = window.db;
    const docFn = window.docFn; const getDocFn = window.getDocFn;
    try {
        const settingsRef = docFn(db, C.SETTINGS, uid);
        const snap = await getDocFn(settingsRef);
        if (snap.exists()) {
            const data = snap.data();
            if (data.backgroundImage) {
                currentBackground = data.backgroundImage;
                document.getElementById('bgLayer').style.backgroundImage = `url(${data.backgroundImage})`;
            }
            if (data.columnCount) { columnCount = data.columnCount; updateColumnDisplay(); }
            if (data.widgetOpacity) { widgetOpacity = data.widgetOpacity; updateWidgetOpacity(widgetOpacity); }
            if (data.pageTitle) document.getElementById('pageTitle').value = data.pageTitle;
            if (data.profileImage) {
                document.getElementById('avatarBtn').innerHTML = `<img src="${data.profileImage}" alt="Profile">`;
                document.getElementById('profileAvatar').innerHTML = `<img src="${data.profileImage}" alt="Profile" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
            }
        }
    } catch(e) { console.log('Settings load:', e); }
}

// ===== LOAD WIDGETS =====
function loadWidgets(uid) {
    const C = window.C; const db = window.db;
    const collectionFn = window.collectionFn;
    const widgetsRef = collectionFn(db, C.WIDGETS);
    const { query, where, onSnapshot } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js");
    const q = query(widgetsRef, where('userId', '==', uid));
    onSnapshot(q, (snapshot) => {
        widgets = [];
        snapshot.forEach(doc => widgets.push({ id: doc.id, ...doc.data() }));
        renderWidgets();
    });
}
window._loadWidgets = loadWidgets;

// ===== RENDER WIDGETS =====
function renderWidgets() {
    const grid = document.getElementById('widgetGrid');
    const empty = document.getElementById('emptyState');
    
    if (widgets.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'flex';
        return;
    }
    
    empty.style.display = 'none';
    grid.innerHTML = widgets.map(w => createWidgetHTML(w)).join('');
    
    // Setup title editing
    document.querySelectorAll('.widget-title').forEach(el => {
        el.addEventListener('blur', function() { handleRenameWidget(this.dataset.id, this.textContent); });
        el.addEventListener('keydown', function(e) { if(e.key==='Enter'){e.preventDefault();this.blur();} });
    });
}

function createWidgetHTML(widget) {
    const icons = { bookmarks:'mdi:bookmark-multiple-outline', rss:'mdi:rss', notes:'mdi:note-text-outline', tasks:'mdi:checkbox-marked-outline', embed:'mdi:code-tags', project:'mdi:folder-outline' };
    const icon = icons[widget.type] || 'mdi:widget-outline';
    
    let bodyHTML = '';
    switch(widget.type) {
        case 'bookmarks': bodyHTML = renderBookmarkWidget(widget); break;
        case 'notes': bodyHTML = renderNotesWidget(widget); break;
        case 'tasks': bodyHTML = renderTasksWidget(widget); break;
        case 'rss': bodyHTML = renderRSSWidget(widget); break;
        case 'embed': bodyHTML = renderEmbedWidget(widget); break;
        case 'project': bodyHTML = renderProjectWidget(widget); break;
        default: bodyHTML = '<p style="color:var(--white-a50);text-align:center;padding:20px">Configure this widget</p>';
    }
    
    return `
    <div class="widget" data-id="${widget.id}">
        <div class="widget-header">
            <span class="widget-title" contenteditable="${isEditMode}" data-id="${widget.id}" spellcheck="false">${widget.title || 'Untitled'}</span>
            <div class="widget-actions">
                <button class="widget-action" onclick="refreshWidget('${widget.id}')" title="Refresh"><iconify-icon icon="mdi:refresh" width="16" height="16"></iconify-icon></button>
                <button class="widget-action danger" onclick="removeWidget('${widget.id}')" title="Remove"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button>
            </div>
        </div>
        <div class="widget-body">${bodyHTML}</div>
    </div>`;
}

// ===== WIDGET BODY RENDERERS =====
function renderBookmarkWidget(widget) {
    const bookmarks = widget.data?.bookmarks || [];
    if (bookmarks.length === 0) return `
        <div style="text-align:center;padding:20px;color:var(--white-a50)">
            <iconify-icon icon="mdi:bookmark-plus-outline" width="32" height="32"></iconify-icon>
            <p style="margin-top:8px;font-size:12px">No bookmarks yet</p>
            <input type="url" class="form-input" placeholder="Paste URL and press Enter" onkeydown="if(event.key==='Enter')addBookmark('${widget.id}',this)" style="margin-top:8px">
        </div>`;
    return `
        <input type="url" class="form-input" placeholder="Paste URL and press Enter" onkeydown="if(event.key==='Enter')addBookmark('${widget.id}',this)" style="margin-bottom:8px">
        ${bookmarks.map(b => `
            <a href="${b.url}" target="_blank" class="bookmark-item" rel="noopener">
                <img src="${b.favicon || 'https://www.google.com/s2/favicons?domain='+new URL(b.url).hostname+'&sz=32'}" class="bookmark-favicon" onerror="this.src='data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27><path fill=%27%23888%27 d=%27M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z%27/></svg>'">
                <div class="bookmark-info">
                    <div class="bookmark-title">${b.title || new URL(b.url).hostname}</div>
                    <div class="bookmark-url">${new URL(b.url).hostname}</div>
                </div>
            </a>
        `).join('')}
        ${isEditMode ? `<button class="btn btn-sm" style="width:100%;margin-top:8px" onclick="clearBookmarks('${widget.id}')">Clear all</button>` : ''}`;
}

function renderNotesWidget(widget) {
    const notes = widget.data?.content || '';
    return `<textarea class="form-input form-textarea" style="min-height:120px;color:var(--white-a90)" placeholder="Write your notes here..." oninput="saveNotesContent('${widget.id}', this.value)">${notes}</textarea>`;
}

function renderTasksWidget(widget) {
    const tasks = widget.data?.tasks || [];
    if (tasks.length === 0) return `
        <div style="text-align:center;padding:20px;color:var(--white-a50)">
            <iconify-icon icon="mdi:playlist-plus" width="32" height="32"></iconify-icon>
            <p style="margin-top:8px;font-size:12px">No tasks yet</p>
            <input type="text" class="form-input" placeholder="Add a task and press Enter" onkeydown="if(event.key==='Enter')addTask('${widget.id}',this)" style="margin-top:8px">
        </div>`;
    return `
        <input type="text" class="form-input" placeholder="Add a task and press Enter" onkeydown="if(event.key==='Enter')addTask('${widget.id}',this)" style="margin-bottom:8px">
        ${tasks.map((t,i) => `
            <div class="bookmark-item" style="cursor:default" onclick="toggleTask('${widget.id}',${i})">
                <iconify-icon icon="${t.done?'mdi:checkbox-marked':'mdi:checkbox-blank-outline'}" width="18" height="18" style="color:${t.done?'var(--green-500)':'var(--white-a50)'};flex-shrink:0"></iconify-icon>
                <span style="text-decoration:${t.done?'line-through':'none'};opacity:${t.done?'0.5':'1'}">${t.text}</span>
            </div>
        `).join('')}`;
}

function renderRSSWidget(widget) {
    return `<div style="text-align:center;padding:20px;color:var(--white-a50)">
        <iconify-icon icon="mdi:rss" width="32" height="32"></iconify-icon>
        <p style="margin-top:8px;font-size:12px">RSS feed coming soon</p>
        <input type="url" class="form-input" placeholder="Enter RSS feed URL" style="margin-top:8px">
    </div>`;
}

function renderEmbedWidget(widget) {
    return `<div style="text-align:center;padding:20px;color:var(--white-a50)">
        <iconify-icon icon="mdi:code-tags" width="32" height="32"></iconify-icon>
        <p style="margin-top:8px;font-size:12px">Embed content coming soon</p>
        <input type="url" class="form-input" placeholder="Paste URL (YouTube, Figma, etc.)" style="margin-top:8px">
    </div>`;
}

function renderProjectWidget(widget) {
    return `<div style="text-align:center;padding:20px;color:var(--white-a50)">
        <iconify-icon icon="mdi:folder-outline" width="32" height="32"></iconify-icon>
        <p style="margin-top:8px;font-size:12px">Project tracking coming soon</p>
        <input type="text" class="form-input" placeholder="Project name" style="margin-top:8px">
    </div>`;
}

// ===== WIDGET ACTIONS =====
async function addWidget(type) {
    const C = window.C; const db = window.db;
    const docFn = window.docFn; const setDocFn = window.setDocFn;
    const serverTimestampFn = window.serverTimestampFn;
    
    const names = { bookmarks:'Bookmarks', rss:'News Feed', notes:'Notes', tasks:'Tasks', embed:'Embed', project:'Project' };
    const widgetId = `${type}_${Date.now()}`;
    
    const widgetData = {
        id: widgetId, type, title: names[type] || 'Widget',
        userId: currentUser.uid, pageId: 'default',
        data: { bookmarks:[], tasks:[], content:'' },
        createdAt: serverTimestampFn(), updatedAt: serverTimestampFn()
    };
    
    await setDocFn(docFn(db, C.WIDGETS, widgetId), widgetData);
    closeModal('addWidgetModal');
    showToast(`Added ${names[type]} widget`, 'success');
}

async function removeWidget(id) {
    if (!confirm('Remove this widget?')) return;
    const C = window.C; const db = window.db;
    const docFn = window.docFn;
    const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js");
    await deleteDoc(docFn(db, C.WIDGETS, id));
    showToast('Widget removed', 'success');
}

async function handleRenameWidget(id, newTitle) {
    if (!newTitle.trim()) return;
    const C = window.C; const db = window.db;
    const docFn = window.docFn; const setDocFn = window.setDocFn;
    await setDocFn(docFn(db, C.WIDGETS, id), { title: newTitle.trim() }, { merge: true });
}

async function refreshWidget(id) {
    showToast('Refreshing...', 'info');
}

// ===== BOOKMARK ACTIONS =====
async function addBookmark(widgetId, input) {
    const url = input.value.trim();
    if (!url) return;
    if (!url.startsWith('http')) { showToast('Please enter a valid URL', 'error'); return; }
    
    input.value = '';
    input.placeholder = 'Loading...';
    
    try {
        const hostname = new URL(url).hostname;
        const favicon = `https://www.google.com/s2/favicons?domain=${hostname}&sz=32`;
        
        // Try to fetch title via Microlink
        let title = hostname;
        try {
            const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if (data.status === 'success' && data.data.title) title = data.data.title;
        } catch(e) {}
        
        const C = window.C; const db = window.db;
        const docFn = window.docFn; const getDocFn = window.getDocFn; const setDocFn = window.setDocFn;
        
        const widgetRef = docFn(db, C.WIDGETS, widgetId);
        const snap = await getDocFn(widgetRef);
        if (snap.exists()) {
            const data = snap.data();
            const bookmarks = data.data?.bookmarks || [];
            bookmarks.push({ url, title, favicon, addedAt: new Date().toISOString() });
            await setDocFn(widgetRef, { data: { ...data.data, bookmarks }, updatedAt: window.serverTimestampFn() }, { merge: true });
            showToast('Bookmark added!', 'success');
        }
    } catch(e) {
        showToast('Invalid URL', 'error');
    }
    input.placeholder = 'Paste URL and press Enter';
}

async function clearBookmarks(widgetId) {
    const C = window.C; const db = window.db;
    const docFn = window.docFn; const setDocFn = window.setDocFn;
    const widgetRef = docFn(db, C.WIDGETS, widgetId);
    const snap = await window.getDocFn(widgetRef);
    if (snap.exists()) {
        const data = snap.data();
        await setDocFn(widgetRef, { data: { ...data.data, bookmarks: [] }, updatedAt: window.serverTimestampFn() }, { merge: true });
    }
}

// ===== TASK ACTIONS =====
async function addTask(widgetId, input) {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    
    const C = window.C; const db = window.db;
    const docFn = window.docFn; const getDocFn = window.getDocFn; const setDocFn = window.setDocFn;
    
    const widgetRef = docFn(db, C.WIDGETS, widgetId);
    const snap = await getDocFn(widgetRef);
    if (snap.exists()) {
        const data = snap.data();
        const tasks = data.data?.tasks || [];
        tasks.push({ text, done: false, addedAt: new Date().toISOString() });
        await setDocFn(widgetRef, { data: { ...data.data, tasks }, updatedAt: window.serverTimestampFn() }, { merge: true });
    }
}

async function toggleTask(widgetId, index) {
    const C = window.C; const db = window.db;
    const docFn = window.docFn; const getDocFn = window.getDocFn; const setDocFn = window.setDocFn;
    
    const widgetRef = docFn(db, C.WIDGETS, widgetId);
    const snap = await getDocFn(widgetRef);
    if (snap.exists()) {
        const data = snap.data();
        const tasks = data.data?.tasks || [];
        if (tasks[index]) {
            tasks[index].done = !tasks[index].done;
            await setDocFn(widgetRef, { data: { ...data.data, tasks }, updatedAt: window.serverTimestampFn() }, { merge: true });
        }
    }
}

async function saveNotesContent(widgetId, content) {
    const C = window.C; const db = window.db;
    const docFn = window.docFn; const setDocFn = window.setDocFn;
    await setDocFn(docFn(db, C.WIDGETS, widgetId), { data: { content }, updatedAt: window.serverTimestampFn() }, { merge: true });
}

// ===== UI HELPERS =====
function toggleEditMode() {
    isEditMode = !isEditMode;
    document.getElementById('editBtn').innerHTML = isEditMode ? 
        '<iconify-icon icon="mdi:check" width="16" height="16"></iconify-icon> Done' :
        '<iconify-icon icon="mdi:pencil-outline" width="16" height="16"></iconify-icon> Edit';
    document.querySelectorAll('.widget-title').forEach(el => el.contentEditable = isEditMode);
    renderWidgets();
}

function toggleDropdown(id) {
    const menu = document.getElementById(id + 'Menu') || document.getElementById('avatarMenu');
    if (menu) menu.classList.toggle('show');
}

function closeAllDropdowns() {
    document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
}

function openModal(id) {
    document.getElementById(id).classList.add('show');
    closeAllDropdowns();
}

function closeModal(id) {
    document.getElementById(id).classList.remove('show');
}

function openAddWidgetModal() { openModal('addWidgetModal'); closeAllDropdowns(); }
function openPageSettingsModal() { 
    document.getElementById('pageTitle').value = document.querySelector('.widget-grid')?.dataset?.pageTitle || 'My Dashboard';
    document.getElementById('columnCount').value = columnCount;
    openModal('pageSettingsModal'); 
}
function openProfileModal() { openModal('profileModal'); }
function openBackgroundModal() { openModal('pageSettingsModal'); setTimeout(() => document.getElementById('pageSettingsModal').scrollTo({top:200,behavior:'smooth'}),300); }

// ===== BACKGROUND =====
function setupBackgroundGrid() {
    const grid = document.getElementById('bgImageGrid');
    grid.innerHTML = DEFAULT_BACKGROUNDS.map(url => `
        <div class="image-option ${url === currentBackground ? 'selected' : ''}" 
             style="background-image:url('${url}')" 
             onclick="setBackground('${url}')" title="Set as background"></div>
    `).join('') + `
        <label class="image-upload-area" for="bgUpload">
            <iconify-icon icon="mdi:cloud-upload-outline" width="24" height="24"></iconify-icon>
            Upload
        </label>`;
}

function setBackground(url) {
    currentBackground = url;
    document.getElementById('bgLayer').style.backgroundImage = `url(${url})`;
    document.querySelectorAll('.image-option').forEach(el => el.classList.remove('selected'));
    const match = document.querySelector(`.image-option[style*="${url.substring(0,50)}"]`);
    if (match) match.classList.add('selected');
    saveSetting('backgroundImage', url);
}

async function uploadBackground(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
        showToast('Uploading background...', 'info');
        const formData = new FormData();
        formData.append('image', file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method:'POST', body:formData });
        const data = await res.json();
        if (data.success) {
            setBackground(data.data.url);
            showToast('Background updated!', 'success');
        }
    } catch(e) { showToast('Upload failed', 'error'); }
}

async function uploadProfileImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
        showToast('Uploading profile image...', 'info');
        const formData = new FormData();
        formData.append('image', file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method:'POST', body:formData });
        const data = await res.json();
        if (data.success) {
            document.getElementById('avatarBtn').innerHTML = `<img src="${data.data.url}" alt="Profile">`;
            document.getElementById('profileAvatar').innerHTML = `<img src="${data.data.url}" alt="Profile" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
            saveSetting('profileImage', data.data.url);
            closeModal('profileModal');
            showToast('Profile image updated!', 'success');
        }
    } catch(e) { showToast('Upload failed', 'error'); }
}

// ===== SETTINGS =====
async function saveSetting(key, value) {
    const C = window.C; const db = window.db;
    const docFn = window.docFn; const setDocFn = window.setDocFn;
    if (!currentUser) return;
    await setDocFn(docFn(db, C.SETTINGS, currentUser.uid), { [key]: value }, { merge: true });
}

async function savePageSettings() {
    const title = document.getElementById('pageTitle').value;
    const cols = parseInt(document.getElementById('columnCount').value);
    columnCount = cols;
    updateColumnDisplay();
    await saveSetting('pageTitle', title);
    await saveSetting('columnCount', cols);
    closeModal('pageSettingsModal');
    showToast('Settings saved!', 'success');
}

function updateColumns(count) {
    columnCount = parseInt(count);
    updateColumnDisplay();
}

function updateColumnDisplay() {
    const grid = document.getElementById('widgetGrid');
    grid.className = 'widget-grid';
    if (columnCount >= 1 && columnCount <= 4) grid.classList.add(`cols-${columnCount}`);
    document.getElementById('columnCount').value = columnCount;
}

function updateWidgetOpacity(value) {
    widgetOpacity = parseInt(value);
    document.getElementById('opacityValue').textContent = widgetOpacity + '%';
    document.querySelectorAll('.widget').forEach(w => {
        w.style.background = `rgba(20,20,20,${widgetOpacity/100})`;
    });
    saveSetting('widgetOpacity', widgetOpacity);
}

// ===== AUTH =====
async function handleSignOut() {
    const { signOut } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js");
    await signOut(window.auth);
    window.location.href = 'sign.html';
}

// ===== TOAST =====
function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { info:'mdi:information-outline', success:'mdi:check-circle-outline', error:'mdi:alert-circle-outline' };
    toast.innerHTML = `<iconify-icon icon="${icons[type]}" width="18" height="18"></iconify-icon> ${message}`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity='0'; toast.style.transform='translateX(100%)'; toast.style.transition='all 300ms ease-out'; setTimeout(()=>toast.remove(),300); }, 3500);
}

// ===== CLICK OUTSIDE =====
document.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown')) closeAllDropdowns();
    if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('show');
});

// ===== MODAL CLOSE ON ESCAPE =====
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show'));
        closeAllDropdowns();
    }
});

// Fix for loadWidgets being called from module
window._initLoadWidgets = function(uid) {
    const C = window.C; const db = window.db;
    const { collection:colFn, query:qFn, where:wFn, onSnapshot:osFn } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js");
    const widgetsRef = colFn(db, C.WIDGETS);
    const q = qFn(widgetsRef, wFn('userId', '==', uid));
    osFn(q, (snapshot) => {
        widgets = [];
        snapshot.forEach(doc => widgets.push({ id: doc.id, ...doc.data() }));
        renderWidgets();
    });
};
</script>
