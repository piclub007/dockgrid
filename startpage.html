<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DockGrid - Your Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js">
    </script>
    <style>
        /* ============================================================
               CSS VARIABLES & RESET
               ============================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --orange-500: #ff6b35;
            --orange-600: #e85d2c;
            --orange-400: #ff8c5a;
            --orange-300: #ffb088;
            --orange-100: #fff0e8;
            --orange-50: #fff8f4;

            --black-100: #000000;
            --black-90: #0a0a0a;
            --black-80: #1a1a1a;
            --black-70: #2a2a2a;
            --black-60: #3a3a3a;
            --black-50: #555555;
            --black-40: #777777;
            --black-30: #999999;
            --black-20: #bbbbbb;
            --black-10: #dddddd;
            --black-5: #f0f0f0;

            --white: #ffffff;
            --white-alpha-10: rgba(255, 255, 255, 0.1);
            --white-alpha-20: rgba(255, 255, 255, 0.2);
            --white-alpha-30: rgba(255, 255, 255, 0.3);
            --white-alpha-50: rgba(255, 255, 255, 0.5);
            --white-alpha-70: rgba(255, 255, 255, 0.7);
            --white-alpha-80: rgba(255, 255, 255, 0.8);
            --white-alpha-90: rgba(255, 255, 255, 0.9);

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.16);

            --radius-xs: 4px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --radius-full: 9999px;

            --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);

            --header-height: 64px;
            --sidebar-width: 280px;
            --widget-gap: 16px;
            --widget-min-width: 200px;
            --widget-min-height: 140px;
        }

        html,
        body {
            height: 100%;
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: var(--black-5);
            color: var(--black-90);
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--black-20);
            border-radius: var(--radius-full);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--black-30);
        }

        /* ============================================================
               LOADING SCREEN
               ============================================================ */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-screen__spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--black-10);
            border-top-color: var(--orange-500);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-screen__text {
            font-size: 16px;
            color: var(--black-50);
            font-weight: 500;
        }

        .loading-screen__logo {
            font-size: 32px;
            font-weight: 900;
            font-family: var(--font-mono);
            color: var(--black-100);
        }

        .loading-screen__logo span {
            color: var(--orange-500);
        }

        /* ============================================================
               APP SHELL
               ============================================================ */
        .app {
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .app.visible {
            opacity: 1;
        }

        /* ============================================================
               SIDEBAR
               ============================================================ */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100%;
            background: var(--white);
            border-right: 1px solid var(--black-10);
            transform: translateX(-100%);
            transition: transform var(--transition-slow);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            box-shadow: var(--shadow-xl);
            overflow-y: auto;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--black-10);
        }

        .sidebar__logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 18px;
            font-family: var(--font-mono);
            color: var(--black-100);
        }

        .sidebar__logo-icon {
            width: 32px;
            height: 32px;
            background: var(--black-100);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--orange-500);
            font-size: 16px;
            font-weight: 900;
        }

        .sidebar__close {
            background: none;
            border: none;
            font-size: 22px;
            color: var(--black-40);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
        }
        .sidebar__close:hover {
            background: var(--black-5);
            color: var(--black-100);
        }

        .sidebar__title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--black-40);
            margin-bottom: 12px;
        }

        .sidebar__pages {
            flex: 1;
            overflow-y: auto;
        }

        .sidebar__page-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 14px;
            font-weight: 500;
            color: var(--black-60);
            margin-bottom: 2px;
        }

        .sidebar__page-item:hover {
            background: var(--black-5);
            color: var(--black-100);
        }

        .sidebar__page-item.active {
            background: var(--orange-50);
            color: var(--orange-500);
            font-weight: 600;
        }

        .sidebar__page-item .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .sidebar__page-item .badge {
            margin-left: auto;
            font-size: 11px;
            background: var(--black-5);
            padding: 2px 10px;
            border-radius: var(--radius-full);
            color: var(--black-40);
        }

        .sidebar__add-page {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            margin-top: 8px;
            border: 2px dashed var(--black-10);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            color: var(--black-40);
            font-weight: 600;
            font-size: 13px;
            background: transparent;
            width: 100%;
        }

        .sidebar__add-page:hover {
            border-color: var(--orange-500);
            color: var(--orange-500);
            background: var(--orange-50);
        }

        .sidebar__footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--black-10);
        }

        .sidebar__footer-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 13px;
            color: var(--black-50);
        }

        .sidebar__footer-item:hover {
            background: var(--black-5);
            color: var(--black-100);
        }

        /* ============================================================
               MAIN CONTENT
               ============================================================ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            margin-left: 0;
            transition: margin-left var(--transition-slow);
        }

        .main.sidebar-open {
            margin-left: var(--sidebar-width);
        }

        /* ============================================================
               TOP NAV
               ============================================================ */
        .topnav {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 24px;
            height: var(--header-height);
            background: var(--white);
            border-bottom: 1px solid var(--black-10);
            flex-shrink: 0;
            z-index: 100;
            position: sticky;
            top: 0;
        }

        .topnav__hamburger {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            color: var(--black-60);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .topnav__hamburger:hover {
            background: var(--black-5);
            color: var(--black-100);
        }

        .topnav__page-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--black-100);
            letter-spacing: -0.3px;
            margin-right: auto;
        }

        .topnav__page-name .sub {
            font-weight: 400;
            color: var(--black-40);
            font-size: 12px;
        }

        .topnav__actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topnav__btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            color: var(--black-50);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
            white-space: nowrap;
        }

        .topnav__btn:hover {
            background: var(--black-5);
            color: var(--black-100);
        }

        .topnav__btn--primary {
            background: var(--black-100);
            color: var(--white);
        }
        .topnav__btn--primary:hover {
            background: var(--orange-500);
            color: var(--white);
        }

        .topnav__btn .icon {
            font-size: 18px;
        }

        .topnav__profile {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            background: var(--orange-500);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .topnav__profile:hover {
            border-color: var(--black-100);
            transform: scale(1.05);
        }

        /* ============================================================
               SEARCH BAR
               ============================================================ */
        .search-section {
            padding: 20px 24px 16px;
            flex-shrink: 0;
            background: var(--white);
            border-bottom: 1px solid var(--black-5);
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 0;
            max-width: 720px;
            margin: 0 auto;
            background: var(--black-5);
            border-radius: var(--radius-xl);
            border: 2px solid transparent;
            transition: all var(--transition-base);
            overflow: hidden;
        }

        .search-bar:focus-within {
            border-color: var(--orange-500);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
        }

        .search-bar__engine {
            padding: 10px 12px 10px 16px;
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            color: var(--black-50);
            cursor: pointer;
            font-family: var(--font-sans);
            outline: none;
            border-right: 1px solid var(--black-10);
            min-width: 110px;
        }

        .search-bar__engine:hover {
            color: var(--black-100);
        }

        .search-bar__input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-family: var(--font-sans);
            color: var(--black-100);
            outline: none;
            min-width: 0;
        }

        .search-bar__input::placeholder {
            color: var(--black-30);
        }

        .search-bar__btn {
            padding: 10px 18px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--black-30);
            transition: all var(--transition-fast);
            font-size: 18px;
            display: flex;
            align-items: center;
        }
        .search-bar__btn:hover {
            color: var(--orange-500);
        }

        /* ============================================================
               DASHBOARD GRID
               ============================================================ */
        .dashboard {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px 32px;
            background: var(--bg-dashboard, var(--black-5));
            transition: background var(--transition-slow);
        }

        .dashboard__grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--widget-min-width), 1fr));
            gap: var(--widget-gap);
            align-content: start;
        }

        .dashboard__empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--black-30);
        }

        .dashboard__empty .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .dashboard__empty h3 {
            font-weight: 700;
            color: var(--black-60);
            font-size: 20px;
        }

        .dashboard__empty p {
            margin-top: 8px;
            font-size: 15px;
        }

        /* ============================================================
               WIDGET
               ============================================================ */
        .widget {
            background: var(--white);
            border-radius: var(--radius-md);
            border: 1px solid var(--black-10);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: all var(--transition-base);
            cursor: grab;
            min-height: var(--widget-min-height);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .widget:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--black-20);
        }

        .widget.dragging {
            opacity: 0.5;
            transform: scale(0.97);
        }

        .widget.drag-over {
            border-color: var(--orange-500);
            border-style: dashed;
            background: var(--orange-50);
        }

        .widget.resizing {
            user-select: none;
        }

        .widget--small {
            grid-column: span 1;
        }
        .widget--medium {
            grid-column: span 2;
        }
        .widget--large {
            grid-column: span 3;
        }
        .widget--full {
            grid-column: span 4;
        }

        .widget--height-sm {
            min-height: 140px;
        }
        .widget--height-md {
            min-height: 220px;
        }
        .widget--height-lg {
            min-height: 320px;
        }
        .widget--height-xl {
            min-height: 420px;
        }

        .widget__header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--black-5);
            flex-shrink: 0;
            min-height: 48px;
        }

        .widget__header-icon {
            font-size: 16px;
        }

        .widget__header-title {
            font-weight: 700;
            font-size: 13px;
            color: var(--black-80);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .widget__header-actions {
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .widget:hover .widget__header-actions,
        .widget.editing .widget__header-actions {
            opacity: 1;
        }

        .widget__header-btn {
            background: none;
            border: none;
            padding: 4px 6px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            color: var(--black-30);
            font-size: 14px;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
        }

        .widget__header-btn:hover {
            background: var(--black-5);
            color: var(--black-80);
        }

        .widget__header-btn.danger:hover {
            background: #fef2f2;
            color: #ef4444;
        }

        .widget__body {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
            min-height: 60px;
        }

        .widget__body--empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--black-30);
            font-size: 13px;
            font-weight: 500;
            min-height: 80px;
        }

        .widget__footer {
            padding: 8px 16px;
            border-top: 1px solid var(--black-5);
            font-size: 11px;
            color: var(--black-30);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .widget__resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .widget:hover .widget__resize-handle {
            opacity: 0.5;
        }

        .widget__resize-handle::after {
            content: '';
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-right: 2px solid var(--black-20);
            border-bottom: 2px solid var(--black-20);
            border-radius: 0 0 2px 0;
        }

        /* ============================================================
               WIDGET TYPES - SPECIFIC STYLES
               ============================================================ */

        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 12px;
        }

        .bookmark-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 4px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            color: var(--black-80);
            text-align: center;
        }

        .bookmark-item:hover {
            background: var(--black-5);
            transform: translateY(-2px);
        }

        .bookmark-item__icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: var(--black-5);
            flex-shrink: 0;
        }

        .bookmark-item__name {
            font-size: 11px;
            font-weight: 500;
            line-height: 1.2;
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .project-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            background: var(--black-5);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .project-item:hover {
            background: var(--orange-50);
            transform: translateX(4px);
        }

        .project-item__info {
            flex: 1;
            min-width: 0;
        }

        .project-item__name {
            font-weight: 600;
            font-size: 14px;
            color: var(--black-80);
        }

        .project-item__meta {
            font-size: 12px;
            color: var(--black-40);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .project-item__progress {
            width: 80px;
            height: 4px;
            background: var(--black-10);
            border-radius: var(--radius-full);
            overflow: hidden;
            flex-shrink: 0;
        }

        .project-item__progress-bar {
            height: 100%;
            background: var(--orange-500);
            border-radius: var(--radius-full);
            transition: width 0.6s ease;
        }

        .project-item__status {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
        }

        .project-item__status--planning {
            background: #fef3c7;
            color: #d97706;
        }
        .project-item__status--progress {
            background: #dbeafe;
            color: #2563eb;
        }
        .project-item__status--completed {
            background: #d1fae5;
            color: #059669;
        }
        .project-item__status--archived {
            background: var(--black-5);
            color: var(--black-40);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            cursor: default;
        }

        .task-item:hover {
            background: var(--black-5);
        }

        .task-item__checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--black-20);
            border-radius: var(--radius-xs);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            flex-shrink: 0;
            background: var(--white);
        }

        .task-item__checkbox:hover {
            border-color: var(--orange-500);
        }

        .task-item__checkbox.checked {
            background: var(--orange-500);
            border-color: var(--orange-500);
            color: var(--white);
        }

        .task-item__text {
            font-size: 14px;
            color: var(--black-80);
            flex: 1;
        }

        .task-item__text.done {
            text-decoration: line-through;
            color: var(--black-30);
        }

        const app = initializeApp(firebaseConfig);

        // ============================================================

            WIDGETS: 'DockGrid_Widgets',
            SETTINGS: 'DockGrid_Settings',
        };

        // ============================================================

        let currentUser = null;

        let pages = [];
        let widgets = [];

        // ============================================================

        const WIDGET_TYPES = [

        // ============================================================

        // ============================================================
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // Not logged in - redirect to sign.html
                window.location.href = 'sign.html?q=sign-in';
                return;
            }

            // User is logged in
            currentUser = user;

            // Update profile avatar
            const avatar = document.getElementById('profileAvatar');
            if (user.displayName) {
                avatar.textContent = user.displayName.charAt(0).toUpperCase();
            } else if (user.email) {
                avatar.textContent = user.email.charAt(0).toUpperCase();
            }

            // Load user data
            await loadUserData();

            // Hide loading screen, show app
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('app').classList.add('visible');

            // Set up real-time listeners
            setupRealtimeListeners();

            isInitialized = true;

        // ============================================================
        // LOAD USER DATA
        // ============================================================
        async function loadUserData() {
            if (!currentUser) return;

            try {
                // 1. Load or create user settings
                const settingsRef = doc(db, COLLECTIONS.SETTINGS, currentUser.uid);
                const settingsSnap = await getDoc(settingsRef);

                if (settingsSnap.exists()) {
                    settings = settingsSnap.data();
                } else {
                    // Create default settings
                    settings = {
                        userId: currentUser.uid,
                        theme: 'light',
                        defaultPage: null,
                        background: '#f0f0f0',
                        blur: 0,
                        brightness: 100,
                        wallpaper: '',
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp()
                    };
                    await setDoc(settingsRef, settings);
                }

                // 2. Load pages
                const pagesRef = collection(db, COLLECTIONS.PAGES);
                const pagesQuery = query(pagesRef, where('userId', '==', currentUser.uid));
                const pagesSnap = await getDocs(pagesQuery);

                pages = [];
                pagesSnap.forEach(doc => {
                    pages.push({ id: doc.id, ...doc.data() });
                });

                // If no pages, create default
                if (pages.length === 0) {
                    const defaultPage = {
                        userId: currentUser.uid,
                        name: 'Home',
                        icon: '🏠',
                        order: 0,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp()
                    };
                    const newPageRef = doc(collection(db, COLLECTIONS.PAGES));
                    await setDoc(newPageRef, defaultPage);
                    pages.push({ id: newPageRef.id, ...defaultPage });
                }

                // Sort pages by order
                pages.sort((a, b) => (a.order || 0) - (b.order || 0));

                // Set current page
                if (settings.defaultPage && pages.find(p => p.id === settings.defaultPage)) {
                    currentPageId = settings.defaultPage;
                } else {
                    currentPageId = pages[0].id;
                }

                // 3. Load widgets for current page
                await loadWidgets();

                // 4. Render everything
                renderAll();

            } catch (error) {
                console.error('Error loading user data:', error);
                showToast('Error loading data. Please refresh.', 'error');
            }
        }

        // ============================================================
        // LOAD WIDGETS
        // ============================================================
        async function loadWidgets() {
            if (!currentPageId) return;

            try {
                const widgetsRef = collection(db, COLLECTIONS.WIDGETS);
                const widgetsQuery = query(
                    widgetsRef,
                    where('userId', '==', currentUser.uid),
                    where('pageId', '==', currentPageId)
                );
                const widgetsSnap = await getDocs(widgetsQuery);

                widgets = [];
                widgetsSnap.forEach(doc => {
                    widgets.push({ id: doc.id, ...doc.data() });
                });

                // Sort by order
                widgets.sort((a, b) => (a.order || 0) - (b.order || 0));

            } catch (error) {
                console.error('Error loading widgets:', error);
                widgets = [];
            }
        }

        // ============================================================
        // REALTIME LISTENERS
        // ============================================================
        function setupRealtimeListeners() {
            if (!currentUser) return;

            // Listen for settings changes
            const settingsRef = doc(db, COLLECTIONS.SETTINGS, currentUser.uid);
            onSnapshot(settingsRef, (doc) => {
                if (doc.exists()) {
                    settings = doc.data();
                    applyBackground();
                }
            }, (error) => {
                console.error('Settings listener error:', error);
            });

            // Listen for pages changes
            const pagesRef = collection(db, COLLECTIONS.PAGES);
            const pagesQuery = query(pagesRef, where('userId', '==', currentUser.uid));
            onSnapshot(pagesQuery, (snapshot) => {
                pages = [];
                snapshot.forEach(doc => {
                    pages.push({ id: doc.id, ...doc.data() });
                });
                pages.sort((a, b) => (a.order || 0) - (b.order || 0));

                // If current page was deleted, switch to first available
                if (currentPageId && !pages.find(p => p.id === currentPageId)) {
                    currentPageId = pages.length > 0 ? pages[0].id : null;
                }
                if (!currentPageId && pages.length > 0) {
                    currentPageId = pages[0].id;
                }

                renderSidebar();
                updatePageName();

                // If page changed, reload widgets
                if (currentPageId) {
                    loadWidgets().then(() => {
                        renderWidgets();
                    });
                }
            }, (error) => {
                console.error('Pages listener error:', error);
            });

            // Listen for widgets changes on current page
            // We'll set up a listener that re-runs when page changes
            setupWidgetsListener();
        }

        function setupWidgetsListener() {
            if (!currentUser || !currentPageId) return;

            const widgetsRef = collection(db, COLLECTIONS.WIDGETS);
            const widgetsQuery = query(
                widgetsRef,
                where('userId', '==', currentUser.uid),
                where('pageId', '==', currentPageId)
            );

            onSnapshot(widgetsQuery, (snapshot) => {
                if (!isInitialized) return;

                widgets = [];
                snapshot.forEach(doc => {
                    widgets.push({ id: doc.id, ...doc.data() });
                });
                widgets.sort((a, b) => (a.order || 0) - (b.order || 0));

                renderWidgets();
            }, (error) => {
                console.error('Widgets listener error:', error);
            });
        }

        // ============================================================
        // RENDER FUNCTIONS
        // ============================================================
        function renderAll() {
            renderSidebar();
            renderWidgets();
            updatePageName();
            renderWidgetPicker();
            applyBackground();
        }

        function renderSidebar() {
            const container = document.getElementById('pageList');
            if (!pages || pages.length === 0) {
                container.innerHTML = `
                            <div style="text-align:center;padding:20px;color:var(--black-30);font-size:13px;">
                                No pages yet.<br>Click "New Page" to start.
                            </div>
                        `;
                return;
            }

            container.innerHTML = pages.map(p => `
                        <div class="sidebar__page-item ${p.id === currentPageId ? 'active' : ''}"
                             onclick="switchPage('${p.id}')">
                            <span class="icon">${p.icon || '📄'}</span>
                            ${p.name}
                            <span class="badge">${p.id === currentPageId ? widgets.length : 0}</span>
                        </div>
                    `).join('');
        }

        function renderWidgets() {
            const grid = document.getElementById('widgetGrid');

            if (!widgets || widgets.length === 0) {
                grid.innerHTML = `
                            <div class="dashboard__empty">
                                <div class="icon">📭</div>
                                <h3>No widgets yet</h3>
                                <p>Click <strong>Add Widget</strong> to start building your dashboard</p>
                            </div>
                        `;
                return;
            }

            grid.innerHTML = widgets.map(w => renderWidget(w)).join('');

            // Re-attach event listeners
            document.querySelectorAll('.widget').forEach(el => {
                el.addEventListener('dragstart', onDragStart);
                el.addEventListener('dragend', onDragEnd);
                el.addEventListener('dragover', onDragOver);
                el.addEventListener('dragenter', onDragEnter);
                el.addEventListener('dragleave', onDragLeave);
                el.addEventListener('drop', onDrop);
            });

            // Resize handles
            document.querySelectorAll('.widget__resize-handle').forEach(el => {
                el.addEventListener('mousedown', onResizeStart);
            });

            // Note auto-save
            document.querySelectorAll('.note-editor').forEach(el => {
                el.addEventListener('input', (e) => {
                    const widgetId = e.target.dataset.widgetId;
                    saveNoteContent(widgetId, e.target.value);
                });
            });

            // Task add
            document.querySelectorAll('.task-add__btn').forEach(el => {
                el.addEventListener('click', (e) => {
                    const widgetId = e.target.dataset.widgetId;
                    const input = document.getElementById('taskInput_' + widgetId);
                    if (input) addTask(widgetId, input.value);
                });
            });

            document.querySelectorAll('.task-add__input').forEach(el => {
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const widgetId = e.target.id.replace('taskInput_', '');
                        addTask(widgetId, e.target.value);
                    }
                });
            });

            // AI ask
            document.querySelectorAll('.task-add__btn[data-ai]').forEach(el => {
                el.addEventListener('click', (e) => {
                    const widgetId = e.target.dataset.widgetId;
                    askAI(widgetId);
                });
            });

            document.querySelectorAll('#aiInput_').forEach(el => {
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const widgetId = e.target.id.replace('aiInput_', '');
                        askAI(widgetId);
                    }
                });
            });
        }

        function renderWidget(w) {
            const sizeClass = `widget--${w.size || 'small'}`;
            const heightClass = `widget--height-${w.height || 'sm'}`;
            const bodyHtml = renderWidgetBody(w);

            return `
                        <div class="widget ${sizeClass} ${heightClass}" 
                             data-widget-id="${w.id}"
                             draggable="${editMode ? 'true' : 'false'}"
                             style="--widget-color: ${w.color || 'transparent'};">
                            <div class="widget__header">
                                <span class="widget__header-icon">${getWidgetIcon(w.type)}</span>
                                <span class="widget__header-title">${w.title || 'Widget'}</span>
                                <div class="widget__header-actions">
                                    ${editMode ? `
                                        <button class="widget__header-btn" onclick="duplicateWidget('${w.id}')" title="Duplicate">⧉</button>
                                        <button class="widget__header-btn" onclick="openWidgetSettings('${w.id}')" title="Settings">⚙</button>
                                        <button class="widget__header-btn danger" onclick="deleteWidget('${w.id}')" title="Delete">✕</button>
                                    ` : ''}
                                    <button class="widget__header-btn" onclick="refreshWidget('${w.id}')" title="Refresh">⟳</button>
                                </div>
                            </div>
                            <div class="widget__body">
                                ${bodyHtml}
                            </div>
                            ${w.footer !== false ? `
                                <div class="widget__footer">
                                    <span>${w.footerText || 'Updated just now'}</span>
                                    <button class="widget__header-btn" onclick="refreshWidget('${w.id}')">⟳</button>
                                </div>
                            ` : ''}
                            ${editMode ? `<div class="widget__resize-handle"></div>` : ''}
                        </div>
                    `;
        }

        function renderWidgetBody(w) {
            const data = w.data || {};

            switch (w.type) {
                case 'bookmarks':
                    return renderBookmarks(data);
                case 'projects':
                    return renderProjects(data);
                case 'tasks':
                    return renderTasks(data, w.id);
                case 'notes':
                    return renderNotes(data, w.id);
                case 'weather':
                    return renderWeather(data);
                case 'rss':
                    return renderRSS(data);
                case 'clock':
                    return renderClock(data);
                case 'calendar':
                    return renderCalendar(data);
                case 'embed':
                    return renderEmbed(data);
                case 'github':
                    return renderGitHub(data);
                case 'ai':
                    return renderAI(data, w.id);
                default:
                    return `<div class="widget__body--empty">Unknown widget type</div>`;
            }
        }

        // --- Widget renderers ---

        function renderBookmarks(data) {
            const items = data?.items || [];
            if (items.length === 0) return `<div class="widget__body--empty">No bookmarks yet</div>`;
            return `
                        <div class="bookmark-grid">
                            ${items.map(b => `
                                <a class="bookmark-item" href="${b.url}" target="_blank" rel="noopener">
                                    <div class="bookmark-item__icon">${b.icon || '🌐'}</div>
                                    <span class="bookmark-item__name">${b.name}</span>
                                </a>
                            `).join('')}
                        </div>
                    `;
        }

        function renderProjects(data) {
            const items = data?.items || [];
            if (items.length === 0) return `<div class="widget__body--empty">No projects yet</div>`;
            return `
                        <div class="project-list">
                            ${items.map(p => `
                                <div class="project-item">
                                    <div class="project-item__info">
                                        <div class="project-item__name">${p.name}</div>
                                        <div class="project-item__meta">
                                            <span>${p.deadline || 'No deadline'}</span>
                                            <span class="project-item__status project-item__status--${p.status || 'planning'}">${p.status || 'Planning'}</span>
                                        </div>
                                    </div>
                                    <div class="project-item__progress">
                                        <div class="project-item__progress-bar" style="width:${p.progress || 0}%"></div>
                                    </div>
                                    <span style="font-size:12px;font-weight:700;color:var(--black-50);">${p.progress || 0}%</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
        }

        function renderTasks(data, widgetId) {
            const items = data?.items || [];
            return `
                        <div class="task-list">
                            ${items.map((t, i) => `
                                <div class="task-item" data-task-index="${i}">
                                    <div class="task-item__checkbox ${t.done ? 'checked' : ''}" onclick="toggleTask('${widgetId}', ${i})">
                                        ${t.done ? '✓' : ''}
                                    </div>
                                    <span class="task-item__text ${t.done ? 'done' : ''}">${t.text}</span>
                                    ${t.priority ? `<span class="task-item__priority task-item__priority--${t.priority}"></span>` : ''}
                                    ${t.due ? `<span class="task-item__due">${t.due}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                        <div class="task-add">
                            <input class="task-add__input" id="taskInput_${widgetId}" placeholder="Add a task..." />
                            <button class="task-add__btn" data-widget-id="${widgetId}">Add</button>
                        </div>
                    `;
        }

        function renderNotes(data, widgetId) {
            return `<textarea class="note-editor" data-widget-id="${widgetId}" placeholder="Write your note here...">${data?.content || ''}</textarea>`;
        }

        function renderWeather(data) {
            const d = data || { city: 'San Francisco', temp: 72, condition: 'Sunny', humidity: 45, wind: 12 };
            return `
                        <div class="weather-display">
                            <div>
                                <div class="weather-display__temp">${d.temp || '--'}°<span>F</span></div>
                                <div style="font-size:16px;font-weight:600;color:var(--black-60);">${d.condition || '--'}</div>
                            </div>
                            <div class="weather-display__details">
                                <div><span class="label">📍</span> ${d.city || 'Unknown'}</div>
                                <div><span class="label">💧</span> ${d.humidity || '--'}%</div>
                                <div><span class="label">💨</span> ${d.wind || '--'} mph</div>
                            </div>
                        </div>
                    `;
        }

        function renderRSS(data) {
            const items = data?.items || [];
            if (items.length === 0) return `<div class="widget__body--empty">No feed items</div>`;
            return `
                        <div class="rss-list">
                            ${items.map(item => `
                                <a class="rss-item" href="#" onclick="return false;">
                                    <div class="rss-item__icon">📰</div>
                                    <div class="rss-item__content">
                                        <div class="rss-item__title">${item.title}</div>
                                        <div class="rss-item__meta">${item.source || ''} · ${item.time || ''}</div>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    `;
        }

        function renderClock(data) {
            return `
                        <div class="clock-display" id="clockDisplay">
                            <div class="clock-display__time" id="clockTime">--:--:--</div>
                            <div class="clock-display__date" id="clockDate">Loading...</div>
                        </div>
                    `;
        }

        function renderCalendar(data) {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = now.getDate();

            const events = data?.events || [];
            const eventDates = events.map(e => e.date);

            let days = '';
            for (let i = 0; i < firstDay; i++) {
                days += `<div class="calendar-grid__day other-month"></div>`;
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = d === today ? 'today' : '';
                const hasEvent = eventDates.includes(dateStr) ? 'has-event' : '';
                days += `<div class="calendar-grid__day ${isToday} ${hasEvent}">${d}</div>`;
            }

            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September',
                'October', 'November', 'December'
            ];

            return `
                        <div style="text-align:center;font-weight:700;margin-bottom:10px;">${monthNames[month]} ${year}</div>
                        <div class="calendar-grid">
                            ${['S','M','T','W','T','F','S'].map(d => `<div class="calendar-grid__header">${d}</div>`).join('')}
                            ${days}
                        </div>
                    `;
        }

        function renderEmbed(data) {
            const url = data?.url || '';
            return `
                        <div class="embed-container">
                            ${url ? `<iframe src="${url}" allowfullscreen loading="lazy"></iframe>` : 
                                `<div class="widget__body--empty">Enter a URL in settings</div>`}
                        </div>
                    `;
        }

        function renderGitHub(data) {
            const events = data?.events || [];
            if (events.length === 0) return `<div class="widget__body--empty">No GitHub activity</div>`;
            return `
                        <div style="display:flex;flex-direction:column;gap:8px;">
                            ${events.map(e => `
                                <div style="display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--black-5);font-size:13px;">
                                    <span>${e.icon || '📦'}</span>
                                    <span style="flex:1;">${e.text || 'Activity'}</span>
                                    <span style="font-size:11px;color:var(--black-40);">${e.time || ''}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
        }

        function renderAI(data, widgetId) {
            return `
                        <div style="display:flex;flex-direction:column;gap:12px;">
                            <div style="display:flex;gap:8px;">
                                <input class="task-add__input" id="aiInput_${widgetId}" placeholder="Ask AI anything..." style="flex:1;" />
                                <button class="task-add__btn" data-ai="true" data-widget-id="${widgetId}">Ask</button>
                            </div>
                            <div id="aiResponse_${widgetId}" style="font-size:14px;color:var(--black-60);min-height:60px;padding:8px;background:var(--black-5);border-radius:var(--radius-sm);">
                                ${data?.response || 'Ask me something! 🧠'}
                            </div>
                        </div>
                    `;
        }

        // ============================================================
        // WIDGET HELPERS
        // ============================================================
        function getWidgetIcon(type) {
            const found = WIDGET_TYPES.find(w => w.id === type);
            return found ? found.icon : '📦';
        }

        function getWidgetTypeName(type) {
            const found = WIDGET_TYPES.find(w => w.id === type);
            return found ? found.name : type;
        }

        function getDefaultWidgetData(type) {
            switch (type) {
                case 'bookmarks':
                    return { items: [{ name: 'Google', url: 'https://google.com', icon: '🌐' }, { name: 'GitHub',
                            url: 'https://github.com', icon: '🐙' }] };
                case 'projects':
                    return { items: [{ name: 'New Project', progress: 0, status: 'planning', deadline: '' }] };
                case 'tasks':
                    return { items: [{ text: 'New task', done: false, priority: 'medium', due: '' }] };
                case 'notes':
                    return { content: 'Write your note here...' };
                case 'weather':
                    return { city: 'New York', temp: 68, condition: 'Cloudy', humidity: 55, wind: 8 };
                case 'rss':
                    return { feed: '', items: [{ title: 'Sample article', source: 'Example', time: '1h ago' }] };
                case 'clock':
                    return { timezone: 'local' };
                case 'calendar':
                    return { events: [{ date: new Date().toISOString().slice(0, 10), title: 'Event' }] };
                case 'embed':
                    return { url: '' };
                case 'github':
                    return { events: [{ icon: '📦', text: 'Pushed to main', time: '2h ago' }] };
                case 'ai':
                    return { response: 'Ask me something! 🧠' };
                default:
                    return {};
            }
        }

        // ============================================================
        // PAGE FUNCTIONS
        // ============================================================
        function updatePageName() {
            const el = document.getElementById('pageName');
            const page = pages.find(p => p.id === currentPageId);
            if (page) {
                el.innerHTML = `${page.icon || '📄'} ${page.name} <span class="sub">· ${widgets.length} widgets</span>`;
            }
        }

        function switchPage(pageId) {
            if (!currentUser || pageId === currentPageId) return;
            currentPageId = pageId;
            // Update default page in settings
            updateDoc(doc(db, COLLECTIONS.SETTINGS, currentUser.uid), {
                defaultPage: pageId,
                updatedAt: serverTimestamp()
            }).catch(console.error);

            // Reload widgets for new page
            loadWidgets().then(() => {
                renderAll();
                setupWidgetsListener();
            });
            closeSidebar();
        }

        async function addPage() {
            if (!currentUser) return;
            const name = prompt('Enter page name:');
            if (!name) return;

            try {
                const newPage = {
                    userId: currentUser.uid,
                    name: name,
                    icon: '📄',
                    order: pages.length,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                };
                const docRef = doc(collection(db, COLLECTIONS.PAGES));
                await setDoc(docRef, newPage);
                showToast(`Page "${name}" created!`, 'success');
            } catch (error) {
                console.error('Error creating page:', error);
                showToast('Error creating page', 'error');
            }
        }

        // ============================================================
        // WIDGET CRUD (Firebase)
        // ============================================================
        async function addWidget(type) {
            if (!currentUser || !currentPageId) return;

            try {
                const newWidget = {
                    userId: currentUser.uid,
                    pageId: currentPageId,
                    type: type,
                    title: getWidgetTypeName(type),
                    size: 'small',
                    height: 'md',
                    color: null,
                    data: getDefaultWidgetData(type),
                    order: widgets.length,
                    footer: true,
                    footerText: 'Created just now',
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                };

                const docRef = doc(collection(db, COLLECTIONS.WIDGETS));
                await setDoc(docRef, newWidget);

                closeModal('addWidgetModal');
                showToast(`Added ${getWidgetTypeName(type)} widget!`, 'success');

            } catch (error) {
                console.error('Error adding widget:', error);
                showToast('Error adding widget', 'error');
            }
        }

        async function deleteWidget(widgetId) {
            if (!confirm('Delete this widget?')) return;

            try {
                await deleteDoc(doc(db, COLLECTIONS.WIDGETS, widgetId));
                showToast('Widget deleted', 'success');
            } catch (error) {
                console.error('Error deleting widget:', error);
                showToast('Error deleting widget', 'error');
            }
        }

        async function duplicateWidget(widgetId) {
            if (!currentUser || !currentPageId) return;

            try {
                const original = widgets.find(w => w.id === widgetId);
                if (!original) return;

                const copy = {
                    userId: currentUser.uid,
                    pageId: currentPageId,
                    type: original.type,
                    title: original.title + ' (copy)',
                    size: original.size || 'small',
                    height: original.height || 'md',
                    color: original.color || null,
                    data: JSON.parse(JSON.stringify(original.data || {})),
                    order: widgets.length,
                    footer: true,
                    footerText: 'Copied just now',
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                };

                const docRef = doc(collection(db, COLLECTIONS.WIDGETS));
                await setDoc(docRef, copy);
                showToast('Widget duplicated!', 'success');

            } catch (error) {
                console.error('Error duplicating widget:', error);
                showToast('Error duplicating widget', 'error');
            }
        }

        async function refreshWidget(widgetId) {
            try {
                const now = new Date().toLocaleTimeString();
                await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                    footerText: `Updated ${now}`,
                    updatedAt: serverTimestamp()
                });
            } catch (error) {
                console.error('Error refreshing widget:', error);
            }
        }

        // ============================================================
        // WIDGET SETTINGS
        // ============================================================
        async function openWidgetSettings(widgetId) {
            const widget = widgets.find(w => w.id === widgetId);
            if (!widget) return;

            const title = prompt('Widget title:', widget.title);
            if (title !== null) widget.title = title || 'Widget';

            const color = prompt('Widget color (hex, e.g. #ff6b35):', widget.color || 'transparent');
            if (color !== null) widget.color = color || null;

            const size = prompt('Size (small, medium, large, full):', widget.size || 'small');
            if (size !== null && ['small', 'medium', 'large', 'full'].includes(size)) widget.size = size;

            const height = prompt('Height (sm, md, lg, xl):', widget.height || 'md');
            if (height !== null && ['sm', 'md', 'lg', 'xl'].includes(height)) widget.height = height;

            // Type-specific settings
            if (widget.type === 'embed') {
                const url = prompt('Embed URL:', widget.data?.url || '');
                if (url !== null) widget.data.url = url;
            }
            if (widget.type === 'weather') {
                const city = prompt('City:', widget.data?.city || '');
                if (city !== null) widget.data.city = city;
            }
            if (widget.type === 'rss') {
                const feed = prompt('RSS Feed URL:', widget.data?.feed || '');
                if (feed !== null) widget.data.feed = feed;
            }

            try {
                await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                    title: widget.title,
                    color: widget.color,
                    size: widget.size,
                    height: widget.height,
                    data: widget.data,
                    updatedAt: serverTimestamp()
                });
                showToast('Widget settings updated!', 'success');
            } catch (error) {
                console.error('Error updating widget:', error);
                showToast('Error updating widget', 'error');
            }
        }

        // ============================================================
        // TASKS (Firebase)
        // ============================================================
        async function addTask(widgetId, text) {
            if (!text || !text.trim()) return;

            const widget = widgets.find(w => w.id === widgetId);
            if (!widget) return;

            if (!widget.data.items) widget.data.items = [];
            widget.data.items.push({ text: text.trim(), done: false, priority: 'medium', due: '' });

            try {
                await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                    data: widget.data,
                    updatedAt: serverTimestamp()
                });
                // Clear input
                const input = document.getElementById('taskInput_' + widgetId);
                if (input) input.value = '';
            } catch (error) {
                console.error('Error adding task:', error);
                showToast('Error adding task', 'error');
            }
        }

        async function toggleTask(widgetId, index) {
            const widget = widgets.find(w => w.id === widgetId);
            if (!widget || !widget.data.items || index >= widget.data.items.length) return;

            widget.data.items[index].done = !widget.data.items[index].done;

            try {
                await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                    data: widget.data,
                    updatedAt: serverTimestamp()
                });
            } catch (error) {
                console.error('Error toggling task:', error);
            }
        }

        // ============================================================
        // NOTES (Firebase)
        // ============================================================
        let noteTimeout = {};

        async function saveNoteContent(widgetId, content) {
            // Debounce saves
            clearTimeout(noteTimeout[widgetId]);
            noteTimeout[widgetId] = setTimeout(async () => {
                const widget = widgets.find(w => w.id === widgetId);
                if (!widget) return;

                widget.data.content = content;

                try {
                    await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                        data: widget.data,
                        updatedAt: serverTimestamp()
                    });
                } catch (error) {
                    console.error('Error saving note:', error);
                }
            }, 500);
        }

        // ============================================================
        // AI ASSISTANT (Firebase - simulated)
        // ============================================================
        async function askAI(widgetId) {
            const input = document.getElementById('aiInput_' + widgetId);
            const response = document.getElementById('aiResponse_' + widgetId);
            if (!input || !response) return;

            const question = input.value.trim();
            if (!question) return;

            response.textContent = '🤔 Thinking...';

            // Simulate AI response
            setTimeout(async () => {
                const answers = [
                    'That\'s a great question! Let me think about that... 🤔',
                    'I\'d suggest breaking it down into smaller steps. Start with the most important part first!',
                    'Based on what you\'ve told me, I think you should focus on the UI/UX first, then add the backend logic.',
                    'Have you considered using DockGrid to organize your thoughts? 😄',
                    'That sounds like a fun project! I\'d love to help you build it.',
                    'Interesting! Tell me more about what you\'re trying to achieve.',
                    'I think you\'re on the right track. Keep going! 💪',
                    'Great question! Here\'s what I\'d recommend...'
                ];
                const random = answers[Math.floor(Math.random() * answers.length)];
                response.textContent = random;

                // Save to Firebase
                const widget = widgets.find(w => w.id === widgetId);
                if (widget) {
                    widget.data.response = random;
                    try {
                        await updateDoc(doc(db, COLLECTIONS.WIDGETS, widgetId), {
                            data: widget.data,
                            updatedAt: serverTimestamp()
                        });
                    } catch (error) {
                        console.error('Error saving AI response:', error);
                    }
                }
            }, 800 + Math.random() * 600);
        }

        // ============================================================
        // BACKGROUND (Firebase)
        // ============================================================
        function openBackgroundModal() {
            document.getElementById('bgModal').classList.add('open');
            const bg = settings.background || '#f0f0f0';
            document.getElementById('bgColor').value = bg;
            document.getElementById('bgColorHex').value = bg;
            document.getElementById('bgBlur').value = settings.blur || 0;
            document.getElementById('bgBlurValue').textContent = (settings.blur || 0) + 'px';
            document.getElementById('bgBrightness').value = settings.brightness || 100;
            document.getElementById('bgBrightnessValue').textContent = (settings.brightness || 100) + '%';
            document.getElementById('bgWallpaper').value = settings.wallpaper || '';
        }

        async function applyBackground() {
            if (!currentUser) return;

            const color = document.getElementById('bgColor').value;
            const blur = parseInt(document.getElementById('bgBlur').value) || 0;
            const brightness = parseInt(document.getElementById('bgBrightness').value) || 100;
            const wallpaper = document.getElementById('bgWallpaper').value.trim();

            const dashboard = document.getElementById('dashboard');

            if (wallpaper) {
                dashboard.style.backgroundImage = `url(${wallpaper})`;

                dashboard.style.backgroundColor = color;

            dashboard.style.backdropFilter = `blur(${blur}px) brightness(${brightness}%)`;
            dashboard.style.backgroundBlendMode = 'overlay';

            document.getElementById('bgBlurValue').textContent = blur + 'px';
            document.getElementById('bgBrightnessValue').textContent = brightness + '%';

            // Save to Firebase
            try {
                await updateDoc(doc(db, COLLECTIONS.SETTINGS, currentUser.uid), {
                    background: color,
                    blur: blur,
                    brightness: brightness,
                    wallpaper: wallpaper,
                    updatedAt: serverTimestamp()
                });
                settings.background = color;
                settings.blur = blur;
                settings.brightness = brightness;
                settings.wallpaper = wallpaper;
            } catch (error) {
                console.error('Error saving background:', error);
            }

            closeModal('bgModal');
        }

        function resetBackground() {
            const dashboard = document.getElementById('dashboard');

            dashboard.style.backgroundColor = 'var(--black-5)';

        // ============================================================
        function toggleEditMode() {
