<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockGrid - Dashboard</title>
    <meta name="theme-color" content="#ff6b35">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23ff6b35'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='bold' font-family='system-ui'>D</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <style>
        /* ===== FULL CSS ===== */
        :root{--orange-500:#ff6b35;--orange-600:#e85d2c;--orange-400:#ff8c5a;--black-90:#0a0a0a;--black-80:#1a1a1a;--black-70:#2a2a2a;--black-50:#555;--black-40:#777;--black-20:#ccc;--black-10:#e0e0e0;--black-5:#f5f5f5;--white:#fff;--white-a10:rgba(255,255,255,0.1);--white-a20:rgba(255,255,255,0.2);--white-a50:rgba(255,255,255,0.5);--white-a70:rgba(255,255,255,0.7);--red-500:#ef4444;--green-500:#22c55e;--blue-500:#4285f4;--font:'Inter',system-ui,sans-serif;--radius-xs:4px;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;--shadow-xs:0 1px 3px rgba(0,0,0,0.06);--shadow-sm:0 2px 8px rgba(0,0,0,0.08);--shadow-md:0 4px 16px rgba(0,0,0,0.1);--shadow-lg:0 8px 28px rgba(0,0,0,0.12);--transition:180ms cubic-bezier(0.4,0,0.2,1)}
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);-webkit-font-smoothing:antialiased;font-size:14px;background:#0a0a0a}
        body{display:flex;flex-direction:column}
        .bg-layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background-size:cover;background-position:center;opacity:0.85;transition:background-image 0.8s ease}
        .bg-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;background:rgba(0,0,0,0.3);pointer-events:none}
        .bg-pattern{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
        .app{position:relative;z-index:2;display:flex;flex-direction:column;height:100%}
        .loading-bar{position:fixed;top:0;left:0;height:3px;background:var(--orange-500);z-index:9999;width:0;transition:width 0.4s ease-out;border-radius:0 2px 2px 0}.loading-bar.active{width:70%;animation:loadingPulse 1.5s ease-in-out infinite}.loading-bar.done{width:100%;opacity:0;transition:width 0.3s ease-out,opacity 0.3s ease-out}@keyframes loadingPulse{0%{width:30%}50%{width:80%}100%{width:30%}}

        /* Header */
        .header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;z-index:10;flex-shrink:0;gap:12px}
        .header-left{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .header-center{flex:1;display:flex;flex-direction:column;align-items:center;max-width:500px;gap:4px;min-width:200px}
        .header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .greeting{font-size:13px;font-weight:600;color:var(--white-a70);margin-bottom:2px}
        .page-title{font-size:20px;font-weight:800;color:var(--white);letter-spacing:-0.5px;cursor:text;padding:2px 10px;border-radius:var(--radius-sm);border:1px solid transparent;outline:none;background:rgba(0,0,0,0.2);transition:all var(--transition)}.page-title:hover{border-color:var(--white-a30)}.page-title:focus{border-color:var(--orange-500);background:rgba(0,0,0,0.4)}

        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:12px;font-weight:600;font-family:var(--font);border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);letter-spacing:-0.2px;white-space:nowrap}
        .btn-dark{background:rgba(0,0,0,0.5);color:var(--white);backdrop-filter:blur(12px)}.btn-dark:hover{background:rgba(0,0,0,0.7);transform:translateY(-1px)}
        .btn-primary{background:var(--orange-500);color:var(--white)}.btn-primary:hover{background:var(--orange-600);box-shadow:0 4px 12px rgba(255,107,53,0.4);transform:translateY(-1px)}
        .btn-light{background:var(--white);color:var(--black-80);border:1px solid var(--black-10)}.btn-light:hover{background:var(--black-5)}
        .btn-sm{padding:5px 12px;font-size:10px}

        .search-box{width:100%;max-width:420px}
        .search-inner{display:flex;align-items:center;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-xl);backdrop-filter:blur(8px);overflow:hidden;transition:all var(--transition)}.search-inner:focus-within{border-color:var(--orange-500);box-shadow:0 0 0 3px rgba(255,107,53,0.15)}
        .search-logo{padding:0 0 0 12px;font-size:13px;font-weight:700;display:flex}
        .search-logo span:nth-child(1){color:#4285f4}.search-logo span:nth-child(2){color:#ea4335}.search-logo span:nth-child(3){color:#fbbc05}.search-logo span:nth-child(4){color:#4285f4}.search-logo span:nth-child(5){color:#34a853}.search-logo span:nth-child(6){color:#ea4335}
        .search-input{flex:1;padding:9px 12px;font-size:12px;background:transparent;border:none;color:var(--white);outline:none;min-width:0}.search-input::placeholder{color:var(--white-a50)}
        .search-btn{display:flex;align-items:center;justify-content:center;padding:8px 14px;cursor:pointer;color:var(--white-a50);border:none;background:transparent;transition:all var(--transition)}.search-btn:hover{color:var(--white)}

        .avatar{width:34px;height:34px;border-radius:50%;background:var(--orange-500);display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:700;font-size:14px;cursor:pointer;border:2px solid rgba(255,255,255,0.2);transition:all var(--transition);overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.avatar:hover{border-color:var(--orange-500)}

        .dropdown{position:relative}.dropdown-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:200px;background:rgba(18,18,18,0.96);backdrop-filter:blur(16px);border:1px solid var(--white-a10);border-radius:var(--radius-md);padding:4px;z-index:999;box-shadow:0 12px 32px rgba(0,0,0,0.4)}.dropdown-menu.show{display:block;animation:dropIn 120ms ease-out}@keyframes dropIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
        .dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:11px;color:var(--white-a70);cursor:pointer;border-radius:var(--radius-xs);transition:all var(--transition);border:none;background:none;width:100%;text-align:left;font-family:var(--font)}.dropdown-item:hover{background:var(--white-a10);color:var(--white)}.dropdown-item.danger{color:#f87171}.dropdown-divider{height:1px;background:var(--white-a10);margin:3px 0}

        /* Main */
        .main{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 20px 20px}.main::-webkit-scrollbar{width:6px}.main::-webkit-scrollbar-track{background:transparent}.main::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}

        /* Grid */
        .widget-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;grid-auto-flow:dense;padding-bottom:60px}
        .widget-grid.cols-3{grid-template-columns:repeat(3,1fr)}.widget-grid.cols-2{grid-template-columns:repeat(2,1fr)}.widget-grid.cols-1{grid-template-columns:1fr}

        .widget{background:rgba(255,255,255,0.95);border-radius:var(--radius-sm);box-shadow:var(--shadow-xs);overflow:visible;display:flex;flex-direction:column;min-height:140px;transition:box-shadow var(--transition),transform var(--transition);position:relative;cursor:grab;border:1px solid rgba(0,0,0,0.06);grid-column:span 2}
        .widget:hover{box-shadow:var(--shadow-md);border-color:rgba(0,0,0,0.1);transform:translateY(-2px)}
        .widget.size-small{grid-column:span 1;min-height:120px}
        .widget.size-medium{grid-column:span 2;min-height:160px}
        .widget.size-large{grid-column:span 3;min-height:200px}
        .widget.size-huge{grid-column:span 4;min-height:260px}

        .widget-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fafbfc;border-bottom:1px solid #eee;min-height:40px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;user-select:none}
        .widget-title{font-size:13px;font-weight:600;color:#1a1a1a;cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid transparent;outline:none;background:transparent;max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.widget-title:hover{border-color:#ddd}
        .widget-actions{display:flex;gap:2px;opacity:0;transition:opacity 120ms}.widget-header:hover .widget-actions{opacity:1}
        .widget-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:none;background:transparent;color:#999;font-size:16px;transition:all var(--transition)}.widget-btn:hover{background:#eee;color:#333}

        .widget-body{padding:12px 14px;color:#333;font-size:12px;line-height:1.5;flex:1;overflow-y:auto;max-height:360px}.widget-body::-webkit-scrollbar{width:4px}.widget-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}

        .widget-context-menu{display:none;position:fixed;min-width:180px;background:rgba(20,20,20,0.96);backdrop-filter:blur(16px);border:1px solid var(--white-a10);border-radius:var(--radius-md);padding:4px;z-index:9999;box-shadow:0 16px 40px rgba(0,0,0,0.5);animation:dropIn 100ms ease-out}.widget-context-menu.show{display:block}

        .bookmark-grid{display:flex;flex-wrap:wrap;gap:8px}.bookmark-card{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 8px;border-radius:var(--radius-xs);text-decoration:none;color:#333;transition:all var(--transition);background:transparent}.bookmark-card:hover{background:#f5f7fa;transform:translateY(-2px)}.bookmark-card img{width:32px;height:32px;border-radius:6px}.bookmark-card span{font-size:9px;font-weight:600;color:#555;max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        .note-toolbar{display:flex;gap:2px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}.note-toolbar button{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-xs);cursor:pointer;border:1px solid transparent;background:transparent;color:#666;font-size:13px}.note-toolbar button:hover{background:#f0f0f0;border-color:#ddd}
        .note-content{min-height:60px;padding:4px 0;outline:none;font-size:12px;line-height:1.6;color:#333}.note-content:empty:before{content:'Click edit to write...';color:#bbb}

        .task-progress{height:3px;background:#eee;border-radius:2px;margin-bottom:8px}.task-progress-bar{height:100%;background:var(--orange-500);border-radius:2px;transition:width 0.3s}
        .task-item{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:var(--radius-xs);cursor:pointer;font-size:11px;color:#333}.task-item:hover{background:#f5f5f5}

        .embed-preview{border-radius:var(--radius-xs);overflow:hidden;background:#000;min-height:180px}.embed-preview iframe{width:100%;height:100%;min-height:180px;border:none}

        .calc-display{text-align:right;font-size:24px;font-weight:700;padding:8px 12px;background:#f9fafb;border-radius:var(--radius-xs);margin-bottom:6px;color:#1a1a1a;min-height:40px}.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}.calc-btn{padding:10px;font-size:13px;font-weight:600;border:1px solid #e0e0e0;border-radius:var(--radius-xs);cursor:pointer;background:#fff;color:#333;font-family:var(--font)}.calc-btn:hover{background:#f5f5f5}.calc-btn.operator{background:#fff5f0;color:var(--orange-500)}.calc-btn.equals{background:var(--orange-500);color:#fff;border-color:var(--orange-500)}.calc-btn.equals:hover{background:var(--orange-600)}

        .clock-display{text-align:center;padding:12px}.clock-time{font-size:36px;font-weight:800;color:#1a1a1a}.clock-date{font-size:10px;color:#888}

        .gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}.gallery-item{border-radius:var(--radius-xs);overflow:hidden;cursor:pointer;aspect-ratio:1;background:#f0f0f0}.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}.gallery-item:hover img{transform:scale(1.05)}

        .project-card{display:flex;flex-direction:column;gap:6px}.project-name{font-size:15px;font-weight:700}.project-desc{font-size:10px;color:#666}.project-meta{font-size:9px;color:#999}.project-links a{font-size:10px;color:var(--orange-500);margin-right:6px}

        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;color:var(--white-a50);text-align:center}.empty-state iconify-icon{font-size:48px;opacity:0.3}.empty-state h3{font-size:18px;font-weight:700}

        .footer{text-align:center;padding:12px;flex-shrink:0}.footer a{color:var(--white-a70);font-size:10px;text-decoration:none}.footer a:hover{color:var(--orange-500)}

        /* Edit Panel */
        .edit-panel-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:300}.edit-panel-overlay.show{display:block}
        .edit-panel{position:fixed;top:0;right:-420px;width:400px;height:100%;background:#fff;z-index:301;transition:right 0.25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,0.1)}.edit-panel.open{right:0}
        .edit-panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #eee;background:#fafbfc}.edit-panel-title{font-weight:700;font-size:15px}
        .edit-panel-close{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:#888;cursor:pointer}.edit-panel-close:hover{background:#eee}
        .edit-panel-body{flex:1;overflow-y:auto;padding:16px 18px}.edit-panel-footer{display:flex;gap:8px;padding:14px 18px;border-top:1px solid #eee;background:#fafbfc}

        /* Pages Sidebar */
        .pages-sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:#fff;z-index:150;transform:translateX(-100%);transition:transform 0.2s;display:flex;flex-direction:column;box-shadow:2px 0 12px rgba(0,0,0,0.06)}.pages-sidebar.open{transform:translateX(0)}
        .pages-sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:149}.pages-sidebar-overlay.show{display:block}

        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center}.modal-overlay.show{display:flex}.modal{background:#fff;border-radius:var(--radius-lg);max-width:600px;width:94%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,0.2)}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #eee}.modal-body{padding:16px 18px;overflow-y:auto;flex:1}

        .toast-container{position:fixed;top:16px;right:16px;z-index:9999}.toast{padding:10px 16px;background:#1e1e1e;color:var(--white);border-left:3px solid var(--orange-500);border-radius:var(--radius-xs);font-size:11px;animation:slideIn 0.2s}@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}

        @media(max-width:900px){.widget-grid{grid-template-columns:repeat(2,1fr)!important}.widget.size-large{grid-column:span 2}.widget.size-huge{grid-column:span 2}}
        @media(max-width:600px){.widget-grid{grid-template-columns:1fr!important}.widget{grid-column:span 1!important}}
    </style>
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>
<div class="bg-layer" id="bgLayer" style="background-image:url('https://cdn.pixabay.com/photo/2020/07/25/14/23/cliff-5436923_1280.jpg')"></div>
<div class="bg-overlay"></div>
<div class="bg-pattern"></div>
<div class="toast-container" id="toastContainer"></div>

<!-- Lightbox -->
<div id="lightbox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px" onclick="DG.closeLightbox()">
    <button style="position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.1);border:none;color:white;width:40px;height:40px;border-radius:50%;cursor:pointer" onclick="DG.closeLightbox()"><iconify-icon icon="mdi:close" width="20"></iconify-icon></button>
    <img id="lightboxImg" style="max-width:90%;max-height:80vh;border-radius:8px" src="">
    <div style="display:flex;gap:8px"><button onclick="DG.downloadImage()" style="padding:8px 16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;border-radius:6px;cursor:pointer"><iconify-icon icon="mdi:download" width="16"></iconify-icon> Download</button></div>
</div>

<!-- Pages Sidebar -->
<div class="pages-sidebar-overlay" id="pagesOverlay" onclick="DG.closePagesSidebar()"></div>
<div class="pages-sidebar" id="pagesSidebar">
    <div style="padding:14px 16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700">Your Pages</span>
        <button onclick="DG.closePagesSidebar()" style="background:none;border:none;cursor:pointer"><iconify-icon icon="mdi:close" width="16"></iconify-icon></button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:8px" id="pagesList"></div>
    <div style="padding:12px 16px;border-top:1px solid #eee">
        <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="DG.openNewPageModal()"><iconify-icon icon="mdi:plus"></iconify-icon> New Page</button>
        <small id="pageLimit" style="display:block;text-align:center;color:#999;font-size:10px;margin-top:4px"></small>
    </div>
</div>

<!-- Edit Panel -->
<div class="edit-panel-overlay" id="editPanelOverlay" onclick="DG.closeEditPanel()"></div>
<div class="edit-panel" id="editPanel">
    <div class="edit-panel-header"><span class="edit-panel-title" id="editPanelTitle">Edit</span><button class="edit-panel-close" onclick="DG.closeEditPanel()"><iconify-icon icon="mdi:close"></iconify-icon></button></div>
    <div class="edit-panel-body" id="editPanelBody"></div>
    <div class="edit-panel-footer"><button class="btn btn-light" onclick="DG.closeEditPanel()" style="flex:1;justify-content:center">Cancel</button><button class="btn btn-primary" onclick="DG.saveEditPanel()" style="flex:1;justify-content:center">Save</button></div>
</div>

<div class="app">
    <header class="header">
        <div class="header-left">
            <button class="btn btn-dark" onclick="DG.openPagesSidebar()"><iconify-icon icon="mdi:file-document-multiple-outline" width="14"></iconify-icon> Pages</button>
            <span style="color:var(--white-a70);font-size:11px;font-weight:500" id="usernameDisplay">@user</span>
        </div>
        <div class="header-center">
            <div class="greeting" id="greetingMsg"></div>
            <span class="page-title" id="pageTitleDisplay" contenteditable="true" spellcheck="false" onblur="DG.savePageTitle(this.textContent)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">DockGrid Page</span>
            <div class="search-box">
                <div class="search-inner">
                    <div class="search-logo"><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span></div>
                    <input class="search-input" id="searchInput" placeholder="Search or type a URL..." onkeydown="if(event.key==='Enter')DG.searchGoogle(this.value)">
                    <button class="search-btn" onclick="DG.searchGoogle(document.getElementById('searchInput').value)"><iconify-icon icon="mdi:magnify" width="16"></iconify-icon></button>
                </div>
            </div>
        </div>
        <div class="header-right">
            <button class="btn btn-dark" onclick="DG.openAddWidgetModal()"><iconify-icon icon="mdi:plus" width="14"></iconify-icon> Add</button>
            <button class="btn btn-dark" onclick="DG.openPageSettingsModal()"><iconify-icon icon="mdi:cog-outline" width="14"></iconify-icon></button>
            <div class="dropdown" id="avatarDropdown">
                <div class="avatar" id="avatarBtn" onclick="DG.toggleDropdown('avatarMenu')"><span id="avatarInitial">U</span></div>
                <div class="dropdown-menu" id="avatarMenu">
                    <div class="dropdown-item" onclick="DG.openProfileModal()"><iconify-icon icon="mdi:camera-plus-outline" width="15"></iconify-icon> Change profile image</div>
                    <div class="dropdown-item" onclick="DG.openBackgroundModal()"><iconify-icon icon="mdi:image-outline" width="15"></iconify-icon> Change background</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item danger" onclick="DG.handleSignOut()"><iconify-icon icon="mdi:logout" width="15"></iconify-icon> Sign out</div>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="widget-grid cols-3" id="widgetGrid"></div>
        <div class="empty-state" id="emptyState"><iconify-icon icon="mdi:view-dashboard-outline"></iconify-icon><h3>Your dashboard is empty</h3><p style="color:var(--white-a50);font-size:13px">Click <strong style="color:var(--orange-500)">Add</strong> to start building</p></div>
    </main>

    <div class="footer"><a href="https://pireactive.vercel.app/" target="_blank" rel="noopener">DockGrid © 2026 By PIReactive</a></div>
</div>

<!-- New Page Modal (Template Selection) -->
<div class="modal-overlay" id="newPageModal">
    <div class="modal">
        <div class="modal-header"><span style="font-weight:700;font-size:18px">Create New Page</span><button onclick="DG.closeModal('newPageModal')" style="background:none;border:none;cursor:pointer"><iconify-icon icon="mdi:close"></iconify-icon></button></div>
        <div class="modal-body">
            <p style="margin-bottom:16px;color:#555;font-size:14px">Choose a template or start from scratch.</p>
            <div id="templateSelectionGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px"></div>
            <div style="display:flex;gap:8px;margin-top:20px;justify-content:flex-end">
                <button class="btn btn-light" onclick="DG.closeModal('newPageModal')">Cancel</button>
                <button class="btn btn-primary" onclick="DG.createPageFromScratch()">Start from Scratch</button>
            </div>
        </div>
    </div>
</div>

<!-- Add Widget Modal -->
<div class="modal-overlay" id="addWidgetModal">
    <div class="modal">
        <div class="modal-header"><span style="font-weight:700;font-size:18px">Add Widget</span><button onclick="DG.closeModal('addWidgetModal')" style="background:none;border:none;cursor:pointer"><iconify-icon icon="mdi:close"></iconify-icon></button></div>
        <div class="modal-body">
            <div id="widgetTypeGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px"></div>
        </div>
    </div>
</div>

<!-- Page Settings Modal -->
<div class="modal-overlay" id="pageSettingsModal">
    <div class="modal">
        <div class="modal-header"><span style="font-weight:700;font-size:18px">Page Settings</span><button onclick="DG.closeModal('pageSettingsModal')" style="background:none;border:none;cursor:pointer"><iconify-icon icon="mdi:close"></iconify-icon></button></div>
        <div id="settingsTabs" style="display:flex;border-bottom:1px solid #eee"></div>
        <div id="settingsTabContent" style="padding:16px;overflow-y:auto;flex:1"></div>
    </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal">
    <div class="modal" style="max-width:400px">
        <div class="modal-header"><span style="font-weight:700">Profile Image</span><button onclick="DG.closeModal('profileModal')" style="background:none;border:none;cursor:pointer"><iconify-icon icon="mdi:close"></iconify-icon></button></div>
        <div class="modal-body" style="text-align:center">
            <div class="avatar" style="width:64px;height:64px;margin:0 auto"><span id="profileInitial">U</span></div>
            <input type="file" id="profileUpload" accept="image/*" onchange="DG.uploadProfile(event)" style="margin-top:16px;width:100%">
        </div>
    </div>
</div>

<!-- Global Context Menu -->
<div class="widget-context-menu" id="widgetContextMenu"></div>

<script type="module" src="jssrc/firebase-core.js"></script>
<script defer src="jssrc/dockgrid-app.js"></script>
</body>
</html>
