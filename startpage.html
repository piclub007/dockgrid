<html lang="en">

    <style>
        :root{--orange-500:#ff6b35;--orange-600:#e85d2c;--orange-400:#ff8c5a;--black-100:#000;--black-90:#0a0a0a;--black-80:#1a1a1a;--black-70:#2a2a2a;--black-50:#555;--black-40:#777;--black-20:#ccc;--black-10:#e0e0e0;--black-5:#f5f5f5;--white:#fff;--white-a10:rgba(255,255,255,0.1);--white-a20:rgba(255,255,255,0.2);--white-a50:rgba(255,255,255,0.5);--white-a70:rgba(255,255,255,0.7);--white-a90:rgba(255,255,255,0.9);--red-500:#ef4444;--green-500:#22c55e;--font:'Inter',system-ui,sans-serif;--radius-xs:4px;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;--shadow-sm:0 1px 4px rgba(0,0,0,0.08);--shadow-md:0 4px 12px rgba(0,0,0,0.1);--shadow-lg:0 8px 24px rgba(0,0,0,0.12);--transition:150ms cubic-bezier(0.4,0,0.2,1)}
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);-webkit-font-smoothing:antialiased;font-size:14px}

        .widget-title{font-size:13px;font-weight:600;color:#1a1a1a;cursor:pointer;padding:2px 5px;border-radius:3px;border:1px solid transparent;outline:none;font-family:var(--font);background:transparent;max-width:70%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none}

        .widget-action-btn:hover{background:#e8e8e8;color:#333}
        .widget-menu-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:none;background:transparent;color:#999;transition:all var(--transition);font-size:18px;position:relative}
        .widget-menu-btn:hover{background:#e8e8e8;color:#333}

        .calc-btn:hover{background:#f5f5f5}.calc-btn.operator{background:#fff5f0;color:var(--orange-500);font-weight:700}.calc-btn.equals{background:var(--orange-500);color:#fff;border-color:var(--orange-500);font-weight:700}.calc-btn.equals:hover{background:var(--orange-600)}

        .clock-date{font-size:11px;color:#888;margin-top:4px}

        .gallery-item{border-radius:var(--radius-xs);overflow:hidden;background:#f0f0f0}

        .project-card{padding:8px 0}

        .project-links{display:flex;gap:8px;flex-wrap:wrap}

        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;color:var(--white-a50);text-align:center;gap:10px}

        .footer{text-align:center;padding:12px 20px 16px;flex-shrink:0;z-index:5}
        .footer a{color:var(--white-a70);font-size:11px;font-weight:500;text-decoration:none;transition:color var(--transition);letter-spacing:-0.2px}.footer a:hover{color:var(--orange-500)}
        .edit-panel-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:300}.edit-panel-overlay.show{display:block}
        .edit-panel{position:fixed;top:0;right:-420px;width:400px;height:100%;background:#1e1e1e;z-index:301;transition:right 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,0.5)}.edit-panel.open{right:0}
        .edit-panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,0.08)}
        .edit-panel-title{font-size:15px;font-weight:700;color:var(--white)}
        .edit-panel-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:none;background:rgba(255,255,255,0.06);color:var(--white-a70);font-size:15px;transition:all var(--transition)}.edit-panel-close:hover{background:rgba(255,255,255,0.12);color:var(--white)}
        .edit-panel-body{flex:1;overflow-y:auto;padding:16px 18px}.edit-panel-body::-webkit-scrollbar{width:4px}.edit-panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
        .edit-panel-footer{display:flex;gap:8px;padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08)}
        .edit-list{max-height:200px;overflow-y:auto}.edit-item{display:flex;align-items:center;gap:8px;padding:6px;color:var(--white-a70);font-size:11px;border-radius:var(--radius-xs)}.edit-item:hover{background:rgba(255,255,255,0.05)}
        .btn-x{margin-left:auto;background:none;border:none;color:#f87171;cursor:pointer;font-size:12px}
        .pages-sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:rgba(16,16,16,0.98);backdrop-filter:blur(16px);z-index:150;transform:translateX(-100%);transition:transform 220ms ease-out;display:flex;flex-direction:column;border-right:1px solid var(--white-a10)}.pages-sidebar.open{transform:translateX(0)}
        .pages-sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--white-a10)}
        .pages-sidebar-title{font-size:14px;font-weight:700;color:var(--white)}
        .pages-sidebar-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:none;background:var(--white-a10);color:var(--white-a70);font-size:15px;transition:all var(--transition)}.pages-sidebar-close:hover{background:var(--white-a20);color:var(--white)}
        .pages-sidebar-body{flex:1;overflow-y:auto;padding:10px}.pages-sidebar-body::-webkit-scrollbar{width:4px}.pages-sidebar-body::-webkit-scrollbar-thumb{background:var(--white-a10);border-radius:2px}
        .page-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius-xs);cursor:pointer;transition:all var(--transition);color:var(--white-a70);font-size:12px;font-weight:500;margin-bottom:1px}.page-item:hover{background:var(--white-a10);color:var(--white)}.page-item.active{background:rgba(255,107,53,0.2);color:var(--orange-500);font-weight:600}
        .pages-empty{color:var(--white-a50);text-align:center;padding:16px;font-size:11px}
        .pages-sidebar-footer{padding:12px 18px;border-top:1px solid var(--white-a10)}
        .pages-sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:149}.pages-sidebar-overlay.show{display:block}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:200;align-items:center;justify-content:center}.modal-overlay.show{display:flex;animation:fadeIn 120ms ease-out}@keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .modal{background:#1e1e1e;border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-lg);max-width:580px;width:92%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 48px rgba(0,0,0,0.45);animation:modalIn 200ms ease-out}@keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}

        .modal-title{font-size:15px;font-weight:700;color:var(--white);letter-spacing:-0.3px}
        .modal-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:none;background:rgba(255,255,255,0.06);color:var(--white-a70);font-size:15px;transition:all var(--transition)}.modal-close:hover{background:rgba(255,255,255,0.12);color:var(--white)}

        .widget-type-btn{padding:12px 8px;border-radius:var(--radius-xs);border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all var(--transition);display:flex;flex-direction:column;align-items:center;gap:5px;background:transparent;color:var(--white-a70);font-family:var(--font);text-align:center;font-size:10px;width:100%}.widget-type-btn:hover{background:rgba(255,255,255,0.04);border-color:var(--orange-500);color:var(--white)}.widget-type-btn iconify-icon{font-size:22px;color:var(--orange-500)}
        .toast-container{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:5px}
        .toast{padding:9px 14px;background:#1e1e1e;color:var(--white);border-left:3px solid var(--orange-500);border-radius:var(--radius-xs);font-size:11px;font-weight:600;box-shadow:0 6px 18px rgba(0,0,0,0.25);animation:slideIn 200ms ease-out;max-width:300px}.toast.error{border-left-color:var(--red-500)}.toast.success{border-left-color:var(--green-500)}@keyframes slideIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
        @media(max-width:768px){.widget-grid.cols-3 .widget,.widget-grid.cols-4 .widget{width:100%!important}.widget-grid.cols-2 .widget{width:100%!important}.header-center{max-width:300px}.header{padding:6px 10px 0}.widget-type-grid{grid-template-columns:repeat(2,1fr)}.page-title{font-size:15px}.widget.size-small,.widget.size-medium,.widget.size-large{width:100%!important}}
    </style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>
<div class="bg-layer" id="bgLayer" style="background-image:url('https://cdn.pixabay.com/photo/2020/07/25/14/23/cliff-5436923_1280.jpg')"></div>
<div class="bg-overlay"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="pages-sidebar-overlay" id="pagesOverlay" onclick="DG.closePagesSidebar()"></div>
<div class="pages-sidebar" id="pagesSidebar">
    <div class="pages-sidebar-header"><span class="pages-sidebar-title">Your Pages</span><button class="pages-sidebar-close" onclick="DG.closePagesSidebar()"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button></div>
    <div class="pages-sidebar-body" id="pagesList"></div>
    <div class="pages-sidebar-footer"><button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="DG.createNewPage()" id="newPageBtn"><iconify-icon icon="mdi:plus" width="14" height="14"></iconify-icon> New Page</button><small style="color:var(--white-a50);display:block;text-align:center;margin-top:4px;font-size:10px" id="pageLimit"></small></div>
</div>

<div class="edit-panel-overlay" id="editPanelOverlay" onclick="DG.closeEditPanel()"></div>
<div class="edit-panel" id="editPanel">
    <div class="edit-panel-header"><span class="edit-panel-title" id="editPanelTitle">Edit Widget</span><button class="edit-panel-close" onclick="DG.closeEditPanel()"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button></div>
    <div class="edit-panel-body" id="editPanelBody"></div>
    <div class="edit-panel-footer"><button class="btn btn-dark" onclick="DG.closeEditPanel()" style="flex:1;justify-content:center">Cancel</button><button class="btn btn-primary" onclick="DG.saveEditPanel()" style="flex:1;justify-content:center">Save</button></div>
</div>

<div class="app">
    <header class="header">
        <div class="header-top">
            <div class="header-left"><button class="btn btn-dark" onclick="DG.openPagesSidebar()"><iconify-icon icon="mdi:file-document-multiple-outline" width="14" height="14"></iconify-icon> Pages</button><span class="header-username" id="usernameDisplay">@user</span></div>
            <div class="header-center"><span class="page-title" id="pageTitleDisplay" contenteditable="true" spellcheck="false" onblur="DG.savePageTitle(this.textContent)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">DockGrid Page</span><div class="search-box"><span class="search-icon"><iconify-icon icon="mdi:magnify" width="16" height="16"></iconify-icon></span><input type="text" class="search-input" placeholder="Search Google or type a URL..." onkeydown="if(event.key==='Enter')DG.searchGoogle(this.value)"></div></div>
            <div class="header-right"><button class="btn btn-dark" onclick="DG.openAddWidgetModal()"><iconify-icon icon="mdi:plus" width="14" height="14"></iconify-icon> Add</button><button class="btn btn-dark" onclick="DG.openPageSettingsModal()"><iconify-icon icon="mdi:pencil-outline" width="14" height="14"></iconify-icon> Edit</button><div class="dropdown" id="avatarDropdown"><div class="avatar" id="avatarBtn" onclick="DG.toggleDropdown('avatarMenu')"><span id="avatarInitial">U</span></div><div class="dropdown-menu" id="avatarMenu"><div class="dropdown-item" onclick="DG.openProfileModal()"><iconify-icon icon="mdi:camera-plus-outline" width="15" height="15"></iconify-icon> Change profile image</div><div class="dropdown-item" onclick="DG.openBackgroundModal()"><iconify-icon icon="mdi:image-outline" width="15" height="15"></iconify-icon> Change background</div><div class="dropdown-divider"></div><div class="dropdown-item danger" onclick="DG.handleSignOut()"><iconify-icon icon="mdi:logout" width="15" height="15"></iconify-icon> Sign out</div></div></div></div>
        </div>
    </header>
    <main class="main" id="mainContent"><div class="widget-grid cols-3" id="widgetGrid"></div><div class="empty-state" id="emptyState"><iconify-icon icon="mdi:view-dashboard-outline"></iconify-icon><h3>Your dashboard is empty</h3><p>Click <strong style="color:var(--orange-500)">Add</strong> to start building</p></div></main>
    <div class="footer"><a href="https://pireactive.vercel.app/" target="_blank" rel="noopener">DockGrid © 2026 By PIReactive</a></div>
</div>

<div class="modal-overlay" id="addWidgetModal"><div class="modal"><div class="modal-header"><span class="modal-title">Add Widget</span><button class="modal-close" onclick="DG.closeModal('addWidgetModal')"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button></div><div class="modal-body"><div class="widget-type-grid" id="widgetTypeGrid"></div></div></div></div>
<div class="modal-overlay" id="pageSettingsModal"><div class="modal"><div class="modal-header"><span class="modal-title">Page Settings</span><button class="modal-close" onclick="DG.closeModal('pageSettingsModal')"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button></div><div class="modal-tabs"><button class="modal-tab active" data-tab="tab-general" onclick="DG.switchSettingsTab('tab-general',this)">General</button><button class="modal-tab" data-tab="tab-background" onclick="DG.switchSettingsTab('tab-background',this)">Background</button><button class="modal-tab" data-tab="tab-columns" onclick="DG.switchSettingsTab('tab-columns',this)">Columns</button><button class="modal-tab" data-tab="tab-preferences" onclick="DG.switchSettingsTab('tab-preferences',this)">Preferences</button></div><div class="modal-body"><div class="tab-content active" id="tab-general"><div class="form-group"><label class="form-label">Page Title <small id="titleCount">0/50</small></label><input type="text" class="form-input" id="pageTitle" placeholder="Enter title" maxlength="50" oninput="document.getElementById('titleCount').textContent=this.value.length+'/50'"></div><div class="form-group"><label class="form-label">Description</label><textarea class="form-input form-textarea" id="pageDescription" placeholder="Auto-generate"></textarea></div></div><div class="tab-content" id="tab-background"><div class="form-group"><label class="form-label">Select image</label><div class="image-grid" id="bgImageGrid"></div></div><div class="form-group"><label class="form-label">Upload image</label><input type="file" class="form-input" id="bgUpload" accept="image/*" onchange="DG.uploadBg(event)" style="padding:7px"></div><button class="btn btn-dark" style="width:100%;justify-content:center;margin-bottom:10px" onclick="DG.resetBg()">Reset background</button><div class="form-group"><label class="form-label">Widget transparency: <span id="opLabel">96%</span></label><input type="range" class="form-range" min="80" max="100" value="96" id="widgetOpacity" oninput="DG.updateOpacity(this.value)"></div></div><div class="tab-content" id="tab-columns"><div class="form-group"><label class="form-label">Layout Columns</label><select class="form-select" id="columnCountSelect" onchange="DG.updateCols(this.value)"><option value="1">1 Column</option><option value="2">2 Columns</option><option value="3" selected>3 Columns</option><option value="4">4 Columns</option></select></div></div><div class="tab-content" id="tab-preferences"><p style="color:var(--white-a50);font-size:10px;margin-bottom:12px">These settings apply only to this page.</p><div class="form-group"><label class="form-label">Open links in</label><select class="form-select" id="linkTarget"><option value="_blank">New window</option><option value="_self">Same window</option></select></div></div></div></div></div>
<div class="modal-overlay" id="profileModal"><div class="modal" style="max-width:360px"><div class="modal-header"><span class="modal-title">Profile Image</span><button class="modal-close" onclick="DG.closeModal('profileModal')"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button></div><div class="modal-body" style="text-align:center"><div class="avatar" style="width:64px;height:64px;margin:0 auto 12px;font-size:22px" id="profileAvatar"><span id="profileInitial">U</span></div><input type="file" class="form-input" id="profileUpload" accept="image/*" onchange="DG.uploadProfile(event)" style="padding:7px"></div></div></div>
<div class="widget-context-menu" id="widgetContextMenu"></div>

<script type="module" src="jssrc/firebase-core.js"></script>
<script src="jssrc/dockgrid-app.js"></script>
</body>
</html>
