<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockGrid - Dashboard</title>
    <meta name="theme-color" content="#ff6b35">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23ff6b35'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='bold' font-family='system-ui'>D</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <link rel="stylesheet" href="startpage.css">
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>
<div class="bg-layer" id="bgLayer" style="background-image:url('https://cdn.pixabay.com/photo/2020/07/25/14/23/cliff-5436923_1280.jpg')"></div>
<div class="bg-overlay"></div>
<div class="toast-container" id="toastContainer"></div>

<!-- Pages Sidebar -->
<div class="pages-sidebar-overlay" id="pagesOverlay" onclick="DG.closePagesSidebar()"></div>
<div class="pages-sidebar" id="pagesSidebar">
    <div class="pages-sidebar-header">
        <span class="pages-sidebar-title">Your Pages</span>
        <button class="pages-sidebar-close" onclick="DG.closePagesSidebar()"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button>
    </div>
    <div class="pages-sidebar-body" id="pagesList"></div>
    <div class="pages-sidebar-footer">
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="DG.createNewPage()" id="newPageBtn">
            <iconify-icon icon="mdi:plus" width="14" height="14"></iconify-icon> New Page
        </button>
        <small style="color:var(--white-a50);display:block;text-align:center;margin-top:4px;font-size:10px" id="pageLimit"></small>
    </div>
</div>

<!-- Edit Panel (Right Side) -->
<div class="edit-panel-overlay" id="editPanelOverlay" onclick="DG.closeEditPanel()"></div>
<div class="edit-panel" id="editPanel">
    <div class="edit-panel-header">
        <span class="edit-panel-title" id="editPanelTitle">Edit Widget</span>
        <button class="edit-panel-close" onclick="DG.closeEditPanel()"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button>
    </div>
    <div class="edit-panel-body" id="editPanelBody"></div>
    <div class="edit-panel-footer">
        <button class="btn btn-dark" onclick="DG.closeEditPanel()" style="flex:1;justify-content:center">Cancel</button>
        <button class="btn btn-primary" onclick="DG.saveEditPanel()" style="flex:1;justify-content:center">Save</button>
    </div>
</div>

<div class="app">
    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <div class="header-left">
                <button class="btn btn-dark" onclick="DG.openPagesSidebar()"><iconify-icon icon="mdi:file-document-multiple-outline" width="14" height="14"></iconify-icon> Pages</button>
                <span class="header-username" id="usernameDisplay">@user</span>
            </div>
            <div class="header-center">
                <span class="page-title" id="pageTitleDisplay" contenteditable="true" spellcheck="false" onblur="DG.savePageTitle(this.textContent)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">DockGrid Page</span>
                <div class="search-box">
                    <span class="search-icon"><iconify-icon icon="mdi:magnify" width="16" height="16"></iconify-icon></span>
                    <input type="text" class="search-input" placeholder="Search Google or type a URL..." onkeydown="if(event.key==='Enter')DG.searchGoogle(this.value)">
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-dark" onclick="DG.openAddWidgetModal()"><iconify-icon icon="mdi:plus" width="14" height="14"></iconify-icon> Add</button>
                <button class="btn btn-dark" onclick="DG.openPageSettingsModal()"><iconify-icon icon="mdi:pencil-outline" width="14" height="14"></iconify-icon> Edit</button>
                <div class="dropdown" id="avatarDropdown">
                    <div class="avatar" id="avatarBtn" onclick="DG.toggleDropdown('avatarMenu')"><span id="avatarInitial">U</span></div>
                    <div class="dropdown-menu" id="avatarMenu">
                        <div class="dropdown-item" onclick="DG.openProfileModal()"><iconify-icon icon="mdi:camera-plus-outline" width="15" height="15"></iconify-icon> Change profile image</div>
                        <div class="dropdown-item" onclick="DG.openBackgroundModal()"><iconify-icon icon="mdi:image-outline" width="15" height="15"></iconify-icon> Change background</div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item danger" onclick="DG.handleSignOut()"><iconify-icon icon="mdi:logout" width="15" height="15"></iconify-icon> Sign out</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="main" id="mainContent">
        <div class="widget-grid cols-3" id="widgetGrid"></div>
        <div class="empty-state" id="emptyState">
            <iconify-icon icon="mdi:view-dashboard-outline"></iconify-icon>
            <h3>Your dashboard is empty</h3>
            <p>Click <strong style="color:var(--orange-500)">Add</strong> to start building your dashboard</p>
        </div>
    </main>

    <!-- Footer -->
    <div class="footer">
        <a href="https://pireactive.vercel.app/" target="_blank" rel="noopener">DockGrid © 2026 By PIReactive</a>
    </div>
</div>

<!-- Add Widget Modal -->
<div class="modal-overlay" id="addWidgetModal">
    <div class="modal">
        <div class="modal-header"><span class="modal-title">Add Widget</span><button class="modal-close" onclick="DG.closeModal('addWidgetModal')"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button></div>
        <div class="modal-body"><div class="widget-type-grid" id="widgetTypeGrid"></div></div>
    </div>
</div>

<!-- Page Settings Modal -->
<div class="modal-overlay" id="pageSettingsModal">
    <div class="modal">
        <div class="modal-header"><span class="modal-title">Page Settings</span><button class="modal-close" onclick="DG.closeModal('pageSettingsModal')"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button></div>
        <div class="modal-tabs">
            <button class="modal-tab active" data-tab="tab-general" onclick="DG.switchSettingsTab('tab-general',this)">General</button>
            <button class="modal-tab" data-tab="tab-background" onclick="DG.switchSettingsTab('tab-background',this)">Background</button>
            <button class="modal-tab" data-tab="tab-columns" onclick="DG.switchSettingsTab('tab-columns',this)">Columns</button>
            <button class="modal-tab" data-tab="tab-preferences" onclick="DG.switchSettingsTab('tab-preferences',this)">Preferences</button>
        </div>
        <div class="modal-body">
            <div class="tab-content active" id="tab-general">
                <div class="form-group"><label class="form-label">Page Title <small id="titleCount">0/50</small></label><input type="text" class="form-input" id="pageTitle" placeholder="Enter title" maxlength="50" oninput="document.getElementById('titleCount').textContent=this.value.length+'/50'"></div>
                <div class="form-group"><label class="form-label">Description</label><textarea class="form-input form-textarea" id="pageDescription" placeholder="Auto-generate"></textarea></div>
            </div>
            <div class="tab-content" id="tab-background">
                <div class="form-group"><label class="form-label">Select image</label><div class="image-grid" id="bgImageGrid"></div></div>
                <div class="form-group"><label class="form-label">Upload image</label><input type="file" class="form-input" id="bgUpload" accept="image/*" onchange="DG.uploadBg(event)" style="padding:7px"></div>
                <button class="btn btn-dark" style="width:100%;justify-content:center;margin-bottom:10px" onclick="DG.resetBg()">Reset background</button>
                <div class="form-group"><label class="form-label">Widget transparency: <span id="opLabel">96%</span></label><input type="range" class="form-range" min="80" max="100" value="96" id="widgetOpacity" oninput="DG.updateOpacity(this.value)"></div>
            </div>
            <div class="tab-content" id="tab-columns">
                <div class="form-group"><label class="form-label">Layout Columns</label><select class="form-select" id="columnCountSelect" onchange="DG.updateCols(this.value)"><option value="1">1 Column</option><option value="2">2 Columns</option><option value="3" selected>3 Columns</option><option value="4">4 Columns</option></select></div>
            </div>
            <div class="tab-content" id="tab-preferences">
                <p style="color:var(--white-a50);font-size:10px;margin-bottom:12px">These settings apply only to this page.</p>
                <div class="form-group"><label class="form-label">Open links in</label><select class="form-select" id="linkTarget"><option value="_blank">New window</option><option value="_self">Same window</option></select></div>
            </div>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal">
    <div class="modal" style="max-width:360px">
        <div class="modal-header"><span class="modal-title">Profile Image</span><button class="modal-close" onclick="DG.closeModal('profileModal')"><iconify-icon icon="mdi:close" width="16" height="16"></iconify-icon></button></div>
        <div class="modal-body" style="text-align:center">
            <div class="avatar" style="width:64px;height:64px;margin:0 auto 12px;font-size:22px" id="profileAvatar"><span id="profileInitial">U</span></div>
            <input type="file" class="form-input" id="profileUpload" accept="image/*" onchange="DG.uploadProfile(event)" style="padding:7px">
        </div>
    </div>
</div>

<!-- Widget Menu (Global, outside widgets for proper z-index) -->
<div class="widget-context-menu" id="widgetContextMenu"></div>

<script type="module" src="startpage-firebase.js"></script>
<script src="startpage-app.js"></script>
</body>
</html>
