<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockGrid Admin – Templates & Backgrounds</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        :root {
            --orange-500:#ff6b35; --orange-600:#e85d2c; --black-90:#0a0a0a; --black-80:#1a1a1a;
            --black-50:#555; --black-20:#ccc; --black-5:#f5f5f5; --white:#fff;
            --font:'Inter',system-ui,sans-serif; --radius-sm:8px; --shadow-sm:0 2px 8px rgba(0,0,0,0.08);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font);background:#f5f7fa;color:#1a1a1a;display:flex;height:100vh}
        .sidebar{width:240px;background:#fff;border-right:1px solid #e0e0e0;padding:20px 0;display:flex;flex-direction:column}
        .sidebar-logo{font-size:20px;font-weight:800;padding:0 20px;margin-bottom:24px;color:var(--orange-500);letter-spacing:-0.5px}
        .sidebar-nav{flex:1;display:flex;flex-direction:column;gap:4px;padding:0 12px}
        .nav-item{padding:10px 16px;border-radius:var(--radius-sm);cursor:pointer;font-weight:500;display:flex;align-items:center;gap:8px;transition:all 0.15s}
        .nav-item:hover{background:#f0f0f0}.nav-item.active{background:#fff4f0;color:var(--orange-500)}
        .main-content{flex:1;overflow-y:auto;padding:24px 32px}
        .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        .section-title{font-size:22px;font-weight:700}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;font-weight:600;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;background:var(--orange-500);color:#fff}.btn:hover{background:var(--orange-600)}.btn-outline{background:#fff;color:var(--orange-500);border:1px solid var(--orange-500)}.btn-outline:hover{background:#fff4f0}
        .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
        .card{background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);padding:16px;display:flex;flex-direction:column;gap:8px}
        .card img{width:100%;height:140px;object-fit:cover;border-radius:4px}
        .card-actions{display:flex;gap:8px;margin-top:auto}
        .form-group{margin-bottom:12px}
        .form-label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:#555}
        .form-input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:var(--font)}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center}
        .modal{background:#fff;border-radius:12px;padding:24px;max-width:500px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
        .toast{position:fixed;bottom:20px;right:20px;background:#1e1e1e;color:#fff;padding:10px 16px;border-left:3px solid var(--orange-500);border-radius:4px;z-index:999}
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">⚙️ DockGrid Admin</div>
        <nav class="sidebar-nav">
            <div class="nav-item active" data-section="templates"><iconify-icon icon="mdi:file-document-multiple-outline"></iconify-icon> Templates</div>
            <div class="nav-item" data-section="backgrounds"><iconify-icon icon="mdi:image-multiple-outline"></iconify-icon> Backgrounds</div>
        </nav>
        <div style="padding:12px;border-top:1px solid #eee;margin-top:auto">
            <button class="btn-outline" style="width:100%" onclick="window.location.href='startpage.html'">← Dashboard</button>
        </div>
    </div>
    <div class="main-content" id="mainContent"></div>
    <div id="toastContainer" style="position:fixed;bottom:20px;right:20px;z-index:999"></div>

    <!-- Import Firebase SDK (module) -->
    <script type="module" src="jssrc/firebase-core.js"></script>
    <script>
        // Wait for DG namespace
        (function initAdmin(){
            if(!window.DG || !window.DG.FB){ setTimeout(initAdmin,50); return; }
            const FB = window.DG.FB;
            const COL = FB.COL;

            const mainContent = document.getElementById('mainContent');
            let currentSection = 'templates';

            // Navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentSection = item.dataset.section;
                    renderSection();
                });
            });

            function showToast(msg, type='info') {
                const c = document.getElementById('toastContainer');
                c.innerHTML = `<div class="toast">${msg}</div>`;
                setTimeout(() => c.innerHTML = '', 2500);
            }

            async function renderSection() {
                if (currentSection === 'templates') {
                    mainContent.innerHTML = `
                        <div class="section-header">
                            <h2 class="section-title">Page Templates</h2>
                            <button class="btn" onclick="openTemplateModal()"><iconify-icon icon="mdi:plus"></iconify-icon> New Template</button>
                        </div>
                        <div class="card-grid" id="templatesGrid"></div>
                    `;
                    await loadTemplates();
                } else if (currentSection === 'backgrounds') {
                    mainContent.innerHTML = `
                        <div class="section-header">
                            <h2 class="section-title">Background Images</h2>
                            <button class="btn" onclick="openBackgroundModal()"><iconify-icon icon="mdi:plus"></iconify-icon> Add Background</button>
                        </div>
                        <div class="card-grid" id="backgroundsGrid"></div>
                    `;
                    await loadBackgrounds();
                }
            }

            async function loadTemplates() {
                const temps = await window.DG.loadTemplates();
                const grid = document.getElementById('templatesGrid');
                grid.innerHTML = temps.map(t => `
                    <div class="card">
                        <strong>${t.name}</strong>
                        <p style="font-size:13px;color:#555">${t.description || ''}</p>
                        <div class="card-actions">
                            <button class="btn-outline btn-sm" onclick="editTemplate('${t.id}')">Edit</button>
                            <button class="btn-outline btn-sm" style="color:red;border-color:red" onclick="deleteTemplate('${t.id}')">Delete</button>
                        </div>
                    </div>
                `).join('') || '<p>No templates yet.</p>';
            }

            async function loadBackgrounds() {
                const urls = await window.DG.loadBackgrounds();
                const grid = document.getElementById('backgroundsGrid');
                grid.innerHTML = urls.map(url => `
                    <div class="card">
                        <img src="${url}" alt="background">
                        <div class="card-actions">
                            <button class="btn-outline btn-sm" style="color:red;border-color:red" onclick="deleteBackground('${url}')">Delete</button>
                        </div>
                    </div>
                `).join('') || '<p>No custom backgrounds. Using defaults.</p>';
            }

            // Template CRUD
            window.openTemplateModal = (id = null) => {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `
                    <div class="modal">
                        <h3>${id ? 'Edit' : 'New'} Template</h3>
                        <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="tplName" value="${id ? '' : ''}"></div>
                        <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="tplDesc" rows="3"></textarea></div>
                        <div style="display:flex;gap:8px;justify-content:flex-end">
                            <button class="btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                            <button class="btn" onclick="saveTemplate('${id || ''}')">Save</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                if (id) {
                    // pre-fill with existing data (simplified: fetch and fill)
                    FB.getDoc(FB.doc(FB.db, COL.TEMPLATES, id)).then(snap => {
                        if (snap.exists()) {
                            document.getElementById('tplName').value = snap.data().name;
                            document.getElementById('tplDesc').value = snap.data().description || '';
                        }
                    });
                }
            };

            window.saveTemplate = async (id) => {
                const name = document.getElementById('tplName').value.trim();
                const desc = document.getElementById('tplDesc').value.trim();
                if (!name) return showToast('Name required', 'error');
                const data = { name, description: desc, defaultWidgets: [] };
                try {
                    if (id) {
                        await FB.updateDoc(FB.doc(FB.db, COL.TEMPLATES, id), data);
                    } else {
                        await FB.addDoc(FB.collection(FB.db, COL.TEMPLATES), data);
                    }
                    document.querySelector('.modal-overlay').remove();
                    renderSection();
                    showToast('Template saved');
                } catch(e) { showToast('Error', 'error'); }
            };

            window.deleteTemplate = async (id) => {
                if (confirm('Delete this template?')) {
                    await FB.deleteDoc(FB.doc(FB.db, COL.TEMPLATES, id));
                    renderSection();
                }
            };

            // Background CRUD
            window.openBackgroundModal = () => {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `
                    <div class="modal">
                        <h3>Add Background Image</h3>
                        <div class="form-group"><label class="form-label">Image URL</label><input class="form-input" id="bgUrl" placeholder="https://..."></div>
                        <div class="form-group"><label class="form-label">Or Upload</label><input type="file" id="bgFile"></div>
                        <div style="display:flex;gap:8px;justify-content:flex-end">
                            <button class="btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                            <button class="btn" onclick="addBackground()">Add</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
            };

            window.addBackground = async () => {
                const fileInput = document.getElementById('bgFile');
                let url = document.getElementById('bgUrl').value.trim();
                if (fileInput.files[0]) {
                    // upload via ImgBB
                    const formData = new FormData();
                    formData.append('image', fileInput.files[0]);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${FB.IMGBB_KEY}`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.success) url = data.data.url;
                    else return showToast('Upload failed', 'error');
                }
                if (!url) return showToast('Provide URL or file', 'error');
                await FB.addDoc(FB.collection(FB.db, COL.BACKGROUNDS), { url });
                document.querySelector('.modal-overlay').remove();
                renderSection();
                showToast('Background added');
            };

            window.deleteBackground = async (url) => {
                const q = FB.query(FB.collection(FB.db, COL.BACKGROUNDS), FB.where('url', '==', url));
                const snap = await FB.getDocs(q);
                snap.forEach(async doc => await FB.deleteDoc(doc.ref));
                renderSection();
            };

            // Init
            renderSection();
        })();
    </script>
</body>
</html>
